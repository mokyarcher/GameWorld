<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 登录</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 黑红白风格弹窗 */
        .game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }
        .game-modal-overlay.show {
            display: flex;
        }
        .game-modal-content {
            background: linear-gradient(145deg, rgba(25,25,25,0.98), rgba(10,10,10,0.99));
            padding: 45px 45px 35px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(220, 20, 60, 0.4);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 40px rgba(220, 20, 60, 0.15);
            max-width: 90%;
            width: 320px;
            animation: scaleIn 0.3s ease;
        }
        
        /* 成功弹窗特殊布局 - 无按钮 */
        .game-modal-content.success-modal {
            padding: 50px 45px 45px;
        }
        
        .game-modal-content.success-modal .game-modal-title {
            margin-top: 25px;
            margin-bottom: 8px;
        }
        
        .game-modal-content.success-modal .game-modal-message {
            margin-bottom: 0;
        }
        .game-modal-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(10,10,10,0.95));
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.2);
        }
        .game-modal-icon::before {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .game-modal-icon.success::before {
            content: 'OK';
            color: #dc143c;
        }
        .game-modal-icon.error::before {
            content: 'ERR';
            color: #dc143c;
        }
        .game-modal-icon.info::before {
            content: 'INFO';
            color: rgba(255,255,255,0.6);
        }
        .game-modal-title {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        
        .game-modal-title.success-title {
            font-size: 1.6rem;
            margin-top: 20px;
            margin-bottom: 8px;
        }
        .game-modal-message {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .game-modal-btn {
            padding: 12px 40px;
            background: transparent;
            border: 1px solid rgba(220, 20, 60, 0.5);
            border-radius: 6px;
            color: #dc143c;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .game-modal-btn:hover {
            background: rgba(220, 20, 60, 0.1);
            border-color: rgba(220, 20, 60, 0.8);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="logo">🎮 GameWorld</h1>
            <p class="subtitle">游戏世界 - 多人在线游戏平台</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">登录</button>
                <button class="tab-btn" onclick="switchTab('register')">注册</button>
            </div>
            
            <!-- 登录表单 -->
            <form id="loginForm" class="form active">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            
            <!-- 注册表单 -->
            <form id="registerForm" class="form">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="registerNickname" placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="registerPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
            
            <div class="divider">
                <span>或</span>
            </div>
            
            <button onclick="guestLogin()" class="btn btn-guest">游客登录</button>
        </div>
    </div>

    <!-- 自定义弹窗 -->
    <div class="game-modal-overlay" id="gameModal">
        <div class="game-modal-content" id="modalContent">
            <div class="game-modal-icon" id="modalIcon"></div>
            <div class="game-modal-title" id="modalTitle">提示</div>
            <div class="game-modal-message" id="modalMessage">消息内容</div>
            <button class="game-modal-btn" id="modalBtn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // 显示自定义弹窗
        function showModal(message, type = 'info', callback) {
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('modalContent');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const btn = document.getElementById('modalBtn');
            
            msg.textContent = message;
            
            // 清除之前的定时器
            if (window.modalAutoCloseTimer) {
                clearTimeout(window.modalAutoCloseTimer);
            }
            
            // 重置样式
            btn.className = 'game-modal-btn';
            title.className = 'game-modal-title';
            content.className = 'game-modal-content';
            btn.style.display = 'inline-block';
            
            switch(type) {
                case 'success':
                    icon.className = 'game-modal-icon success';
                    title.textContent = 'SUCCESS';
                    title.className = 'game-modal-title success-title';
                    content.className = 'game-modal-content success-modal';
                    btn.style.display = 'none'; // 隐藏确定按钮
                    
                    // 0.5s 后自动关闭
                    window.modalAutoCloseTimer = setTimeout(() => {
                        closeModal();
                        if (callback) callback();
                    }, 500);
                    break;
                case 'error':
                    icon.className = 'game-modal-icon error';
                    title.textContent = 'ERROR';
                    break;
                default:
                    icon.className = 'game-modal-icon info';
                    title.textContent = 'NOTICE';
            }
            
            modal.classList.add('show');
            
            // 点击确定后的回调（非成功状态）
            if (type !== 'success') {
                window.modalCallback = callback;
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }
        
        // 点击遮罩关闭
        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        // 自动检测 API 地址（支持本地和局域网访问）
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        // 登录
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/user/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showModal('登录成功！', 'success', function() {
                        window.location.href = 'gamehall.html';
                    });
                } else {
                    showModal(data.error || '登录失败', 'error');
                }
            } catch (error) {
                showModal('网络错误，请稍后重试', 'error');
            }
        });
        
        // 注册
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const nickname = document.getElementById('registerNickname').value;
            const password = document.getElementById('registerPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/user/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, nickname, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showModal('注册成功！请登录', 'success', function() {
                        switchTab('login');
                    });
                } else {
                    showModal(data.error || '注册失败', 'error');
                }
            } catch (error) {
                showModal('网络错误，请稍后重试', 'error');
            }
        });
        
        // 游客登录
        async function guestLogin() {
            try {
                const response = await fetch(`${API_BASE}/user/guest`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showModal('游客登录成功！', 'success', function() {
                        window.location.href = 'gamehall.html';
                    });
                } else {
                    showModal(data.error || '登录失败', 'error');
                }
            } catch (error) {
                showModal('网络错误，请稍后重试', 'error');
            }
        }
        
        // 检查是否已登录
        if (localStorage.getItem('token')) {
            window.location.href = 'gamehall.html';
        }
    </script>
</body>
</html>
