<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 好友</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .friends-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn-back {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab:hover:not(.active) {
            background: rgba(255,255,255,0.1);
        }
        
        .tab .badge {
            position: absolute;
            top: 5px;
            right: 10px;
            background: #e74c3c;
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        /* 内容区域 */
        .content-section {
            display: none;
        }
        
        .content-section.active {
            display: block;
        }
        
        /* 搜索区域 */
        .search-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-search {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.5);
        }
        
        .search-hint {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        
        /* 搜索结果 */
        .search-results {
            margin-top: 20px;
        }
        
        /* 用户列表 */
        .user-list {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        
        .user-item {
            display: flex;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.3s;
        }
        
        .user-item:last-child {
            border-bottom: none;
        }
        
        .user-item:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
            margin-right: 15px;
        }
        
        .user-info {
            flex: 1;
        }
        
        .user-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .user-id {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        
        .user-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-dot.online {
            background: #27ae60;
            box-shadow: 0 0 8px #27ae60;
        }
        
        .status-dot.offline {
            background: #7f8c8d;
        }
        
        .location-tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 8px;
            color: rgba(255,255,255,0.8);
        }
        
        .user-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-action {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-add {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .btn-add:hover {
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.5);
        }
        
        .btn-accept {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .btn-reject {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .btn-remove {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-action:hover {
            transform: translateY(-1px);
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }
        
        .toast.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
    </style>
</head>
<body>
    <div class="friends-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">👥 我的好友</div>
            <button onclick="backToHall()" class="btn-back">🏠 返回大厅</button>
        </header>
        
        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('friends')" id="tab-friends">
                好友列表
            </button>
            <button class="tab" onclick="switchTab('requests')" id="tab-requests">
                好友申请
                <span class="badge" id="requestBadge" style="display:none">0</span>
            </button>
            <button class="tab" onclick="switchTab('search')" id="tab-search">
                添加好友
            </button>
        </div>
        
        <!-- 好友列表 -->
        <div class="content-section active" id="section-friends">
            <div class="user-list" id="friendsList">
                <div class="empty-state">
                    <div class="icon">👋</div>
                    <p>暂无好友，去添加一些吧！</p>
                </div>
            </div>
        </div>
        
        <!-- 好友申请 -->
        <div class="content-section" id="section-requests">
            <div id="requestsContainer">
                <h3 style="margin-bottom:20px;color:rgba(255,255,255,0.8)">收到的申请</h3>
                <div class="user-list" id="receivedRequests">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>没有收到好友申请</p>
                    </div>
                </div>
                
                <h3 style="margin:30px 0 20px;color:rgba(255,255,255,0.8)">发出的申请</h3>
                <div class="user-list" id="sentRequests">
                    <div class="empty-state">
                        <div class="icon">📤</div>
                        <p>没有发出好友申请</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 添加好友 -->
        <div class="content-section" id="section-search">
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="输入用户名或用户ID搜索..." maxlength="20">
                    <button onclick="searchUsers()" class="btn-search">🔍 搜索</button>
                </div>
                <div class="search-hint">支持通过用户名（模糊搜索）或用户ID（精确搜索）查找</div>
                
                <div class="search-results" id="searchResults"></div>
            </div>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');
        let currentTab = 'friends';
        
        // 验证登录
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            
            // 更新标签样式
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            // 显示对应内容
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${tab}`).classList.add('active');
            
            // 加载数据
            if (tab === 'friends') {
                loadFriends();
            } else if (tab === 'requests') {
                loadRequests();
            }
        }
        
        // 加载好友列表
        async function loadFriends() {
            try {
                const response = await fetch(`${API_BASE}/friends/list`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    // 获取好友的实时在线状态
                    const friendIds = data.friends.map(f => String(f.id));
                    if (friendIds.length > 0) {
                        const statusRes = await fetch(`${API_BASE}/online/status/batch`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ userIds: friendIds })
                        });
                        const statusData = await statusRes.json();
                        
                        if (statusData.success) {
                            // 合并在线状态
                            data.friends.forEach(friend => {
                                const status = statusData.statuses[friend.id];
                                if (status) {
                                    friend.isOnline = status.isOnline;
                                    friend.location = status.location;
                                    friend.locationName = status.locationName;
                                }
                            });
                        }
                    }
                    
                    renderFriends(data.friends);
                }
            } catch (error) {
                console.error('加载好友失败:', error);
            }
        }
        
        // 渲染好友列表
        function renderFriends(friends) {
            const container = document.getElementById('friendsList');
            
            if (friends.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">👋</div>
                        <p>暂无好友，去添加一些吧！</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = friends.map(friend => `
                <div class="user-item">
                    <img src="../avatars/${friend.avatar}" alt="" class="user-avatar">
                    <div class="user-info">
                        <div class="user-name">${friend.nickname}</div>
                        <div class="user-id">ID: ${friend.id} | ${friend.username}</div>
                        <div class="user-status">
                            <span class="status-dot ${friend.isOnline ? 'online' : 'offline'}"></span>
                            <span>${friend.isOnline ? '在线' : '离线'}</span>
                            ${friend.location ? `<span class="location-tag">${friend.locationName || friend.location}</span>` : ''}
                        </div>
                    </div>
                    <div class="user-actions">
                        <button class="btn-action btn-remove" onclick="removeFriend(${friend.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 加载好友申请
        async function loadRequests() {
            try {
                const response = await fetch(`${API_BASE}/friends/requests`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderReceivedRequests(data.received);
                    renderSentRequests(data.sent);
                    
                    // 更新徽章
                    const badge = document.getElementById('requestBadge');
                    if (data.received.length > 0) {
                        badge.textContent = data.received.length;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }
                }
            } catch (error) {
                console.error('加载申请失败:', error);
            }
        }
        
        // 渲染收到的申请
        function renderReceivedRequests(requests) {
            const container = document.getElementById('receivedRequests');
            
            if (requests.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>没有收到好友申请</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = requests.map(req => `
                <div class="user-item">
                    <img src="../avatars/${req.avatar}" alt="" class="user-avatar">
                    <div class="user-info">
                        <div class="user-name">${req.nickname}</div>
                        <div class="user-id">ID: ${req.userId} | ${req.username}</div>
                    </div>
                    <div class="user-actions">
                        <button class="btn-action btn-accept" onclick="acceptRequest(${req.requestId})">接受</button>
                        <button class="btn-action btn-reject" onclick="rejectRequest(${req.requestId})">拒绝</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染发出的申请
        function renderSentRequests(requests) {
            const container = document.getElementById('sentRequests');
            
            if (requests.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📤</div>
                        <p>没有发出好友申请</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = requests.map(req => `
                <div class="user-item">
                    <img src="../avatars/${req.avatar}" alt="" class="user-avatar">
                    <div class="user-info">
                        <div class="user-name">${req.nickname}</div>
                        <div class="user-id">ID: ${req.userId} | ${req.username}</div>
                    </div>
                    <div class="user-actions">
                        <button class="btn-action btn-cancel" onclick="cancelRequest(${req.requestId})">取消</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 搜索用户
        async function searchUsers() {
            const keyword = document.getElementById('searchInput').value.trim();
            
            if (keyword.length < 2) {
                showToast('搜索关键词至少需要2个字符', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/friends/search?keyword=${encodeURIComponent(keyword)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderSearchResults(data.users);
                } else {
                    showToast(data.error || '搜索失败', 'error');
                }
            } catch (error) {
                console.error('搜索失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 渲染搜索结果
        function renderSearchResults(users) {
            const container = document.getElementById('searchResults');
            
            if (users.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <p>未找到匹配的用户</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <h3 style="margin-bottom:20px;color:rgba(255,255,255,0.8)">搜索结果</h3>
                <div class="user-list">
                    ${users.map(user => `
                        <div class="user-item">
                            <img src="../avatars/${user.avatar}" alt="" class="user-avatar">
                            <div class="user-info">
                                <div class="user-name">${user.nickname}</div>
                                <div class="user-id">ID: ${user.id} | ${user.username}</div>
                            </div>
                            <div class="user-actions">
                                <button class="btn-action btn-add" onclick="addFriend(${user.id})">添加好友</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        // 添加好友
        async function addFriend(friendId) {
            try {
                const response = await fetch(`${API_BASE}/friends/request`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ friendId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    if (data.autoAccepted) {
                        // 自动接受后刷新好友列表
                        loadFriends();
                    }
                } else {
                    showToast(data.error || '添加失败', 'error');
                }
            } catch (error) {
                console.error('添加好友失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 接受申请
        async function acceptRequest(requestId) {
            try {
                const response = await fetch(`${API_BASE}/friends/accept`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ requestId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    loadRequests();
                    loadFriends();
                } else {
                    showToast(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('接受申请失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 拒绝申请
        async function rejectRequest(requestId) {
            try {
                const response = await fetch(`${API_BASE}/friends/reject`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ requestId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    loadRequests();
                } else {
                    showToast(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('拒绝申请失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 取消申请
        async function cancelRequest(requestId) {
            try {
                const response = await fetch(`${API_BASE}/friends/cancel`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ requestId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    loadRequests();
                } else {
                    showToast(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('取消申请失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 删除好友
        async function removeFriend(friendId) {
            if (!confirm('确定要删除这位好友吗？')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/friends/remove`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ friendId })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    loadFriends();
                } else {
                    showToast(data.error || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除好友失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 返回大厅
        function backToHall() {
            window.location.href = 'gamehall.html';
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            loadFriends();
            
            // 回车搜索
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchUsers();
                }
            });
        });
    </script>
