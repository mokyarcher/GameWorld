<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑力对决 - 题库管理</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.1);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo::before {
            content: '题库';
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .btn-secondary {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.4);
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(220, 20, 60, 0.2);
        }
        
        .stat-card h3 {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #dc143c;
        }
        
        /* 筛选栏 */
        .filter-bar {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-bar input, .filter-bar select {
            padding: 10px 15px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 0.95rem;
        }
        
        .filter-bar input:focus, .filter-bar select:focus {
            outline: none;
            border-color: rgba(220, 20, 60, 0.6);
        }
        
        /* 题目列表 */
        .questions-section {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border-radius: 12px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            overflow: hidden;
        }
        
        .questions-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .questions-table th,
        .questions-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .questions-table th {
            background: rgba(220, 20, 60, 0.1);
            font-weight: 600;
            color: rgba(220, 20, 60, 0.9);
            font-size: 0.9rem;
        }
        
        .questions-table tr:hover {
            background: rgba(220, 20, 60, 0.05);
        }
        
        .question-cell {
            max-width: 300px;
        }
        
        .question-text {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .question-options {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        
        .type-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .type-tag.math { background: rgba(52, 152, 219, 0.15); color: #3498db; }
        .type-tag.logic { background: rgba(155, 89, 182, 0.15); color: #9b59b6; }
        .type-tag.knowledge { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .type-tag.reaction { background: rgba(241, 196, 15, 0.15); color: #f1c40f; }
        .type-tag.fun { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }
        
        .difficulty-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .difficulty-tag.easy { background: rgba(39, 174, 96, 0.15); color: #27ae60; }
        .difficulty-tag.medium { background: rgba(241, 196, 15, 0.15); color: #f1c40f; }
        .difficulty-tag.hard { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-edit {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.4);
            color: white;
        }
        
        .btn-delete {
            background: transparent;
            border: 1px solid rgba(220, 20, 60, 0.4);
            color: #dc143c;
        }
        
        .btn-delete:hover {
            background: rgba(220, 20, 60, 0.1);
        }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, rgba(25,25,25,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 12px;
            border: 1px solid rgba(220, 20, 60, 0.4);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(220, 20, 60, 0.6);
        }
        
        .options-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .modal-actions .btn {
            flex: 1;
        }
        
        /* 批量导入 */
        .import-area {
            border: 2px dashed rgba(220, 20, 60, 0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .import-area:hover {
            border-color: rgba(220, 20, 60, 0.6);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: linear-gradient(135deg, #dc143c, #8b0000);
        }
        
        .toast.error {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.5);
            color: #dc143c;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }
        
        .pagination button {
            padding: 8px 16px;
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        
        .pagination button.active {
            background: linear-gradient(135deg, #dc143c, #8b0000);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">脑力对决题库管理</div>
            <div class="header-actions">
                <button onclick="showDeduplicateModal()" class="btn btn-secondary" style="background: linear-gradient(145deg, #e74c3c, #c0392b);">清理重复</button>
                <button onclick="showImportModal()" class="btn btn-secondary">批量导入</button>
                <button onclick="showAddModal()" class="btn btn-primary">+ 添加题目</button>
                <button onclick="backToAdmin()" class="btn btn-back">返回后台</button>
            </div>
        </header>
        
        <!-- 统计 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总题数</h3>
                <div class="value" id="totalCount">-</div>
            </div>
            <div class="stat-card">
                <h3>速算题</h3>
                <div class="value" id="mathCount">-</div>
            </div>
            <div class="stat-card">
                <h3>逻辑题</h3>
                <div class="value" id="logicCount">-</div>
            </div>
            <div class="stat-card">
                <h3>知识题</h3>
                <div class="value" id="knowledgeCount">-</div>
            </div>
        </div>
        
        <!-- 筛选 -->
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="搜索题目..." oninput="filterQuestions()">
            <select id="typeFilter" onchange="filterQuestions()">
                <option value="">全部类型</option>
                <option value="速算题">速算题</option>
                <option value="逻辑题">逻辑题</option>
                <option value="知识题">知识题</option>
                <option value="反应题">反应题</option>
                <option value="趣味题">趣味题</option>
            </select>
            <select id="difficultyFilter" onchange="filterQuestions()">
                <option value="">全部难度</option>
                <option value="1">简单</option>
                <option value="2">中等</option>
                <option value="3">困难</option>
            </select>
        </div>
        
        <!-- 题目列表 -->
        <div class="questions-section">
            <table class="questions-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>题目</th>
                        <th>类型</th>
                        <th>难度</th>
                        <th>正确答案</th>
                        <th>使用次数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="questionsTableBody">
                    <tr><td colspan="7" style="text-align:center;padding:50px;">加载中...</td></tr>
                </tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- 添加/编辑弹窗 -->
    <div class="modal-overlay" id="questionModal">
        <div class="modal-content">
            <h3 id="modalTitle">添加题目</h3>
            <input type="hidden" id="questionId">
            <div class="form-group">
                <label>题型</label>
                <select id="questionType">
                    <option value="速算题">速算题</option>
                    <option value="逻辑题">逻辑题</option>
                    <option value="知识题">知识题</option>
                    <option value="反应题">反应题</option>
                    <option value="趣味题">趣味题</option>
                </select>
            </div>
            <div class="form-group">
                <label>难度</label>
                <select id="questionDifficulty">
                    <option value="1">简单</option>
                    <option value="2">中等</option>
                    <option value="3">困难</option>
                </select>
            </div>
            <div class="form-group">
                <label>题目</label>
                <textarea id="questionText" placeholder="请输入题目内容"></textarea>
            </div>
            <div class="form-group">
                <label>选项（4个）</label>
                <div class="options-input">
                    <input type="text" id="option0" placeholder="选项 A">
                    <input type="text" id="option1" placeholder="选项 B">
                    <input type="text" id="option2" placeholder="选项 C">
                    <input type="text" id="option3" placeholder="选项 D">
                </div>
            </div>
            <div class="form-group">
                <label>正确答案</label>
                <select id="correctAnswer">
                    <option value="0">选项 A</option>
                    <option value="1">选项 B</option>
                    <option value="2">选项 C</option>
                    <option value="3">选项 D</option>
                </select>
            </div>
            <div class="form-group">
                <label>解析</label>
                <textarea id="explanation" placeholder="请输入答案解析（可选）"></textarea>
            </div>
            <div class="form-group">
                <label>标签（用逗号分隔）</label>
                <input type="text" id="tags" placeholder="如：数学,乘法,速算">
            </div>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn btn-secondary">取消</button>
                <button onclick="saveQuestion()" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 清理重复题目弹窗 -->
    <div class="modal-overlay" id="deduplicateModal" style="display: none; z-index: 10000;">
        <div class="modal-content" style="max-width: 500px;">
            <h3>清理重复题目</h3>
            <div id="deduplicateInfo" style="margin: 20px 0; padding: 15px; background: rgba(231, 76, 60, 0.1); border-radius: 8px; border: 1px solid rgba(231, 76, 60, 0.3);">
                <p>正在检查重复题目...</p>
            </div>
            <div id="duplicateList" style="max-height: 300px; overflow-y: auto; margin: 20px 0;"></div>
            <div class="modal-actions">
                <button onclick="closeDeduplicateModal()" class="btn btn-secondary">关闭</button>
                <button onclick="executeDeduplicate()" id="btnDeduplicate" class="btn btn-primary" style="background: linear-gradient(145deg, #e74c3c, #c0392b);">一键清理</button>
            </div>
        </div>
    </div>
    
    <!-- 批量导入弹窗 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal-content">
            <h3>批量导入题目</h3>
            <p style="margin-bottom:15px;color:rgba(255,255,255,0.6);">支持 JSON 格式，每行一个题目对象</p>
            <div class="form-group">
                <textarea id="importData" style="min-height:200px;font-family:monospace;" placeholder='[
  {
    "type": "速算题",
    "difficulty": 1,
    "question": "24 × 15 = ?",
    "options": ["360", "350", "340", "370"],
    "answer": 0,
    "explanation": "24×15=360",
    "tags": "数学,乘法"
  }
]'></textarea>
            </div>
            <div class="modal-actions">
                <button onclick="closeImportModal()" class="btn btn-secondary">取消</button>
                <button onclick="importQuestions()" class="btn btn-primary">导入</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        let allQuestions = [];
        let currentPage = 1;
        const pageSize = 10;
        
        // 初始化
        window.onload = function() {
            loadQuestions();
        };
        
        // 获取 token
        function getToken() {
            return localStorage.getItem('token') || '';
        }
        
        // 加载题目列表
        async function loadQuestions() {
            try {
                const response = await fetch('/api/brainbattle/admin/questions?limit=1000', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await response.json();
                
                if (result.success) {
                    allQuestions = result.data;
                    updateStats();
                    filterQuestions();
                } else {
                    showToast(result.message || '加载失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = allQuestions.length;
            document.getElementById('mathCount').textContent = allQuestions.filter(q => q.type === '速算题').length;
            document.getElementById('logicCount').textContent = allQuestions.filter(q => q.type === '逻辑题').length;
            document.getElementById('knowledgeCount').textContent = allQuestions.filter(q => q.type === '知识题').length;
        }
        
        // 筛选题目
        function filterQuestions() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('typeFilter').value;
            const difficulty = document.getElementById('difficultyFilter').value;
            
            let filtered = allQuestions.filter(q => {
                if (search && !q.question.toLowerCase().includes(search)) return false;
                if (type && q.type !== type) return false;
                if (difficulty && q.difficulty != difficulty) return false;
                return true;
            });
            
            renderTable(filtered);
        }
        
        // 渲染表格
        function renderTable(questions) {
            const tbody = document.getElementById('questionsTableBody');
            const start = (currentPage - 1) * pageSize;
            const pageData = questions.slice(start, start + pageSize);
            
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:50px;">暂无数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = pageData.map(q => `
                <tr>
                    <td>${q.id}</td>
                    <td class="question-cell">
                        <div class="question-text">${escapeHtml(q.question)}</div>
                        <div class="question-options">${JSON.parse(q.options).join(' / ')}</div>
                    </td>
                    <td><span class="type-tag ${getTypeClass(q.type)}">${q.type}</span></td>
                    <td><span class="difficulty-tag ${getDifficultyClass(q.difficulty)}">${getDifficultyText(q.difficulty)}</span></td>
                    <td>选项 ${['A','B','C','D'][q.answer]}</td>
                    <td>${q.use_count}</td>
                    <td>
                        <div class="action-btns">
                            <button onclick="editQuestion(${q.id})" class="btn-small btn-edit">编辑</button>
                            <button onclick="deleteQuestion(${q.id})" class="btn-small btn-delete">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            
            renderPagination(questions.length);
        }
        
        // 渲染分页
        function renderPagination(total) {
            const pages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            
            let html = '';
            for (let i = 1; i <= pages; i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = html;
        }
        
        function goPage(p) {
            currentPage = p;
            filterQuestions();
        }
        
        // 显示添加弹窗
        function showAddModal() {
            document.getElementById('modalTitle').textContent = '添加题目';
            document.getElementById('questionId').value = '';
            document.getElementById('questionType').value = '速算题';
            document.getElementById('questionDifficulty').value = '1';
            document.getElementById('questionText').value = '';
            document.getElementById('option0').value = '';
            document.getElementById('option1').value = '';
            document.getElementById('option2').value = '';
            document.getElementById('option3').value = '';
            document.getElementById('correctAnswer').value = '0';
            document.getElementById('explanation').value = '';
            document.getElementById('tags').value = '';
            document.getElementById('questionModal').classList.add('show');
        }
        
        // 编辑题目
        function editQuestion(id) {
            const q = allQuestions.find(x => x.id === id);
            if (!q) return;
            
            const options = JSON.parse(q.options);
            document.getElementById('modalTitle').textContent = '编辑题目';
            document.getElementById('questionId').value = q.id;
            document.getElementById('questionType').value = q.type;
            document.getElementById('questionDifficulty').value = q.difficulty;
            document.getElementById('questionText').value = q.question;
            document.getElementById('option0').value = options[0] || '';
            document.getElementById('option1').value = options[1] || '';
            document.getElementById('option2').value = options[2] || '';
            document.getElementById('option3').value = options[3] || '';
            document.getElementById('correctAnswer').value = q.answer;
            document.getElementById('explanation').value = q.explanation || '';
            document.getElementById('tags').value = q.tags || '';
            document.getElementById('questionModal').classList.add('show');
        }
        
        // 保存题目
        async function saveQuestion() {
            const id = document.getElementById('questionId').value;
            const data = {
                type: document.getElementById('questionType').value,
                difficulty: parseInt(document.getElementById('questionDifficulty').value),
                question: document.getElementById('questionText').value.trim(),
                options: JSON.stringify([
                    document.getElementById('option0').value.trim(),
                    document.getElementById('option1').value.trim(),
                    document.getElementById('option2').value.trim(),
                    document.getElementById('option3').value.trim()
                ]),
                answer: parseInt(document.getElementById('correctAnswer').value),
                explanation: document.getElementById('explanation').value.trim(),
                tags: document.getElementById('tags').value.trim()
            };
            
            if (!data.question || !data.options) {
                showToast('请填写完整信息', 'error');
                return;
            }
            
            try {
                const url = id ? `/api/brainbattle/admin/questions/${id}` : '/api/brainbattle/admin/questions';
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast(id ? '修改成功' : '添加成功', 'success');
                    closeModal();
                    loadQuestions();
                } else {
                    showToast(result.message || '保存失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }
        
        // 删除题目
        async function deleteQuestion(id) {
            if (!confirm('确定要删除这道题吗？')) return;
            
            try {
                const response = await fetch(`/api/brainbattle/admin/questions/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast('删除成功', 'success');
                    loadQuestions();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch (err) {
                showToast('网络错误', 'error');
            }
        }
        
        // 清理重复题目
        async function showDeduplicateModal() {
            document.getElementById('deduplicateModal').style.display = 'flex';
            document.getElementById('deduplicateInfo').innerHTML = '<p>正在检查重复题目...</p>';
            document.getElementById('duplicateList').innerHTML = '';
            document.getElementById('btnDeduplicate').style.display = 'none';
            
            try {
                const response = await fetch('/api/brainbattle/admin/questions/duplicates', {
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await response.json();
                
                if (result.success) {
                    if (result.data.length === 0) {
                        document.getElementById('deduplicateInfo').innerHTML = '<p style="color: #27ae60;">✓ 没有发现重复题目</p>';
                    } else {
                        document.getElementById('deduplicateInfo').innerHTML = `
                            <p style="color: #e74c3c;">⚠ 发现 ${result.data.length} 组重复题目</p>
                            <p style="font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 10px;">点击"一键清理"将保留每组中ID最小的题目，删除其余重复项。</p>
                        `;
                        document.getElementById('btnDeduplicate').style.display = 'block';
                        
                        // 显示重复列表
                        document.getElementById('duplicateList').innerHTML = result.data.map(d => `
                            <div style="padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border-radius: 6px;">
                                <div style="font-weight: 600; margin-bottom: 5px;">${escapeHtml(d.question)}</div>
                                <div style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">
                                    类型: ${d.type} | 重复次数: ${d.count} | ID列表: ${d.ids}
                                </div>
                            </div>
                        `).join('');
                    }
                } else {
                    document.getElementById('deduplicateInfo').innerHTML = `<p style="color: #e74c3c;">获取失败: ${result.message}</p>`;
                }
            } catch (err) {
                document.getElementById('deduplicateInfo').innerHTML = '<p style="color: #e74c3c;">网络错误</p>';
            }
        }
        
        function closeDeduplicateModal() {
            document.getElementById('deduplicateModal').style.display = 'none';
        }
        
        async function executeDeduplicate() {
            if (!confirm('确定要清理重复题目吗？每组将保留ID最小的题目，其余删除。此操作不可恢复！')) {
                return;
            }
            
            document.getElementById('btnDeduplicate').disabled = true;
            document.getElementById('btnDeduplicate').textContent = '清理中...';
            
            try {
                const response = await fetch('/api/brainbattle/admin/questions/deduplicate', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() }
                });
                const result = await response.json();
                
                if (result.success) {
                    showToast(`清理完成！删除了 ${result.deletedCount} 道重复题目`, 'success');
                    closeDeduplicateModal();
                    loadQuestions(); // 刷新列表
                } else {
                    showToast(result.message || '清理失败', 'error');
                    document.getElementById('btnDeduplicate').disabled = false;
                    document.getElementById('btnDeduplicate').textContent = '一键清理';
                }
            } catch (err) {
                showToast('网络错误', 'error');
                document.getElementById('btnDeduplicate').disabled = false;
                document.getElementById('btnDeduplicate').textContent = '一键清理';
            }
        }
        
        // 批量导入
        function showImportModal() {
            document.getElementById('importModal').classList.add('show');
        }
        
        function closeImportModal() {
            document.getElementById('importModal').classList.remove('show');
        }
        
        async function importQuestions() {
            const text = document.getElementById('importData').value.trim();
            if (!text) {
                showToast('请输入数据', 'error');
                return;
            }
            
            try {
                const questions = JSON.parse(text);
                if (!Array.isArray(questions)) {
                    showToast('格式错误：需要是数组', 'error');
                    return;
                }
                
                const response = await fetch('/api/brainbattle/admin/questions/batch', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ questions })
                });
                
                const result = await response.json();
                if (result.success) {
                    showToast(`成功导入 ${result.count} 道题`, 'success');
                    closeImportModal();
                    loadQuestions();
                } else {
                    showToast(result.message || '导入失败', 'error');
                }
            } catch (err) {
                showToast('JSON 格式错误', 'error');
            }
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('questionModal').classList.remove('show');
        }
        
        // 返回后台
        function backToAdmin() {
            window.location.href = '../admin.html';
        }
        
        // 显示提示
        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function getTypeClass(type) {
            const map = { '速算题': 'math', '逻辑题': 'logic', '知识题': 'knowledge', '反应题': 'reaction', '趣味题': 'fun' };
            return map[type] || '';
        }
        
        function getDifficultyClass(d) {
            return d === 1 ? 'easy' : d === 2 ? 'medium' : 'hard';
        }
        
        function getDifficultyText(d) {
            return d === 1 ? '简单' : d === 2 ? '中等' : '困难';
        }
        
        // 点击弹窗外部关闭
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => {
                if (e.target === m) m.classList.remove('show');
            });
        });
    </script>
</body>
</html>
