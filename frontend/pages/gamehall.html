<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 游戏大厅</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 自定义游戏风格弹窗 */
        .game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }
        .game-modal-overlay.show {
            display: flex;
        }
        .game-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(102, 126, 234, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        .game-modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .game-modal-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .game-modal-message {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .game-modal-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        .game-modal-btn.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }
        .game-modal-btn.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="gamehall-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">🎮 GameWorld</div>
            <div class="user-info">
                <img id="userAvatar" src="../avatars/default.png" alt="头像" class="avatar">
                <span id="userNickname">玩家</span>
                <span class="chips">💰 <span id="userChips">0</span></span>
                <button onclick="logout()" class="btn btn-small">退出</button>
            </div>
        </header>
        
        <!-- 主要内容 -->
        <main class="main-content">
            <!-- 左侧：公告和排行榜 -->
            <aside class="sidebar">
                <div class="panel">
                    <h3>📢 系统公告</h3>
                    <div id="announcements" class="announcements">
                        <p>加载中...</p>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>🏆 筹码排行榜</h3>
                    <div id="leaderboard" class="leaderboard">
                        <p>加载中...</p>
                    </div>
                </div>
            </aside>
            
            <!-- 中间：游戏列表 -->
            <section class="games-section">
                <h2>选择游戏</h2>
                <div id="gamesList" class="games-list">
                    <p>加载中...</p>
                </div>
            </section>
        </main>
    </div>

    <!-- 自定义弹窗 -->
    <div class="game-modal-overlay" id="gameModal">
        <div class="game-modal-content">
            <div class="game-modal-icon" id="modalIcon">ℹ️</div>
            <div class="game-modal-title" id="modalTitle">提示</div>
            <div class="game-modal-message" id="modalMessage">消息内容</div>
            <button class="game-modal-btn" id="modalBtn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // 显示自定义弹窗
        function showModal(message, type = 'info', callback) {
            const modal = document.getElementById('gameModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const btn = document.getElementById('modalBtn');
            
            msg.textContent = message;
            
            // 重置按钮样式
            btn.className = 'game-modal-btn';
            
            switch(type) {
                case 'success':
                    icon.textContent = '✅';
                    title.textContent = '成功';
                    btn.classList.add('success');
                    break;
                case 'error':
                    icon.textContent = '❌';
                    title.textContent = '错误';
                    btn.classList.add('error');
                    break;
                default:
                    icon.textContent = 'ℹ️';
                    title.textContent = '提示';
            }
            
            modal.classList.add('show');
            
            // 点击确定后的回调
            window.modalCallback = callback;
        }
        
        function closeModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }
        
        // 点击遮罩关闭
        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        // 自动检测 API 地址（支持本地和局域网访问）
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        
        // 获取 token
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadGames();
            loadAnnouncements();
            loadLeaderboard();
        });
        
        // 加载用户信息
        async function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userNickname').textContent = user.nickname || user.username || '玩家';
            document.getElementById('userChips').textContent = user.chips || 0;
            if (user.avatar) {
                document.getElementById('userAvatar').src = `../avatars/${user.avatar}`;
            }
        }
        
        // 加载游戏列表
        async function loadGames() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/games`);
                const data = await response.json();
                
                if (data.success) {
                    const gamesList = document.getElementById('gamesList');
                    gamesList.innerHTML = data.games.map(game => `
                        <div class="game-card" onclick="enterGame('${game.game_code}')">
                            <div class="game-icon">🃏</div>
                            <div class="game-info">
                                <h3>${game.game_name}</h3>
                                <p>${game.description}</p>
                                <span class="game-meta">最低筹码: ${game.min_chips} | 最大人数: ${game.max_players}人</span>
                            </div>
                            <button class="btn btn-play">进入游戏</button>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载游戏列表失败:', error);
            }
        }
        
        // 加载公告
        async function loadAnnouncements() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/announcements`);
                const data = await response.json();
                
                if (data.success) {
                    const announcements = document.getElementById('announcements');
                    announcements.innerHTML = data.announcements.map(ann => `
                        <div class="announcement-item">
                            <strong>${ann.title}</strong>
                            <p>${ann.content}</p>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载公告失败:', error);
            }
        }
        
        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/leaderboard?limit=5`);
                const data = await response.json();
                
                if (data.success) {
                    const leaderboard = document.getElementById('leaderboard');
                    leaderboard.innerHTML = data.leaderboard.map((user, index) => `
                        <div class="leaderboard-item">
                            <span class="rank">${index + 1}</span>
                            <img src="../avatars/${user.avatar}" alt="" class="avatar-small">
                            <span class="name">${user.nickname}</span>
                            <span class="score">${user.chips}</span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
            }
        }
        
        // 进入游戏
        function enterGame(gameCode) {
            if (gameCode === 'poker') {
                window.location.href = '../games/poker/lobby.html';
            } else {
                showModal('该游戏即将上线，敬请期待！', 'info');
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
