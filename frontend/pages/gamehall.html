<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareX - 游戏大厅</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 自定义游戏风格弹窗 */
        .game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }
        .game-modal-overlay.show {
            display: flex;
        }
        .game-modal-content {
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(220, 20, 60, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 30px rgba(220, 20, 60, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        .game-modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .game-modal-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .game-modal-message {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .game-modal-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #d04060 0%, #8b0000 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.5);
        }
        .game-modal-btn.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }
        .game-modal-btn.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        /* 邀请通知弹窗 */
        .invite-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        
        .invite-modal-overlay.show {
            display: flex;
        }
        
        .invite-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(102, 126, 234, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        
        .invite-modal-content .invite-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .invite-modal-content .invite-title {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .invite-modal-content .invite-info {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .invite-modal-content .invite-info div {
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }
        
        .invite-modal-content .invite-info div:last-child {
            margin-bottom: 0;
        }
        
        .invite-modal-content .invite-actions {
            display: flex;
            gap: 15px;
        }
        
        .invite-modal-content .invite-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .invite-modal-content .invite-btn.accept {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .invite-modal-content .invite-btn.accept:hover {
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.5);
        }
        
        .invite-modal-content .invite-btn.reject {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .invite-modal-content .invite-btn.reject:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 滚轴式游戏选择器样式 - 精美版 */
        .game-carousel-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 0;
        }
        
        .game-carousel {
            position: relative;
            height: 450px;
            overflow: visible;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 用户信息徽章 - 赌场风格 */
        .user-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .user-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }
        
        .user-badge:hover {
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.2);
            transform: translateY(-2px);
        }
        
        .user-badge .badge-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2px;
        }
        
        .user-badge .badge-value {
            font-size: 16px;
            font-weight: 800;
            color: #dc143c;
            text-shadow: 0 0 10px rgba(170, 20, 60, 0.5);
        }
        
        .points-badge {
            cursor: default;
        }
        
        .points-badge:hover {
            border-color: rgba(170, 20, 60, 0.3);
            box-shadow: none;
            transform: none;
        }
        
        /* 用户头像样式 */
        .user-avatar-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(170, 20, 60, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(170, 20, 60, 0.2);
        }
        
        .user-avatar-wrapper:hover {
            border-color: rgba(220, 20, 60, 0.8);
            box-shadow: 0 0 20px rgba(170, 20, 60, 0.4);
            transform: translateY(-2px);
        }
        
        .user-avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 面板标题样式 */
        .panel h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: #dc143c;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(170, 20, 60, 0.3);
        }
        
        .panel-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(170, 20, 60, 0.3);
        }
        
        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        
        .carousel-item {
            position: absolute;
            width: 260px;
            height: 380px;
            border-radius: 8px;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            border: none;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,215,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            user-select: none;
            transform-origin: center center;
        }
        
        /* 卡片光效 */
        .carousel-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,215,0,0.1),
                transparent
            );
            transition: left 0.8s ease;
            pointer-events: none;
        }
        
        .carousel-item:hover::before {
            left: 100%;
        }
        
        /* 卡片边框发光 - 选中状态立即显示 */
        .carousel-item::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.4), transparent, rgba(139, 0, 0, 0.2));
            z-index: -1;
            opacity: 0;
            /* 非active状态才有过渡，active立即显示 */
            transition: opacity 0.1s ease;
        }
        
        .carousel-item.active {
            transform: translateX(0) scale(1.15) rotateY(0deg);
            border-color: #dc143c;
            box-shadow: 
                0 0 60px rgba(220, 20, 60, 0.6),
                0 25px 80px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.2);
            z-index: 20;
        }
        
        .carousel-item.active::after {
            opacity: 1;
            /* active状态无过渡，立即显示 */
            transition: none;
        }
        
        /* 卡牌名字遮罩 */
        .card-name-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px 15px;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0.95) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 0 0 8px 8px;
        }
        
        .card-name-label {
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 3px;
            color: rgba(220, 20, 60, 0.8);
            margin-bottom: 3px;
        }
        
        .card-name-text {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px rgba(220, 20, 60, 0.5);
            letter-spacing: 1px;
        }
        
        .carousel-item.prev {
            transform: translateX(-200px) scale(0.8) rotateY(35deg);
            opacity: 1;
            filter: brightness(0.9);
            z-index: 25;
        }
        
        .carousel-item.next {
            transform: translateX(200px) scale(0.8) rotateY(-35deg);
            opacity: 1;
            filter: brightness(0.9);
            z-index: 25;
        }
        
        .carousel-item.hidden {
            transform: translateX(0) scale(0.5);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        /* 更远的左侧卡片 - 始终在最外侧，不靠近中间 */
        .carousel-item.prev-prev {
            transform: translateX(-380px) scale(0.5) rotateY(55deg);
            opacity: 0.25;
            z-index: 1;
            filter: blur(4px);
            pointer-events: none;
        }
        
        /* 更远的右侧卡片 - 始终在最外侧，不靠近中间 */
        .carousel-item.next-next {
            transform: translateX(380px) scale(0.5) rotateY(-55deg);
            opacity: 0.25;
            z-index: 1;
            filter: blur(4px);
            pointer-events: none;
        }
        
        /* 最远侧的左右卡片 - 滑动时会靠近 */

        
        /* 卡牌图片 */
        .carousel-item .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }
        
        /* 游戏名称区域 */
        /* 选中标记已移除 */
        
        /* 翻页按钮 - 竖式简约风格 */
        .carousel-nav-btn {
            position: absolute;
            top: 40%;
            transform: translateY(-50%);
            width: 35px;
            height: 160px;
            background: linear-gradient(180deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        
        .carousel-nav-btn:hover {
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.2);
            background: linear-gradient(180deg, rgba(30,30,30,0.9) 0%, rgba(15,15,15,0.95) 100%);
        }
        
        .carousel-nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .carousel-nav-btn .nav-arrow {
            color: rgba(220, 20, 60, 0.8);
            font-size: 24px;
            font-weight: 300;
            line-height: 1;
        }
        
        .carousel-nav-btn:hover .nav-arrow {
            color: #dc143c;
        }
        
        .carousel-nav-btn.carousel-prev {
            left: 60px;
        }
        
        .carousel-nav-btn.carousel-next {
            right: 60px;
        }
        
        /* 游戏信息区域已移除 */
        
        .btn-enter-game {
            padding: 15px 50px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        .btn-enter-game:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }
        
        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        /* 进入游戏按钮 - 徽章风格 */
        .enter-game-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        
        .enter-game-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 40px;
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.4);
        }
        
        .enter-game-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.8;
        }
        
        .enter-game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(220, 20, 60, 0.6);
            border-color: rgba(220, 20, 60, 0.8);
        }
        
        .enter-game-btn:active {
            transform: translateY(-1px);
        }
        
        .enter-game-btn .enter-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 4px;
        }
        
        .enter-game-btn .enter-text {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        /* 加入项目按钮样式 */
        .enter-game-btn.join-project {
            background: linear-gradient(145deg, rgba(46, 204, 113, 0.9) 0%, rgba(39, 174, 96, 0.95) 100%);
            border-color: rgba(46, 204, 113, 0.5);
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.3);
        }
        
        .enter-game-btn.join-project:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(46, 204, 113, 0.5);
            border-color: rgba(46, 204, 113, 0.8);
        }
        
        .carousel-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .carousel-indicator.active {
            background: #dc143c;
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.6);
            transform: scale(1.3);
        }
        
        /* 触摸滑动支持 */
        .game-carousel {
            touch-action: pan-y;
        }
        
        /* 平板适配 (768px - 1024px) - 布局保持与PC一致，只调整宽度和卡牌大小 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .main-content {
                padding: 20px;
                gap: 20px;
            }
            
            /* 侧边栏弄窄一点 */
            .sidebar {
                width: 220px;
                min-width: 220px;
            }
            
            /* 游戏区域向上移 */
            .games-section {
                margin-top: -30px;
            }
            
            .panel {
                padding: 15px;
            }
            
            .panel h3 {
                font-size: 15px;
                margin-bottom: 12px;
            }
            
            /* 公告样式 */
            .announcement-item {
                padding: 10px;
            }
            
            .announcement-item strong {
                font-size: 13px;
            }
            
            .announcement-item p {
                font-size: 12px;
                line-height: 1.4;
            }
            
            /* 排行榜样式 */
            .leaderboard-item {
                padding: 8px;
                margin-bottom: 6px;
            }
            
            .leaderboard-item .rank {
                width: 20px;
                height: 20px;
                font-size: 11px;
            }
            
            .leaderboard-item .name {
                font-size: 12px;
            }
            
            .leaderboard-item .score {
                font-size: 11px;
            }
            
            /* 游戏轮播区域 */
            .game-carousel {
                height: 320px;
            }
            
            .carousel-item {
                width: 170px;
                height: 250px;
                border-radius: 18px;
            }
            
            .carousel-item.prev {
                transform: translateX(-120px) scale(0.72) rotateY(30deg);
                opacity: 0.5;
            }
            
            .carousel-item.next {
                transform: translateX(120px) scale(0.72) rotateY(-30deg);
                opacity: 0.5;
            }
            
            .carousel-item.prev-prev {
                transform: translateX(-220px) scale(0.55) rotateY(45deg);
                opacity: 0.3;
                filter: blur(1px);
            }
            
            .carousel-item.next-next {
                transform: translateX(220px) scale(0.55) rotateY(-45deg);
                opacity: 0.3;
                filter: blur(1px);
            }
            

            
            .carousel-item .game-icon-overlay {
                font-size: 48px;
            }
            
            .carousel-item .game-name {
                font-size: 0.95rem;
            }
            
            .carousel-arrow {
                width: 34px;
                height: 48px;
                font-size: 18px;
            }
            
            .carousel-prev {
                left: calc(50% - 200px);
            }
            
            .carousel-next {
                right: calc(50% - 200px);
            }
        }
        
        /* 手机适配 */
        @media (max-width: 768px) {
            .game-carousel {
                height: 320px;
            }
            
            .carousel-item {
                width: 160px;
                height: 240px;
            }
            
            .carousel-item.prev {
                transform: translateX(-100px) scale(0.7) rotateY(25deg);
                opacity: 0.5;
            }
            
            .carousel-item.next {
                transform: translateX(100px) scale(0.7) rotateY(-25deg);
                opacity: 0.5;
            }
            
            .carousel-item.prev-prev {
                transform: translateX(-180px) scale(0.5) rotateY(40deg);
                opacity: 0.25;
                filter: blur(2px);
            }
            
            .carousel-item.next-next {
                transform: translateX(180px) scale(0.5) rotateY(-40deg);
                opacity: 0.25;
                filter: blur(2px);
            }
            

            
            .carousel-item .game-icon-overlay {
                font-size: 50px;
            }
            
            .carousel-item .game-name {
                font-size: 0.9rem;
            }
            
            .carousel-arrow {
                width: 32px;
                height: 48px;
                font-size: 18px;
                border-radius: 8px;
            }
            
            .carousel-prev {
                left: calc(50% - 180px);
            }
            
            .carousel-next {
                right: calc(50% - 180px);
            }
        }
        
        /* 徽章风格按钮 - 红色渐变背景 */
        .glass-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            border: 2px solid rgba(170, 20, 60, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.4);
            color: #fff;
            margin-left: 8px;
        }

        .glass-btn::before {

    <script src="/socket.io/socket.io.js"></script>

    <script>
        // 显示自定义弹窗
        function showModal(message, type = 'info', callback) {
            const modal = document.getElementById('gameModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const btn = document.getElementById('modalBtn');
            
            msg.textContent = message;
            
            // 重置按钮样式
            btn.className = 'game-modal-btn';
            
            switch(type) {
                case 'success':
                    icon.textContent = '✅';
                    title.textContent = '成功';
                    btn.classList.add('success');
                    break;
                case 'error':
                    icon.textContent = '❌';
                    title.textContent = '错误';
                    btn.classList.add('error');
                    break;
                default:
                    icon.textContent = 'ℹ️';
                    title.textContent = '提示';
            }
            
            modal.classList.add('show');
            
            // 点击确定后的回调
            window.modalCallback = callback;
        }
        
        function closeModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }
        
        // 点击遮罩关闭
        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        // 自动检测 API 地址（支持本地和局域网访问）
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        
        // 获取 token
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadGames();
            loadAnnouncements();
            loadLeaderboard();
            checkAdminStatus();
            startHeartbeat(); // 启动在线心跳
        });
        
        // 在线心跳 - 每30秒报告一次位置
        function startHeartbeat() {
            const reportLocation = async () => {
                try {
                    await fetch(`${API_BASE}/online/heartbeat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ location: 'gamehall' })
                    });
                } catch (error) {
                    // 静默失败，不影响用户体验
                }
            };
            
            // 立即报告一次
            reportLocation();
            
            // 每30秒报告一次
            setInterval(reportLocation, 30000);
        }
        
        // 检查是否为管理员
        async function checkAdminStatus() {
            try {
                const response = await fetch(`${API_BASE}/admin/check`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.isAdmin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            } catch (error) {
                console.error('检查管理员状态失败:', error);
            }
        }
        
        // 进入后台管理
        function goToAdmin() {
            window.location.href = 'admin.html';
        }
        
        // 进入个人资料
        function goToProfile() {
            window.location.href = 'profile.html';
        }

        function goToFriends() {
            window.location.href = 'friends.html';
        }
        
        // 格式化积分显示 - 用 M 代表百万
        function formatPoints(points) {
            const num = parseInt(points) || 0;
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
        
        // 加载用户信息
        async function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userNickname').textContent = user.nickname || user.username || '玩家';
            document.getElementById('userPoints').textContent = formatPoints(user.chips || 0);
            if (user.avatar) {
                document.getElementById('userAvatar').src = `../avatars/${user.avatar}`;

                        {

                            max_players: 4,
                            developing: true
                        },
                        {
                            game_code: 'dice',
                            game_name: '正在开发',
                            description: '骰子大战，敬请期待',
                            min_points: 50,

                            description: '幸运老虎机，敬请期待',

                            max_players: 1,
                            developing: true

                    // 去重合并，地图分享放到第二位（贵州扑克之后）

                    };
                    
                    // 组装游戏列表：贵州扑克、足迹空间、脑力对决、其他
                    if (!existingCodes.includes('map')) {
                        gamesData = [backendGames[0], mapTool, brainBattle, ...backendGames.slice(1), ...uniqueTestGames];
                    } else {
                        // 如果后端已有map，在map后面插入brain

                gamesData = [
                    {
                        game_code: 'poker',
                        game_name: '贵州扑克',
                        description: '经典的贵州扑克游戏，考验你的牌技和心理',
                        min_points: 1000,

                    },
                    {

                        icon: '🧠',
                        min_points: 0,
                        max_players: 2
                    },
                    {
                        game_code: 'chess',

                        description: '经典策略棋类游戏，敬请期待',
                        min_points: 1000,
                        max_players: 9
                    },
                    {
                        game_code: 'chess',
                        game_name: '正在开发',
                        description: '经典策略棋类游戏，敬请期待',
                        min_points: 100,
                        max_players: 2,
                        developing: true
                    },
                    {
                        game_code: 'mahjong',

        // 渲染滚轴
        // 获取游戏背景渐变
        // 获取游戏卡牌图片路径
        function getGameCardImage(gameCode, isDeveloping = false) {
            // 正在开发的游戏使用统一卡牌
            if (isDeveloping) {
                return '../images/cards/dev-card.jpg';
            }
            
            const images = {
                'map': '../images/cards/map-share-card.jpg',  // 地图分享使用专用背景
                'poker-classic': '../images/cards/poker-classic.jpg',
                'poker-texas': '../images/cards/poker-texas.jpg',
                'poker-omaha': '../images/cards/poker-omaha.jpg',
                'poker-pineapple': '../images/cards/poker-pineapple.jpg',
                'poker-shortdeck': '../images/cards/poker-shortdeck.jpg',
                'default': '../images/cards/poker-classic.jpg'
            };
            return images[gameCode] || images['default'];
        }
        
        // 初始化轮播（只执行一次）
        function initCarousel() {
            const track = document.getElementById('carouselTrack');
            const indicators = document.getElementById('carouselIndicators');
            
            // 初始化时创建所有卡牌
            track.innerHTML = gamesData.map((game, index) => {
                const cardImage = getGameCardImage(game.game_code, game.developing);
                return `
                    <div class="carousel-item ${getItemClass(index)}" data-index="${index}" onclick="handleCardClick(${index})">
                        <img class="card-image" src="${cardImage}" alt="${game.game_name}">
                        <div class="card-name-overlay">
                            <span class="card-name-label">GAME</span>
                            <span class="card-name-text">${game.game_name}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            indicators.innerHTML = gamesData.map((_, index) => `
                <div class="carousel-indicator ${index === currentGameIndex ? 'active' : ''}" data-index="${index}" onclick="selectGame(${index})"></div>
            `).join('');
            
            // 添加触摸事件
            const carousel = document.getElementById('gameCarousel');
            carousel.addEventListener('touchstart', handleTouchStart, { passive: true });
            carousel.addEventListener('touchmove', handleTouchMove, { passive: true });
            carousel.addEventListener('touchend', handleTouchEnd, { passive: true });
            
            // 添加鼠标事件（模拟滑动）
            carousel.addEventListener('mousedown', handleMouseDown);
            carousel.addEventListener('mousemove', handleMouseMove);
            carousel.addEventListener('mouseup', handleMouseUp);
            carousel.addEventListener('mouseleave', handleMouseUp);
        }
        
        // 更新轮播状态（丝滑过渡，只更新类名）
        function renderCarousel() {
            const items = document.querySelectorAll('.carousel-item');
            const indicators = document.querySelectorAll('.carousel-indicator');
            
            // 更新每个卡片的类名，触发 CSS 过渡动画
            items.forEach((item, index) => {
                item.className = 'carousel-item ' + getItemClass(index);
            });
            
            // 更新指示器
            indicators.forEach((indicator, index) => {
                indicator.classList.toggle('active', index === currentGameIndex);
            });
            
            // 更新进入按钮状态
            updateEnterButton();
        }
        
        // 获取项目类名

        function animateTransition(direction) {
            const items = document.querySelectorAll('.carousel-item');
            
            // 等待 0.5s 后再开始回缩动画（保持当前位置不变）
            setTimeout(() => {
                // 使用 requestAnimationFrame 确保在下一帧开始动画
                requestAnimationFrame(() => {
                    // 开始回缩动画 - 保持卡片角色不变，只回缩到标准位置
                    items.forEach(item => {
                        item.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                        // 重置可能由 handleTouchMove 设置的样式
                        item.style.boxShadow = '';
                        item.style.borderColor = '';
                    });
                    
                    // 强制重绘，确保 transition 已应用
                    document.body.offsetHeight;
                    
                    // 直接收缩到下一个状态的位置（不是回缩到当前位置）
                    items.forEach(item => {
                        const className = item.className;
                        
                        if (direction === 'next') {
                            // 左滑手势（手指从右到左）：显示右边的牌
                            if (className.includes('active')) {
                                // active → prev 位置
                                item.style.transform = 'translateX(-200px) scale(0.8) rotateY(35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('prev') && !className.includes('prev-prev')) {
                                // prev → prev-prev 位置
                                item.style.transform = 'translateX(-380px) scale(0.5) rotateY(55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            } else if (className.includes('next') && !className.includes('next-next')) {
                                // next → active 位置
                                item.style.transform = 'translateX(0) scale(1.15) rotateY(0deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '10';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('next-next')) {
                                // next-next → next 位置
                                item.style.transform = 'translateX(200px) scale(0.8) rotateY(-35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('prev-prev')) {
                                // prev-prev → next-next 位置（绕回）
                                item.style.transform = 'translateX(380px) scale(0.5) rotateY(-55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            }
                        } else {
                            // 右滑手势（手指从左到右）：显示左边的牌
                            if (className.includes('active')) {
                                // active → next 位置
                                item.style.transform = 'translateX(200px) scale(0.8) rotateY(-35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('next') && !className.includes('next-next')) {
                                // next → next-next 位置
                                item.style.transform = 'translateX(380px) scale(0.5) rotateY(-55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            } else if (className.includes('prev') && !className.includes('prev-prev')) {
                                // prev → active 位置
                                item.style.transform = 'translateX(0) scale(1.15) rotateY(0deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '10';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('prev-prev')) {
                                // prev-prev → prev 位置
                                item.style.transform = 'translateX(-200px) scale(0.8) rotateY(35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('next-next')) {
                                // next-next → prev-prev 位置（绕回）
                                item.style.transform = 'translateX(-380px) scale(0.5) rotateY(55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            }
                        }
                    });
                }); // requestAnimationFrame 结束
                
                // 回缩动画完成后，更新索引和class
                setTimeout(() => {
                    const items = document.querySelectorAll('.carousel-item');
                    
                    // 更新索引
                    if (direction === 'next') {
                        currentGameIndex = (currentGameIndex + 1) % gamesData.length;
                    } else {
                        currentGameIndex = (currentGameIndex - 1 + gamesData.length) % gamesData.length;
                    }
                    
                    // 更新class（保持内联样式，用户看不到变化）
                    items.forEach(item => {
                        const currentClass = item.className;
                        let newClass = currentClass;
                        
                        if (direction === 'next') {
                            // 左滑：active→prev, prev→prev-prev, next→active, next-next→next, prev-prev→next-next
                            if (currentClass.includes('active')) {
                                newClass = currentClass.replace('active', 'prev');
                            } else if (currentClass.includes('prev') && !currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev', 'prev-prev');
                            } else if (currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev-prev', 'next-next');
                            } else if (currentClass.includes('next') && !currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next', 'active');
                            } else if (currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next-next', 'next');
                            }
                        } else {
                            // 右滑：active→next, next→next-next, prev→active, prev-prev→prev, next-next→prev-prev
                            if (currentClass.includes('active')) {
                                newClass = currentClass.replace('active', 'next');
                            } else if (currentClass.includes('next') && !currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next', 'next-next');
                            } else if (currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next-next', 'prev-prev');
                            } else if (currentClass.includes('prev') && !currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev', 'active');
                            } else if (currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev-prev', 'prev');
                            }
                        }
                        
                        item.className = newClass;
                    });
                    
                    // 强制重绘确保class更新
                    document.body.offsetHeight;
                    
                    // 清理内联样式（CSS会接管，位置和当前一致）
                    items.forEach(item => {
                        item.style.transition = '';
                        item.style.transform = '';
                        item.style.opacity = '';
                        item.style.zIndex = '';
                        item.style.filter = '';
                    });
                }, 600);
            }, 0); // 立即开始收缩动画
        }
    
    // 回弹动画 - 未触发切换阈值时回到原位
        function animateReset() {
        const items = document.querySelectorAll('.carousel-item');
        
        // 所有卡片都参与回弹动画
        items.forEach(item => {
            item.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
        });
        
        // 强制重绘
        document.body.offsetHeight;
        
        items.forEach(item => {
            const className = item.className;

                item.style.opacity = '1';

            } else if (className.includes('prev')) {

                item.style.opacity = '1';
                item.style.zIndex = '25';

            } else if (className.includes('next')) {
                item.style.transform = 'translateX(200px) scale(0.8) rotateY(-35deg)';
                item.style.opacity = '1';
                item.style.zIndex = '25';
                item.style.filter = 'blur(0px)';
            } else if (className.includes('prev-prev')) {
                item.style.transform = 'translateX(-380px) scale(0.5) rotateY(55deg)';
                item.style.opacity = '0.25';
                item.style.zIndex = '1';
                item.style.filter = 'blur(4px)';
            } else if (className.includes('next-next')) {
                item.style.transform = 'translateX(380px) scale(0.5) rotateY(-55deg)';
                item.style.opacity = '0.25';
                item.style.zIndex = '1';
                item.style.filter = 'blur(4px)';
            }
        });
        
        // 清理内联样式
        setTimeout(() => {
            items.forEach(item => {
                item.style.transition = '';
                item.style.transform = '';
                item.style.opacity = '';
                item.style.zIndex = '';
                item.style.filter = '';
            });
        }, 600);
    }

        function handleFeedbackImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                showModal('图片大小不能超过5MB', 'error');
                return;
            }
            
            feedbackImageFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('feedbackImagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('feedbackUploadPlaceholder').style.display = 'none';
                document.getElementById('feedbackImageRemove').classList.add('show');
            };
            reader.readAsDataURL(file);
        }

            feedbackImageFile = null;
            document.getElementById('feedbackImagePreview').style.display = 'none';
            document.getElementById('feedbackImagePreview').src = '';
            document.getElementById('feedbackUploadPlaceholder').style.display = 'flex';

        // 提交反馈
        async function submitFeedback() {
            const content = document.getElementById('feedbackContent').value.trim();
            
            if (!selectedFeedbackType) {
                showModal('请选择反馈类型', 'error');
                return;
            }
            
            if (!content) {
                showModal('请填写反馈内容', 'error');
                return;
            }
            
            const submitBtn = document.querySelector('.feedback-btn-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                const formData = new FormData();
                formData.append('type', selectedFeedbackType);
                formData.append('content', content);
                if (feedbackImageFile) {
                    formData.append('image', feedbackImageFile);
                }
                
                const token = localStorage.getItem('token');
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showModal('感谢您的反馈！我们会认真阅读每一条建议。', 'success');
                    closeFeedbackModal();
                } else if (response.status === 401 || response.status === 403) {
                    showModal('登录已过期，请重新登录', 'error');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showModal(data.error || '提交失败，请稍后重试', 'error');
                }
            } catch (error) {
                console.error('提交反馈失败:', error);
                showModal('提交失败，请检查网络连接', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交反馈';
            }
        }

                container.innerHTML = '<div style="text-align: center; padding: 50px; color: rgba(255,255,255,0.5);">您还没有提交过反馈</div>';
                return;
            }
            
            const typeMap = {
                'game_poker': '🎴 贵州扑克',
                'game_other': '🎮 其他游戏',
                'feature_map': '🗺️ 足迹空间',
                'feature_other': '🔧 其他功能',
                'bug': '🐛 Bug反馈',
                'other': '💡 其他建议'
            };
            
            const statusMap = {
                'pending': { text: '待处理', color: '#f1c40f' },
                'processing': { text: '处理中', color: '#3498db' },
                'resolved': { text: '已解决', color: '#27ae60' },
                'rejected': { text: '已拒绝', color: '#95a5a6' }
            };
            
            const html = `
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    ${feedbacks.map(f => {
                        const status = statusMap[f.status];
                        return `
                        <div style="background: linear-gradient(145deg, rgba(25,25,25,0.9) 0%, rgba(15,15,15,0.95) 100%); border: 1px solid rgba(220, 20, 60, 0.15); border-radius: 12px; padding: 15px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px;">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <span style="padding: 3px 10px; background: rgba(220, 20, 60, 0.15); border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 6px; font-size: 0.8rem; color: #dc143c;">${typeMap[f.type] || f.type}</span>
                                    <span style="font-size: 0.8rem; color: rgba(255,255,255,0.4);">${formatDate(f.created_at)}</span>
                                </div>
                                <span style="padding: 3px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; background: ${status.color}20; color: ${status.color}; border: 1px solid ${status.color}40;">${status.text}</span>
                            </div>
                            <div style="color: rgba(255,255,255,0.85); line-height: 1.5; margin-bottom: 10px; white-space: pre-wrap;">${escapeHtml(f.content)}</div>
                            ${f.imageUrl ? `<img src="${f.imageUrl}" style="max-width: 200px; max-height: 150px; border-radius: 8px; border: 1px solid rgba(220, 20, 60, 0.2); cursor: pointer; margin-bottom: 10px;" onclick="window.open('${f.imageUrl}', '_blank')">` : ''}
                            ${f.admin_reply ? `
                                <div style="background: rgba(220, 20, 60, 0.1); border-left: 3px solid #dc143c; padding: 10px 12px; border-radius: 0 8px 8px 0;">
                                    <div style="font-size: 0.75rem; color: #dc143c; font-weight: 600; margin-bottom: 5px;">📢 管理员回复</div>
                                    <div style="color: rgba(255,255,255,0.8); font-size: 0.9rem;">${escapeHtml(f.admin_reply)}</div>
                                </div>
                            ` : '<div style="font-size: 0.8rem; color: rgba(255,255,255,0.4); font-style: italic;">暂无回复，请耐心等待...</div>'}
                        </div>
                        `;
                    }).join('')}
                </div>
                ${pagination.totalPages > 1 ? `
                    <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(220, 20, 60, 0.1);">
                        <button onclick="loadMyFeedback(${pagination.page - 1})" ${pagination.page <= 1 ? 'disabled' : ''} style="padding: 8px 16px; background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%); border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 6px; color: white; cursor: pointer;">上一页</button>
                        <span style="color: rgba(255,255,255,0.6); font-size: 0.9rem;">第 ${pagination.page} / ${pagination.totalPages} 页</span>
                        <button onclick="loadMyFeedback(${pagination.page + 1})" ${pagination.page >= pagination.totalPages ? 'disabled' : ''} style="padding: 8px 16px; background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%); border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 6px; color: white; cursor: pointer;">下一页</button>
                    </div>
                ` : ''}
            `;
            
            container.innerHTML = html;
        }
        
        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 点击遮罩关闭弹窗
        document.getElementById('myFeedbackModal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeMyFeedbackModal();
            }
        });
    </script>
    
    <!-- 底部备案信息区域 -->
    <style>
        .footer-info {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            border-top: 1px solid rgba(220, 20, 60, 0.2);
            padding: 10px 20px;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 1000;
        }
        .footer-info a {
            color: rgba(220, 20, 60, 0.8);
            text-decoration: none;
        }
        .footer-info .age-tip {
            color: rgba(220, 20, 60, 0.9);
            font-weight: 600;
            margin-right: 10px;
        }
        .footer-info .beian {
            margin-left: 10px;
        }
    </style>
    <div class="footer-info">
        <span class="age-tip">⚠️ 18+</span>
        <span>仅供学习交流，无盈利行为</span>
        <span class="beian">备案号：待申请</span>
    </div>
</body>
</html>
