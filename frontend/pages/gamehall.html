<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 游戏大厅</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 自定义游戏风格弹窗 */
        .game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }
        .game-modal-overlay.show {
            display: flex;
        }
        .game-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(102, 126, 234, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        .game-modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .game-modal-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .game-modal-message {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .game-modal-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        .game-modal-btn.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }
        .game-modal-btn.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        /* 邀请通知弹窗 */
        .invite-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        
        .invite-modal-overlay.show {
            display: flex;
        }
        
        .invite-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(102, 126, 234, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        
        .invite-modal-content .invite-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .invite-modal-content .invite-title {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .invite-modal-content .invite-info {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .invite-modal-content .invite-info div {
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }
        
        .invite-modal-content .invite-info div:last-child {
            margin-bottom: 0;
        }
        
        .invite-modal-content .invite-actions {
            display: flex;
            gap: 15px;
        }
        
        .invite-modal-content .invite-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .invite-modal-content .invite-btn.accept {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .invite-modal-content .invite-btn.accept:hover {
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.5);
        }
        
        .invite-modal-content .invite-btn.reject {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .invite-modal-content .invite-btn.reject:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 滚轴式游戏选择器样式 - 精美版 */
        .game-carousel-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 0;
        }
        
        .game-carousel {
            position: relative;
            height: 450px;
            overflow: visible;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        
        .carousel-item {
            position: absolute;
            width: 260px;
            height: 380px;
            border-radius: 24px;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            border: 3px solid rgba(102, 126, 234, 0.4);
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,215,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            user-select: none;
            transform-origin: center center;
        }
        
        /* 卡片光效 */
        .carousel-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,215,0,0.1),
                transparent
            );
            transition: left 0.8s ease;
            pointer-events: none;
        }
        
        .carousel-item:hover::before {
            left: 100%;
        }
        
        /* 卡片边框发光 - 选中状态立即显示 */
        .carousel-item::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(118, 75, 162, 0.4), transparent, rgba(102, 126, 234, 0.2));
            z-index: -1;
            opacity: 0;
            /* 非active状态才有过渡，active立即显示 */
            transition: opacity 0.1s ease;
        }
        
        .carousel-item.active {
            transform: translateX(0) scale(1.15) rotateY(0deg);
            border-color: #667eea;
            box-shadow: 
                0 0 60px rgba(102, 126, 234, 0.6),
                0 25px 80px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.2);
            z-index: 20;
        }
        
        .carousel-item.active::after {
            opacity: 1;
            /* active状态无过渡，立即显示 */
            transition: none;
        }
        
        .carousel-item.prev {
            transform: translateX(-200px) scale(0.8) rotateY(35deg);
            opacity: 1;
            filter: brightness(0.9);
            z-index: 25;
        }
        
        .carousel-item.next {
            transform: translateX(200px) scale(0.8) rotateY(-35deg);
            opacity: 1;
            filter: brightness(0.9);
            z-index: 25;
        }
        
        .carousel-item.hidden {
            transform: translateX(0) scale(0.5);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        /* 更远的左侧卡片 - 始终在最外侧，不靠近中间 */
        .carousel-item.prev-prev {
            transform: translateX(-380px) scale(0.5) rotateY(55deg);
            opacity: 0.25;
            z-index: 1;
            filter: blur(4px);
            pointer-events: none;
        }
        
        /* 更远的右侧卡片 - 始终在最外侧，不靠近中间 */
        .carousel-item.next-next {
            transform: translateX(380px) scale(0.5) rotateY(-55deg);
            opacity: 0.25;
            z-index: 1;
            filter: blur(4px);
            pointer-events: none;
        }
        
        /* 最远侧的左右卡片 - 滑动时会靠近 */

        
        /* 游戏背景图区域 */
        .carousel-item .game-bg {
            width: 100%;
            height: 75%;
            position: relative;
            overflow: hidden;
            border-radius: 20px 20px 0 0;
        }
        
        .carousel-item .game-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transition: transform 0.6s ease;
        }
        
        .carousel-item:hover .game-bg::before {
            transform: scale(1.1);
        }
        
        /* 渐变遮罩 */
        .carousel-item .game-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                transparent 0%,
                transparent 60%,
                rgba(26,26,46,0.8) 100%
            );
        }
        
        /* 游戏图标 */
        .carousel-item .game-icon-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
            z-index: 2;
        }
        
        /* 游戏名称区域 */
        .carousel-item .game-info {
            width: 100%;
            height: 25%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.3) 100%);
        }
        
        .carousel-item .game-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #667eea;
            text-align: center;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            letter-spacing: 1px;
        }
        
        /* 选中标记已移除 */
        
        /* 箭头按钮 - 精美版 - GameWorld 蓝紫主题 */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(145deg, #667eea, #764ba2);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 8px 25px rgba(102, 126, 234, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 30;
        }
        
        .carousel-arrow::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(118, 75, 162, 0.5), transparent, rgba(102, 126, 234, 0.3));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .carousel-arrow:hover::before {
            opacity: 1;
        }
        
        .carousel-arrow:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 
                0 12px 35px rgba(102, 126, 234, 0.6),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .carousel-arrow:active {
            transform: translateY(-50%) scale(0.98);
            box-shadow: 
                0 4px 15px rgba(102, 126, 234, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .carousel-prev {
            left: calc(50% - 200px);
        }
        
        .carousel-next {
            right: calc(50% - 200px);
        }
            z-index: 20;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
        }
        
        .carousel-arrow:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(255,215,0,0.6);
        }
        
        .carousel-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .carousel-prev {
            left: 10px;
        }
        
        .carousel-next {
            right: 10px;
        }
        
        /* 游戏信息区域已移除 */
        
        .btn-enter-game {
            padding: 15px 50px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        .btn-enter-game:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }
        
        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .carousel-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .carousel-indicator.active {
            background: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.6);
            transform: scale(1.3);
        }
        
        /* 触摸滑动支持 */
        .game-carousel {
            touch-action: pan-y;
        }
        
        /* 平板适配 (768px - 1024px) - 布局保持与PC一致，只调整宽度和卡牌大小 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .main-content {
                padding: 20px;
                gap: 20px;
            }
            
            /* 侧边栏弄窄一点 */
            .sidebar {
                width: 220px;
                min-width: 220px;
            }
            
            /* 游戏区域向上移 */
            .games-section {
                margin-top: -30px;
            }
            
            .panel {
                padding: 15px;
            }
            
            .panel h3 {
                font-size: 15px;
                margin-bottom: 12px;
            }
            
            /* 公告样式 */
            .announcement-item {
                padding: 10px;
            }
            
            .announcement-item strong {
                font-size: 13px;
            }
            
            .announcement-item p {
                font-size: 12px;
                line-height: 1.4;
            }
            
            /* 排行榜样式 */
            .leaderboard-item {
                padding: 8px;
                margin-bottom: 6px;
            }
            
            .leaderboard-item .rank {
                width: 20px;
                height: 20px;
                font-size: 11px;
            }
            
            .leaderboard-item .name {
                font-size: 12px;
            }
            
            .leaderboard-item .score {
                font-size: 11px;
            }
            
            /* 游戏轮播区域 */
            .game-carousel {
                height: 320px;
            }
            
            .carousel-item {
                width: 170px;
                height: 250px;
                border-radius: 18px;
            }
            
            .carousel-item.prev {
                transform: translateX(-120px) scale(0.72) rotateY(30deg);
                opacity: 0.5;
            }
            
            .carousel-item.next {
                transform: translateX(120px) scale(0.72) rotateY(-30deg);
                opacity: 0.5;
            }
            
            .carousel-item.prev-prev {
                transform: translateX(-220px) scale(0.55) rotateY(45deg);
                opacity: 0.3;
                filter: blur(1px);
            }
            
            .carousel-item.next-next {
                transform: translateX(220px) scale(0.55) rotateY(-45deg);
                opacity: 0.3;
                filter: blur(1px);
            }
            

            
            .carousel-item .game-icon-overlay {
                font-size: 48px;
            }
            
            .carousel-item .game-name {
                font-size: 0.95rem;
            }
            
            .carousel-arrow {
                width: 34px;
                height: 48px;
                font-size: 18px;
            }
            
            .carousel-prev {
                left: calc(50% - 125px);
            }
            
            .carousel-next {
                right: calc(50% - 125px);
            }
        }
        
        /* 手机适配 */
        @media (max-width: 768px) {
            .game-carousel {
                height: 320px;
            }
            
            .carousel-item {
                width: 160px;
                height: 240px;
            }
            
            .carousel-item.prev {
                transform: translateX(-100px) scale(0.7) rotateY(25deg);
                opacity: 0.5;
            }
            
            .carousel-item.next {
                transform: translateX(100px) scale(0.7) rotateY(-25deg);
                opacity: 0.5;
            }
            
            .carousel-item.prev-prev {
                transform: translateX(-180px) scale(0.5) rotateY(40deg);
                opacity: 0.25;
                filter: blur(2px);
            }
            
            .carousel-item.next-next {
                transform: translateX(180px) scale(0.5) rotateY(-40deg);
                opacity: 0.25;
                filter: blur(2px);
            }
            

            
            .carousel-item .game-icon-overlay {
                font-size: 50px;
            }
            
            .carousel-item .game-name {
                font-size: 0.9rem;
            }
            
            .carousel-arrow {
                width: 32px;
                height: 48px;
                font-size: 18px;
                border-radius: 8px;
            }
            
            .carousel-prev {
                left: calc(50% - 110px);
            }
            
            .carousel-next {
                right: calc(50% - 110px);
            }
        }
        
        /* Sophia 风格光效按钮 */
        .glass-btn {
            position: relative;
            width: 78px;
            height: 65%;
            background: transparent;
            border: none;
            cursor: pointer;
            margin-left: 1px;
            padding: 0;
            overflow: visible;
            align-self: center;
        }
        
        /* 渐变光效边框 */
        .glass-btn::before,
        .glass-btn::after {
            content: '';
            position: absolute;
            background: linear-gradient(45deg, #00ccff, #0e1538, #0e1538, #d400d4);
            transition: 0.5s;
            opacity: 0;
        }
        
        .glass-btn::before {
            inset: 0;
            z-index: 1;
        }
        
        .glass-btn::after {
            inset: 0;
            z-index: 0;
            filter: blur(10px);
        }
        
        /* 悬停时光效展开 */
        .glass-btn:hover::before,
        .glass-btn:hover::after {
            opacity: 1;
            inset: -3px;
        }
        
        /* 按钮内容容器 */
        .glass-btn .btn-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0e1538;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #fff;
            border: 1px solid #040a29;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        /* 内部高光扫影 */
        .glass-btn .btn-text::before {
            content: '';
            position: absolute;
            top: 0;
            left: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.075);
            transform: skew(25deg);
            transition: left 0.5s ease;
        }
        
        .glass-btn:hover .btn-text::before {
            left: 100%;
        }
        
        /* 不同按钮颜色 */
        .glass-btn.friends::before,
        .glass-btn.friends::after {
            background: linear-gradient(45deg, #9b59b6, #0e1538, #0e1538, #e74c3c);
        }
        
        .glass-btn.profile::before,
        .glass-btn.profile::after {
            background: linear-gradient(45deg, #3498db, #0e1538, #0e1538, #2ecc71);
        }
        
        .glass-btn.logout::before,
        .glass-btn.logout::after {
            background: linear-gradient(45deg, #e74c3c, #0e1538, #0e1538, #f39c12);
        }
        
        .glass-btn.admin::before,
        .glass-btn.admin::after {
            background: linear-gradient(45deg, #f39c12, #0e1538, #0e1538, #e74c3c);
        }
    </style>
</head>
<body>
    <div class="gamehall-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo" style="align-self: center;">🎮 GameWorld</div>
            <div class="user-info">
                <img id="userAvatar" src="../avatars/default.png" alt="头像" class="avatar" onclick="goToProfile()" style="cursor: pointer; align-self: center;" title="点击修改资料">
                <span id="userNickname" onclick="goToProfile()" style="cursor: pointer; align-self: center;" title="点击修改资料">玩家</span>
                <span class="chips" style="align-self: center;">💰 <span id="userChips">0</span></span>
                <button id="adminBtn" onclick="goToAdmin()" class="glass-btn admin" style="display:none;"><span class="btn-text">管理</span></button>
                <button onclick="goToFriends()" class="glass-btn friends"><span class="btn-text">好友</span></button>
                <button onclick="goToProfile()" class="glass-btn profile"><span class="btn-text">资料</span></button>
                <button onclick="logout()" class="glass-btn logout"><span class="btn-text">退出</span></button>
            </div>
        </header>
        
        <!-- 主要内容 -->
        <main class="main-content">
            <!-- 左侧：公告和排行榜 -->
            <aside class="sidebar">
                <div class="panel">
                    <h3>📢 系统公告</h3>
                    <div id="announcements" class="announcements">
                        <p>加载中...</p>
                    </div>
                </div>
                
                <div class="panel">
                    <h3>🏆 筹码排行榜</h3>
                    <div id="leaderboard" class="leaderboard">
                        <p>加载中...</p>

            <!-- 中间：滚轴式游戏选择器 -->
            <section class="games-section">
                <!-- 滚轴式游戏选择器 -->
                <div class="game-carousel-container">
                    <!-- 左箭头 -->

                    <!-- 游戏滚轴 -->
                    <div class="game-carousel" id="gameCarousel">
                        <div class="carousel-track" id="carouselTrack">
                            <!-- 游戏卡片将动态生成 -->

    <!-- 自定义弹窗 -->
    <div class="game-modal-overlay" id="gameModal">
        <div class="game-modal-content">
            <div class="game-modal-icon" id="modalIcon">ℹ️</div>

            <button class="game-modal-btn" id="modalBtn" onclick="closeModal()">确定</button>
        </div>

        <div class="invite-modal-content">
            <div class="invite-icon">📩</div>
            <div class="invite-title">收到游戏邀请</div>
            <div class="invite-info" id="inviteInfo">
                <!-- 动态填充 -->
            </div>
            <div class="invite-actions">
                <button class="invite-btn reject" onclick="rejectInvite()">拒绝</button>
                <button class="invite-btn accept" onclick="acceptInvite()">接受邀请</button>
            </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../js/onlineTracker.js"></script>
    <script>
        // 显示自定义弹窗
        function showModal(message, type = 'info', callback) {
            const modal = document.getElementById('gameModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const btn = document.getElementById('modalBtn');
            
            msg.textContent = message;
            
            // 重置按钮样式
            btn.className = 'game-modal-btn';
            
            switch(type) {
                case 'success':
                    icon.textContent = '✅';
                    title.textContent = '成功';
                    btn.classList.add('success');
                    break;
                case 'error':
                    icon.textContent = '❌';
                    title.textContent = '错误';
                    btn.classList.add('error');
                    break;
                default:
                    icon.textContent = 'ℹ️';
                    title.textContent = '提示';
            }
            
            modal.classList.add('show');
            
            // 点击确定后的回调
            window.modalCallback = callback;
        }
        
        function closeModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }
        
        // 点击遮罩关闭
        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        // 自动检测 API 地址（支持本地和局域网访问）
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        
        // 获取 token
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadGames();
            loadAnnouncements();
            loadLeaderboard();
            checkAdminStatus();
        });
        
        // 检查是否为管理员
        async function checkAdminStatus() {
            try {
                const response = await fetch(`${API_BASE}/admin/check`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.isAdmin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            } catch (error) {
                console.error('检查管理员状态失败:', error);
            }
        }
        
        // 进入后台管理
        function goToAdmin() {
            window.location.href = 'admin.html';
        }
        
        // 进入个人资料
        function goToProfile() {
            window.location.href = 'profile.html';
        }
        
        // 进入好友页面
        function goToFriends() {
            window.location.href = 'friends.html';
        }
        
        // 加载用户信息
        async function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userNickname').textContent = user.nickname || user.username || '玩家';
            document.getElementById('userChips').textContent = user.chips || 0;
            if (user.avatar) {
                document.getElementById('userAvatar').src = `../avatars/${user.avatar}`;
            }
        }
        
        // 游戏数据
        let gamesData = [];
        let currentGameIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;
        let isDragging = false;
        
        // 加载游戏列表
        async function loadGames() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/games`);
                const data = await response.json();
                
                if (data.success) {
                    // 合并后端数据和测试数据
                    const backendGames = data.games || [];
                    const testGames = [
                        {
                            game_code: 'chess',
                            game_name: '国际象棋',
                            description: '经典策略棋类游戏，考验你的智慧和谋略',
                            min_chips: 100,
                            max_players: 2
                        },
                        {
                            game_code: 'mahjong',
                            game_name: '四川麻将',
                            description: '血战到底，刺激对战，胡牌不停',
                            min_chips: 500,
                            max_players: 4
                        },
                        {
                            game_code: 'dice',
                            game_name: '骰子大战',
                            description: '比拼运气与胆识，摇出你的幸运数字',
                            min_chips: 50,
                            max_players: 6
                        },
                        {
                            game_code: 'slot',
                            game_name: '幸运老虎机',
                            description: '777大奖等你来拿，一夜暴富不是梦',
                            min_chips: 10,
                            max_players: 1
                        },

                    ];
                    
                    // 去重合并
                    const existingCodes = backendGames.map(g => g.game_code);
                    const uniqueTestGames = testGames.filter(g => !existingCodes.includes(g.game_code));
                    gamesData = [...backendGames, ...uniqueTestGames];
                    
                    renderCarousel();

                }
            } catch (error) {
                console.error('加载游戏列表失败:', error);
                // 如果后端加载失败，使用测试数据
                gamesData = [
                    {
                        game_code: 'poker',
                        game_name: '德州扑克',
                        description: '经典的德州扑克游戏，考验你的牌技和心理',
                        min_chips: 1000,
                        max_players: 9
                    },
                    {
                        game_code: 'chess',
                        game_name: '国际象棋',
                        description: '经典策略棋类游戏，考验你的智慧和谋略',
                        min_chips: 100,
                        max_players: 2
                    },
                    {
                        game_code: 'mahjong',
                        game_name: '四川麻将',
                        description: '血战到底，刺激对战，胡牌不停',
                        min_chips: 500,
                        max_players: 4
                    },
                    {
                        game_code: 'dice',
                        game_name: '骰子大战',
                        description: '比拼运气与胆识，摇出你的幸运数字',
                        min_chips: 50,
                        max_players: 6
                    },
                    {
                        game_code: 'slot',
                        game_name: '幸运老虎机',
                        description: '777大奖等你来拿，一夜暴富不是梦',
                        min_chips: 10,
                        max_players: 1
                    },

                ];
                renderCarousel();

            }
        }
        
        // 渲染滚轴
        // 获取游戏背景渐变
        function getGameBackground(gameCode) {
            const backgrounds = {
                'poker': 'linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%)',
                'chess': 'linear-gradient(135deg, #2c3e50 0%, #4a6741 50%, #8b7355 100%)',
                'mahjong': 'linear-gradient(135deg, #8B0000 0%, #DC143C 50%, #FFD700 100%)',
                'dice': 'linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)',
                'slot': 'linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ff9ff3 100%)',

                'default': 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%)'
            };
            return backgrounds[gameCode] || backgrounds['default'];
        }
        
        function renderCarousel() {
            const track = document.getElementById('carouselTrack');
            const indicators = document.getElementById('carouselIndicators');
            
            track.innerHTML = gamesData.map((game, index) => {
                const bgStyle = getGameBackground(game.game_code);
                return `
                    <div class="carousel-item ${getItemClass(index)}" data-index="${index}" onclick="handleCardClick(${index})">
                        <div class="game-bg" style="background: ${bgStyle}">
                            <div class="game-icon-overlay">${getGameIcon(game.game_code)}</div>
                        </div>
                        <div class="game-info">
                            <div class="game-name">${game.game_name}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            indicators.innerHTML = gamesData.map((_, index) => `
                <div class="carousel-indicator ${index === currentGameIndex ? 'active' : ''}" onclick="selectGame(${index})"></div>
            `).join('');
            
            // 添加触摸事件
            const carousel = document.getElementById('gameCarousel');
            carousel.addEventListener('touchstart', handleTouchStart, { passive: true });
            carousel.addEventListener('touchmove', handleTouchMove, { passive: true });
            carousel.addEventListener('touchend', handleTouchEnd, { passive: true });
        }
        
        // 获取项目类名
        function getItemClass(index) {
            const diff = index - currentGameIndex;
            const len = gamesData.length;
            
            // 处理环形索引
            let normalizedDiff = diff;
            if (diff > len / 2) normalizedDiff = diff - len;
            if (diff < -len / 2) normalizedDiff = diff + len;
            
            if (normalizedDiff === 0) return 'active';
            if (normalizedDiff === 1) return 'next';
            if (normalizedDiff === -1) return 'prev';
            if (normalizedDiff === 2) return 'next-next';
            if (normalizedDiff === -2) return 'prev-prev';

            return 'hidden';
        }
        
        // 获取游戏图标
        function getGameIcon(gameCode) {
            const icons = {
                'poker': '🃏',
                'chess': '♟️',
                'mahjong': '🀄',
                'dice': '🎲',
                'slot': '🎰',

                'roulette': '🎯',
                'baccarat': '💎',
                'default': '🎮'
            };
            return icons[gameCode] || icons['default'];
        }
        
        // 选择游戏
        // 处理卡片点击
        function handleCardClick(index) {
            if (index === currentGameIndex) {
                // 点击当前选中的卡片，直接进入游戏
                enterGame(gamesData[index].game_code);
            } else {
                // 点击其他卡片，切换到该卡片
                selectGame(index);
            }
        }
        
        function selectGame(index) {
            currentGameIndex = index;
            renderCarousel();
        }
        
        // 上一个游戏
        function prevGame() {
            currentGameIndex = (currentGameIndex - 1 + gamesData.length) % gamesData.length;
            renderCarousel();

        }
        
        // 下一个游戏
        function nextGame() {
            currentGameIndex = (currentGameIndex + 1) % gamesData.length;
            renderCarousel();

        }
        
        // 更新选中游戏信息
        // 进入选中的游戏
        function enterSelectedGame() {
            const game = gamesData[currentGameIndex];
            if (game) {
                enterGame(game.game_code);
            }
        }
        
        // 速度追踪变量
        let lastTouchX = 0;
        let lastTouchTime = 0;
        let touchVelocity = 0; // 滑动速度（像素/毫秒）
        
        // 触摸开始
        function handleTouchStart(e) {
            touchStartX = e.changedTouches[0].screenX;
            isDragging = true;
            touchVelocity = 0;
            
            // 初始化速度追踪
            lastTouchX = touchStartX;
            lastTouchTime = Date.now();
            
            // 获取当前卡片元素
            const items = document.querySelectorAll('.carousel-item');
            items.forEach(item => {
                item.style.transition = 'none';
                item.style.willChange = 'transform, opacity'; // GPU 加速
            });
        }
        
        // 触摸移动 - 实时跟随手指，左右卡片联动
        function handleTouchMove(e) {
            if (!isDragging) return;
            
            const currentX = e.changedTouches[0].screenX;
            const currentTime = Date.now();
            const diff = currentX - touchStartX;
            const maxOffset = 200; // 最大偏移量
            
            // 计算速度（像素/毫秒）
            const timeDelta = currentTime - lastTouchTime;
            if (timeDelta > 0) {
                touchVelocity = (currentX - lastTouchX) / timeDelta;
            }
            lastTouchX = currentX;
            lastTouchTime = currentTime;
            
            // 限制偏移量
            const offset = Math.max(-maxOffset, Math.min(maxOffset, diff));
            
            // 计算进度比例 (-1 到 1)
            const progress = offset / maxOffset;
            
            // 获取所有卡片
            const items = document.querySelectorAll('.carousel-item');
            
            items.forEach((item, index) => {
                const className = item.className;
                
                if (className.includes('active')) {
                    // 当前激活卡片：跟随手指移动，逐渐缩小缩回
                    // 右滑时(progress>0)：向右边移动并缩小到next位置
                    // 左滑时(progress<0)：向左边移动并缩小到prev位置
                    const targetScale = 0.8; // 目标位置(prev/next)的缩放
                    const startScale = 1.15; // 起始缩放
                    const scale = startScale - Math.abs(progress) * (startScale - targetScale);
                    const translateX = offset;
                    const rotateY = -progress * 15;
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = 1 - Math.abs(progress) * 0.3;
                    item.style.zIndex = 10;
                    // 离开中心时淡化光效
                    const glowOpacity = 1 - Math.abs(progress);
                    item.style.boxShadow = `
                        0 0 ${60 * glowOpacity}px rgba(102, 126, 234, ${0.6 * glowOpacity}),
                        0 25px 80px rgba(0,0,0,0.7),
                        inset 0 1px 0 rgba(255,255,255,0.2)
                    `;
                    
                } else if (className.includes('prev-prev')) {
                    // 更左侧的卡片 - 循环滚动：左滑时绕到右侧替代next-next
                    
                    let translateX, scale, rotateY, opacity, blur;
                    
                    if (progress > 0) {
                        // 右滑：从远处向着prev位置移动，逐渐变大变清晰
                        const startX = -380;
                        const targetX = -200;
                        const startScale = 0.5;
                        const targetScale = 0.8;
                        translateX = startX + progress * (targetX - startX);
                        scale = startScale + progress * (targetScale - startScale);
                        rotateY = 55 - progress * 20;
                        const clarityProgress = Math.min(1, progress * 1.5);
                        opacity = 0.25 + clarityProgress * 0.75;
                        blur = Math.max(0, 4 - clarityProgress * 4);
                    } else if (progress < -0.5) {
                        // 左滑超过一半时：prev-prev 绕到右侧，准备替代 next-next
                        const wrapProgress = (Math.abs(progress) - 0.5) * 2; // 0 -> 1
                        const startX = -500; // 左侧远处
                        const targetX = 380; // next-next的位置
                        const startScale = 0.4;
                        const targetScale = 0.5;
                        translateX = startX + wrapProgress * (targetX - startX);
                        scale = startScale + wrapProgress * (targetScale - startScale);
                        rotateY = -55 + wrapProgress * 20;  // 绕到右边后，左边低右边高（跟next-next一样）
                        opacity = wrapProgress * 0.25;
                        blur = 6 - wrapProgress * 2;
                    } else {
                        // 左滑前半段：继续向左移动，逐渐淡出
                        translateX = -380 - Math.abs(progress) * 100;
                        scale = 0.5 - Math.abs(progress) * 0.1;
                        rotateY = 55 + Math.abs(progress) * 10;
                        opacity = 0.25 - Math.abs(progress) * 0.25;
                        blur = 4 + Math.abs(progress) * 2;
                    }
                    
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = opacity;
                    item.style.zIndex = progress < -0.5 ? '0' : '1';
                    item.style.filter = `blur(${blur}px)`;
                    
                } else if (className.includes('next-next')) {
                    // 更右侧的卡片 - 循环滚动：右滑时绕到左侧替代prev-prev
                    
                    let translateX, scale, rotateY, opacity, blur;
                    
                    if (progress < 0) {
                        // 左滑：从远处向着next位置移动，逐渐变大变清晰
                        const startX = 380;
                        const targetX = 200;
                        const startScale = 0.5;
                        const targetScale = 0.8;
                        translateX = startX + Math.abs(progress) * (targetX - startX);
                        scale = startScale + Math.abs(progress) * (targetScale - startScale);
                        rotateY = -55 + Math.abs(progress) * 20;
                        const clarityProgress = Math.min(1, Math.abs(progress) * 1.5);
                        opacity = 0.25 + clarityProgress * 0.75;
                        blur = Math.max(0, 4 - clarityProgress * 4);
                    } else if (progress > 0.5) {
                        // 右滑超过一半时：next-next 绕到左侧，准备替代 prev-prev
                        // 从右侧消失，从左侧出现
                        const wrapProgress = (progress - 0.5) * 2; // 0 -> 1
                        const startX = 500; // 右侧远处
                        const targetX = -380; // prev-prev的位置
                        const startScale = 0.4;
                        const targetScale = 0.5;
                        translateX = startX - wrapProgress * (startX - targetX);
                        scale = startScale + wrapProgress * (targetScale - startScale);
                        rotateY = 55 - wrapProgress * 20;  // 绕到左边后，左边高右边低（跟prev-prev一样）
                        opacity = wrapProgress * 0.25;
                        blur = 6 - wrapProgress * 2;
                    } else {
                        // 右滑前半段：继续向右移动，逐渐淡出
                        translateX = 380 + progress * 100;
                        scale = 0.5 - progress * 0.1;
                        rotateY = -55 - progress * 10;
                        opacity = 0.25 - progress * 0.25;
                        blur = 4 + progress * 2;
                    }
                    
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = opacity;
                    item.style.zIndex = progress > 0.5 ? '0' : '1';
                    item.style.filter = `blur(${blur}px)`;
                    
                } else if (className.includes('prev')) {
                    // 左侧第一位卡片 - 始终在最上层
                    const baseX = -200;
                    const translateX = baseX + progress * 200;
                    
                    let scale, rotateY, opacity, blur;
                    
                    if (progress > 0) {
                        // 右滑：从左边进入中心，逐渐变大
                        scale = 0.8 + progress * 0.35;
                        rotateY = 35 - progress * 35;
                        opacity = 1;
                        blur = 0;
                    } else {
                        // 左滑或触摸时：向左移动退场，逐渐变模糊
                        // 当progress接近0时（触摸开始），稍微变大抽出
                        const touchScale = progress > -0.1 ? 0.85 : 0.8;
                        scale = touchScale + progress * 0.1;
                        rotateY = 35 - progress * 15;
                        // 左滑时：prev 逐渐变模糊 (opacity 1->0.5, blur 0->2px)
                        opacity = 1 - Math.abs(progress) * 0.5;
                        blur = Math.abs(progress) * 2;
                    }
                    
                    // 关键：始终保持高 z-index，确保在prev-prev之上
                    const zIndex = 25;
                    
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = Math.max(0.3, opacity);
                    item.style.zIndex = zIndex;
                    item.style.filter = `blur(${blur}px)`;
                    // 即将进入中心时增强光效
                    if (progress > 0.3) {
                        const glowProgress = (progress - 0.3) / 0.7;
                        item.style.boxShadow = `
                            0 0 ${30 + 30 * glowProgress}px rgba(102, 126, 234, ${0.3 + 0.3 * glowProgress}),
                            0 15px 40px rgba(0,0,0,0.5),
                            inset 0 1px 0 rgba(255,255,255,0.1)
                        `;
                        item.style.borderColor = `rgba(102, 126, 234, ${0.4 + 0.6 * glowProgress})`;
                    } else {
                        item.style.boxShadow = '';
                        item.style.borderColor = '';
                    }
                    
                } else if (className.includes('next') && !className.includes('next-next')) {
                    // 右侧第一位卡片 - 始终在最上层
                    const baseX = 200;
                    const translateX = baseX + progress * 200;
                    
                    let scale, rotateY, opacity, blur;
                    
                    if (progress < 0) {
                        // 左滑：从右边进入中心，逐渐变大
                        scale = 0.8 + Math.abs(progress) * 0.35;
                        rotateY = -35 - progress * 35;
                        opacity = 1;
                        blur = 0;
                    } else {
                        // 右滑或触摸时：向右移动退场，逐渐变模糊
                        // 当progress接近0时（触摸开始），稍微变大抽出
                        const touchScale = progress < 0.1 ? 0.85 : 0.8;
                        scale = touchScale - progress * 0.1;
                        rotateY = -35 - progress * 15;
                        // 右滑时：next 逐渐变模糊 (opacity 1->0.5, blur 0->2px)
                        opacity = 1 - progress * 0.5;
                        blur = progress * 2;
                    }
                    
                    // 关键：始终保持高 z-index，确保在next-next之上
                    const zIndex = 25;
                    
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = Math.max(0.3, opacity);
                    item.style.zIndex = zIndex;
                    item.style.filter = `blur(${blur}px)`;
                    // 即将进入中心时增强光效
                    if (progress < -0.3) {
                        const glowProgress = (Math.abs(progress) - 0.3) / 0.7;
                        item.style.boxShadow = `
                            0 0 ${30 + 30 * glowProgress}px rgba(102, 126, 234, ${0.3 + 0.3 * glowProgress}),
                            0 15px 40px rgba(0,0,0,0.5),
                            inset 0 1px 0 rgba(255,255,255,0.1)
                        `;
                        item.style.borderColor = `rgba(102, 126, 234, ${0.4 + 0.6 * glowProgress})`;
                    } else {
                        item.style.boxShadow = '';
                        item.style.borderColor = '';
                    }
                    
                }
            });
        }
        
        // 触摸结束
        function handleTouchEnd(e) {
            if (!isDragging) return;
            
            isDragging = false;
            touchEndX = e.changedTouches[0].screenX;
            
            const diff = touchStartX - touchEndX;
            const swipeThreshold = 50;
            const velocityThreshold = 0.5; // 速度阈值（像素/毫秒）
            
            // 清理 will-change
            const items = document.querySelectorAll('.carousel-item');
            items.forEach(item => {
                item.style.willChange = 'auto';
            });
            
            // 根据位移或速度判断是否触发切换
            const shouldSwitch = Math.abs(diff) > swipeThreshold || Math.abs(touchVelocity) > velocityThreshold;
            
            if (shouldSwitch) {
                // 根据速度方向或位移方向确定切换方向
                // touchVelocity > 0: 手指从左向右滑，显示左边牌(prev→active)
                // touchVelocity < 0: 手指从右向左滑，显示右边牌(next→active)
                const direction = touchVelocity !== 0 ? 
                    (touchVelocity > 0 ? 'prev' : 'next') :
                    (diff > 0 ? 'next' : 'prev');
                
                // 需要切换 - 播放平滑过渡动画
                animateTransition(direction);
            } else {
                // 未触发阈值 - 回弹到原位
                animateReset();
            }
        }
        
        // 平滑过渡动画 - 快速滑动时也有动画效果
        function animateTransition(direction) {
            const items = document.querySelectorAll('.carousel-item');
            
            // 等待 0.5s 后再开始回缩动画（保持当前位置不变）
            setTimeout(() => {
                // 使用 requestAnimationFrame 确保在下一帧开始动画
                requestAnimationFrame(() => {
                    // 开始回缩动画 - 保持卡片角色不变，只回缩到标准位置
                    items.forEach(item => {
                        item.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
                        // 重置可能由 handleTouchMove 设置的样式
                        item.style.boxShadow = '';
                        item.style.borderColor = '';
                    });
                    
                    // 强制重绘，确保 transition 已应用
                    document.body.offsetHeight;
                    
                    // 直接收缩到下一个状态的位置（不是回缩到当前位置）
                    items.forEach(item => {
                        const className = item.className;
                        
                        if (direction === 'next') {
                            // 左滑手势（手指从右到左）：显示右边的牌
                            if (className.includes('active')) {
                                // active → prev 位置
                                item.style.transform = 'translateX(-200px) scale(0.8) rotateY(35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('prev') && !className.includes('prev-prev')) {
                                // prev → prev-prev 位置
                                item.style.transform = 'translateX(-380px) scale(0.5) rotateY(55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            } else if (className.includes('next') && !className.includes('next-next')) {
                                // next → active 位置
                                item.style.transform = 'translateX(0) scale(1.15) rotateY(0deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '10';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('next-next')) {
                                // next-next → next 位置
                                item.style.transform = 'translateX(200px) scale(0.8) rotateY(-35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('prev-prev')) {
                                // prev-prev → next-next 位置（绕回）
                                item.style.transform = 'translateX(380px) scale(0.5) rotateY(-55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            }
                        } else {
                            // 右滑手势（手指从左到右）：显示左边的牌
                            if (className.includes('active')) {
                                // active → next 位置
                                item.style.transform = 'translateX(200px) scale(0.8) rotateY(-35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('next') && !className.includes('next-next')) {
                                // next → next-next 位置
                                item.style.transform = 'translateX(380px) scale(0.5) rotateY(-55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            } else if (className.includes('prev') && !className.includes('prev-prev')) {
                                // prev → active 位置
                                item.style.transform = 'translateX(0) scale(1.15) rotateY(0deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '10';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('prev-prev')) {
                                // prev-prev → prev 位置
                                item.style.transform = 'translateX(-200px) scale(0.8) rotateY(35deg)';
                                item.style.opacity = '1';
                                item.style.zIndex = '25';
                                item.style.filter = 'blur(0px)';
                            } else if (className.includes('next-next')) {
                                // next-next → prev-prev 位置（绕回）
                                item.style.transform = 'translateX(-380px) scale(0.5) rotateY(55deg)';
                                item.style.opacity = '0.25';
                                item.style.zIndex = '1';
                                item.style.filter = 'blur(4px)';
                            }
                        }
                    });
                }); // requestAnimationFrame 结束
                
                // 回缩动画完成后，更新索引和class
                setTimeout(() => {
                    const items = document.querySelectorAll('.carousel-item');
                    
                    // 更新索引
                    if (direction === 'next') {
                        currentGameIndex = (currentGameIndex + 1) % gamesData.length;
                    } else {
                        currentGameIndex = (currentGameIndex - 1 + gamesData.length) % gamesData.length;
                    }
                    
                    // 更新class（保持内联样式，用户看不到变化）
                    items.forEach(item => {
                        const currentClass = item.className;
                        let newClass = currentClass;
                        
                        if (direction === 'next') {
                            // 左滑：active→prev, prev→prev-prev, next→active, next-next→next, prev-prev→next-next
                            if (currentClass.includes('active')) {
                                newClass = currentClass.replace('active', 'prev');
                            } else if (currentClass.includes('prev') && !currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev', 'prev-prev');
                            } else if (currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev-prev', 'next-next');
                            } else if (currentClass.includes('next') && !currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next', 'active');
                            } else if (currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next-next', 'next');
                            }
                        } else {
                            // 右滑：active→next, next→next-next, prev→active, prev-prev→prev, next-next→prev-prev
                            if (currentClass.includes('active')) {
                                newClass = currentClass.replace('active', 'next');
                            } else if (currentClass.includes('next') && !currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next', 'next-next');
                            } else if (currentClass.includes('next-next')) {
                                newClass = currentClass.replace('next-next', 'prev-prev');
                            } else if (currentClass.includes('prev') && !currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev', 'active');
                            } else if (currentClass.includes('prev-prev')) {
                                newClass = currentClass.replace('prev-prev', 'prev');
                            }
                        }
                        
                        item.className = newClass;
                    });
                    
                    // 强制重绘确保class更新
                    document.body.offsetHeight;
                    
                    // 清理内联样式（CSS会接管，位置和当前一致）
                    items.forEach(item => {
                        item.style.transition = '';
                        item.style.transform = '';
                        item.style.opacity = '';
                        item.style.zIndex = '';
                        item.style.filter = '';
                    });
                }, 600);
            }, 0); // 立即开始收缩动画
        }
    
    // 回弹动画 - 未触发切换阈值时回到原位
        function animateReset() {
        const items = document.querySelectorAll('.carousel-item');
        
        // 所有卡片都参与回弹动画
        items.forEach(item => {
            item.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
        });
        
        // 强制重绘
        document.body.offsetHeight;
        
        items.forEach(item => {
            const className = item.className;
            
            if (className.includes('active')) {
                item.style.transform = 'translateX(0) scale(1.15) rotateY(0deg)';
                item.style.opacity = '1';
                item.style.zIndex = '10';
                item.style.filter = 'blur(0px)';
            } else if (className.includes('prev')) {
                item.style.transform = 'translateX(-200px) scale(0.8) rotateY(35deg)';
                item.style.opacity = '1';
                item.style.zIndex = '25';
                item.style.filter = 'blur(0px)';
            } else if (className.includes('next')) {
                item.style.transform = 'translateX(200px) scale(0.8) rotateY(-35deg)';
                item.style.opacity = '1';
                item.style.zIndex = '25';
                item.style.filter = 'blur(0px)';
            } else if (className.includes('prev-prev')) {
                item.style.transform = 'translateX(-380px) scale(0.5) rotateY(55deg)';
                item.style.opacity = '0.25';
                item.style.zIndex = '1';
                item.style.filter = 'blur(4px)';
            } else if (className.includes('next-next')) {
                item.style.transform = 'translateX(380px) scale(0.5) rotateY(-55deg)';
                item.style.opacity = '0.25';
                item.style.zIndex = '1';
                item.style.filter = 'blur(4px)';
            }
        });
        
        // 清理内联样式
        setTimeout(() => {
            items.forEach(item => {
                item.style.transition = '';
                item.style.transform = '';
                item.style.opacity = '';
                item.style.zIndex = '';
                item.style.filter = '';
            });
        }, 600);
    }
    
    // 加载公告
        async function loadAnnouncements() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/announcements`);
                const data = await response.json();
                
                if (data.success) {
                    const announcements = document.getElementById('announcements');
                    // 只显示最新一条公告
                    const latestAnn = data.announcements[0];
                    if (latestAnn) {
                        announcements.innerHTML = `
                            <div class="announcement-item">
                                <strong>${latestAnn.title}</strong>
                                <p>${latestAnn.content}</p>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('加载公告失败:', error);
            }
        }
        
        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/leaderboard?limit=3`);
                const data = await response.json();
                
                if (data.success) {
                    const leaderboard = document.getElementById('leaderboard');
                    leaderboard.innerHTML = data.leaderboard.map((user, index) => `
                        <div class="leaderboard-item">
                            <span class="rank">${index + 1}</span>
                            <img src="../avatars/${user.avatar}" alt="" class="avatar-small">
                            <span class="name">${user.nickname}</span>
                            <span class="score">${user.chips}</span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
            }
        }
        
        // 进入游戏
        function enterGame(gameCode) {
            if (gameCode === 'poker') {
                window.location.href = '../games/poker/lobby.html';
            } else {
                showModal('该游戏即将上线，敬请期待！', 'info');
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        // 好友邀请相关
        let currentInvite = null;
        
        // 监听好友邀请（需要 Socket.io 连接）
        function initInviteListener() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            console.log('[Invite] 初始化邀请监听, user.id:', user.id, '类型:', typeof user.id);
            if (!user.id) return;
            
            // 连接到 poker 命名空间以接收邀请
            const socket = io(`${window.location.protocol}//${window.location.host}/poker`);
            
            socket.on('connect', () => {
                console.log('[Invite] 已连接到游戏服务器，监听 invite-' + user.id);
            });
            
            socket.on('connect_error', (err) => {
                console.error('[Invite] 连接错误:', err);
            });
            
            // 监听邀请通知
            const eventName = `invite-${user.id}`;
            console.log('[Invite] 监听事件:', eventName);
            socket.on(eventName, (data) => {
                console.log('[Invite] 收到邀请:', data);
                showInviteModal(data);
            });
        }

        // 隐藏邀请弹窗
        function hideInviteModal() {
            document.getElementById('inviteModal').classList.remove('show');
            currentInvite = null;
        }
        
        // 接受邀请
        function acceptInvite() {
            if (!currentInvite) return;
            
            hideInviteModal();
            // 跳转到房间页面
            window.location.href = `../games/poker/room.html?roomId=${currentInvite.roomId}`;

        // 页面加载时初始化邀请监听
        document.addEventListener('DOMContentLoaded', () => {
            initInviteListener();
        });
