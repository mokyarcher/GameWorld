<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 游戏大厅</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 自定义游戏风格弹窗 */
        .game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }
        .game-modal-overlay.show {
            display: flex;
        }
        .game-modal-content {
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(220, 20, 60, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 30px rgba(220, 20, 60, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        .game-modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .game-modal-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .game-modal-message {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .game-modal-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #dc143c 0%, #8b0000 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.5);
        }
        .game-modal-btn.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }
        .game-modal-btn.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        /* 邀请通知弹窗 */
        .invite-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        
        .invite-modal-overlay.show {
            display: flex;
        }
        
        .invite-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(102, 126, 234, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        
        .invite-modal-content .invite-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .invite-modal-content .invite-title {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .invite-modal-content .invite-info {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .invite-modal-content .invite-info div {
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }
        
        .invite-modal-content .invite-info div:last-child {
            margin-bottom: 0;
        }
        
        .invite-modal-content .invite-actions {
            display: flex;
            gap: 15px;
        }
        
        .invite-modal-content .invite-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .invite-modal-content .invite-btn.accept {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .invite-modal-content .invite-btn.accept:hover {
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.5);
        }
        
        .invite-modal-content .invite-btn.reject {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .invite-modal-content .invite-btn.reject:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 滚轴式游戏选择器样式 - 精美版 */
        .game-carousel-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 0;
        }
        
        .game-carousel {
            position: relative;
            height: 450px;
            overflow: visible;
            perspective: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 用户信息徽章 - 赌场风格 */
        .user-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .user-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }
        
        .user-badge:hover {
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.2);
            transform: translateY(-2px);
        }
        
        .user-badge .badge-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2px;
        }
        
        .user-badge .badge-value {
            font-size: 16px;
            font-weight: 800;
            color: #dc143c;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
        }
        
        .chips-badge {
            cursor: default;
        }
        
        .chips-badge:hover {
            border-color: rgba(220, 20, 60, 0.3);
            box-shadow: none;
            transform: none;
        }
        
        /* 面板标题样式 */
        .panel h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: #dc143c;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .panel-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }
        
        .carousel-item {
            position: absolute;
            width: 260px;
            height: 380px;
            border-radius: 8px;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            border: none;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,215,0,0.1),
                inset 0 1px 0 rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            user-select: none;
            transform-origin: center center;
        }
        
        /* 卡片光效 */
        .carousel-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,215,0,0.1),
                transparent
            );
            transition: left 0.8s ease;
            pointer-events: none;
        }
        
        .carousel-item:hover::before {
            left: 100%;
        }
        
        /* 卡片边框发光 - 选中状态立即显示 */
        .carousel-item::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.4), transparent, rgba(139, 0, 0, 0.2));
            z-index: -1;
            opacity: 0;
            /* 非active状态才有过渡，active立即显示 */
            transition: opacity 0.1s ease;
        }
        
        .carousel-item.active {
            transform: translateX(0) scale(1.15) rotateY(0deg);
            border-color: #dc143c;
            box-shadow: 
                0 0 60px rgba(220, 20, 60, 0.6),
                0 25px 80px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.2);
            z-index: 20;
        }
        
        .carousel-item.active::after {
            opacity: 1;
            /* active状态无过渡，立即显示 */
            transition: none;
        }
        
        /* 卡牌名字遮罩 */
        .card-name-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px 15px;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0.95) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 0 0 8px 8px;
        }
        
        .card-name-label {
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 3px;
            color: rgba(220, 20, 60, 0.8);
            margin-bottom: 3px;
        }
        
        .card-name-text {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px rgba(220, 20, 60, 0.5);
            letter-spacing: 1px;
        }
        
        .carousel-item.prev {
            transform: translateX(-200px) scale(0.8) rotateY(35deg);
            opacity: 1;
            filter: brightness(0.9);
            z-index: 25;
        }
        
        .carousel-item.next {
            transform: translateX(200px) scale(0.8) rotateY(-35deg);
            opacity: 1;
            filter: brightness(0.9);
            z-index: 25;
        }
        
        .carousel-item.hidden {
            transform: translateX(0) scale(0.5);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }
        
        /* 更远的左侧卡片 - 始终在最外侧，不靠近中间 */
        .carousel-item.prev-prev {
            transform: translateX(-380px) scale(0.5) rotateY(55deg);
            opacity: 0.25;
            z-index: 1;
            filter: blur(4px);
            pointer-events: none;
        }
        
        /* 更远的右侧卡片 - 始终在最外侧，不靠近中间 */
        .carousel-item.next-next {
            transform: translateX(380px) scale(0.5) rotateY(-55deg);
            opacity: 0.25;
            z-index: 1;
            filter: blur(4px);
            pointer-events: none;
        }
        
        /* 最远侧的左右卡片 - 滑动时会靠近 */

        
        /* 卡牌图片 */
        .carousel-item .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }
        
        /* 游戏名称区域 */
        /* 选中标记已移除 */
        
        /* 箭头按钮 - 精美版 - GameWorld 蓝紫主题 */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(145deg, #dc143c, #8b0000);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 8px 25px rgba(102, 126, 234, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.3);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 30;
        }
        
        .carousel-arrow::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.5), transparent, rgba(139, 0, 0, 0.3));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .carousel-arrow:hover::before {
            opacity: 1;
        }
        
        .carousel-arrow:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 
                0 12px 35px rgba(102, 126, 234, 0.6),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .carousel-arrow:active {
            transform: translateY(-50%) scale(0.98);
            box-shadow: 
                0 4px 15px rgba(102, 126, 234, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .carousel-prev {
            left: calc(50% - 200px);
        }
        
        .carousel-next {
            right: calc(50% - 200px);
        }
            z-index: 20;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(255,215,0,0.4);
        }
        
        .carousel-arrow:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 6px 20px rgba(255,215,0,0.6);
        }
        
        .carousel-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }
        
        .carousel-prev {
            left: 10px;
        }
        
        .carousel-next {
            right: 10px;
        }
        
        /* 游戏信息区域已移除 */
        
        .btn-enter-game {
            padding: 15px 50px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        
        .btn-enter-game:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }
        
        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        /* 进入游戏按钮 - 徽章风格 */
        .enter-game-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        
        .enter-game-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 40px;
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.4);
        }
        
        .enter-game-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.8;
        }
        
        .enter-game-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(220, 20, 60, 0.6);
            border-color: rgba(220, 20, 60, 0.8);
        }
        
        .enter-game-btn:active {
            transform: translateY(-1px);
        }
        
        .enter-game-btn .enter-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 4px;
        }
        
        .enter-game-btn .enter-text {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        .carousel-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .carousel-indicator.active {
            background: #dc143c;
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.6);
            transform: scale(1.3);
        }
        
        /* 触摸滑动支持 */
        .game-carousel {
            touch-action: pan-y;
        }
        
        /* 平板适配 (768px - 1024px) - 布局保持与PC一致，只调整宽度和卡牌大小 */
        @media (min-width: 769px) and (max-width: 1024px) {
            .main-content {
                padding: 20px;
                gap: 20px;
            }
            
            /* 侧边栏弄窄一点 */
            .sidebar {
                width: 220px;
                min-width: 220px;
            }
            
            /* 游戏区域向上移 */
            .games-section {
                margin-top: -30px;
            }
            
            .panel {
                padding: 15px;
            }
            
            .panel h3 {
                font-size: 15px;
                margin-bottom: 12px;
            }
            
            /* 公告样式 */
            .announcement-item {
                padding: 10px;
            }
            
            .announcement-item strong {
                font-size: 13px;
            }
            
            .announcement-item p {
                font-size: 12px;
                line-height: 1.4;
            }
            
            /* 排行榜样式 */
            .leaderboard-item {
                padding: 8px;
                margin-bottom: 6px;
            }
            
            .leaderboard-item .rank {
                width: 20px;
                height: 20px;
                font-size: 11px;
            }
            
            .leaderboard-item .name {
                font-size: 12px;
            }
            
            .leaderboard-item .score {
                font-size: 11px;
            }
            
            /* 游戏轮播区域 */
            .game-carousel {
                height: 320px;
            }
            
            .carousel-item {
                width: 170px;
                height: 250px;
                border-radius: 18px;
            }
            
            .carousel-item.prev {
                transform: translateX(-120px) scale(0.72) rotateY(30deg);
                opacity: 0.5;
            }
            
            .carousel-item.next {
                transform: translateX(120px) scale(0.72) rotateY(-30deg);
                opacity: 0.5;
            }
            
            .carousel-item.prev-prev {
                transform: translateX(-220px) scale(0.55) rotateY(45deg);
                opacity: 0.3;
                filter: blur(1px);
            }
            
            .carousel-item.next-next {
                transform: translateX(220px) scale(0.55) rotateY(-45deg);
                opacity: 0.3;
                filter: blur(1px);
            }
            

            
            .carousel-item .game-icon-overlay {
                font-size: 48px;
            }
            
            .carousel-item .game-name {
                font-size: 0.95rem;
            }
            
            .carousel-arrow {
                width: 34px;
                height: 48px;
                font-size: 18px;
            }
            
            .carousel-prev {
                left: calc(50% - 125px);
            }
            
            .carousel-next {
                right: calc(50% - 125px);
            }
        }
        
        /* 手机适配 */
        @media (max-width: 768px) {
            .game-carousel {
                height: 320px;
            }
            
            .carousel-item {
                width: 160px;
                height: 240px;
            }
            
            .carousel-item.prev {
                transform: translateX(-100px) scale(0.7) rotateY(25deg);
                opacity: 0.5;
            }
            
            .carousel-item.next {
                transform: translateX(100px) scale(0.7) rotateY(-25deg);
                opacity: 0.5;
            }
            
            .carousel-item.prev-prev {
                transform: translateX(-180px) scale(0.5) rotateY(40deg);
                opacity: 0.25;
                filter: blur(2px);
            }
            
            .carousel-item.next-next {
                transform: translateX(180px) scale(0.5) rotateY(-40deg);
                opacity: 0.25;
                filter: blur(2px);
            }
            

            
            .carousel-item .game-icon-overlay {
                font-size: 50px;
            }
            
            .carousel-item .game-name {
                font-size: 0.9rem;
            }
            
            .carousel-arrow {
                width: 32px;
                height: 48px;
                font-size: 18px;
                border-radius: 8px;
            }
            
            .carousel-prev {
                left: calc(50% - 110px);
            }
            
            .carousel-next {
                right: calc(50% - 110px);
            }
        }
        
        /* 徽章风格按钮 - 红色渐变背景 */
        .glass-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.4);
            color: #fff;
            margin-left: 8px;
        }

        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.8;
        }

        .glass-btn:hover {
            transform: translateY(-2px);

    <script>
        // 显示自定义弹窗
        function showModal(message, type = 'info', callback) {
            const modal = document.getElementById('gameModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const btn = document.getElementById('modalBtn');
            
            msg.textContent = message;
            
            // 重置按钮样式
            btn.className = 'game-modal-btn';
            
            switch(type) {
                case 'success':
                    icon.textContent = '✅';
                    title.textContent = '成功';
                    btn.classList.add('success');
                    break;
                case 'error':
                    icon.textContent = '❌';
                    title.textContent = '错误';
                    btn.classList.add('error');
                    break;
                default:
                    icon.textContent = 'ℹ️';
                    title.textContent = '提示';
            }
            
            modal.classList.add('show');
            
            // 点击确定后的回调
            window.modalCallback = callback;
        }
        
        function closeModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }
        
        // 点击遮罩关闭
        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {

        // 自动检测 API 地址（支持本地和局域网访问）

        if (!token) {
            window.location.href = 'login.html';
        }
        
        // 页面加载时获取数据
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadGames();
            loadAnnouncements();
            loadLeaderboard();
            checkAdminStatus();
        });
        
        // 检查是否为管理员
        async function checkAdminStatus() {
            try {
                const response = await fetch(`${API_BASE}/admin/check`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.isAdmin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            } catch (error) {
                console.error('检查管理员状态失败:', error);
            }
        }
        
        // 进入后台管理
        function goToAdmin() {
            window.location.href = 'admin.html';
        }
        
        // 进入个人资料
        function goToProfile() {
            window.location.href = 'profile.html';
        }
        
        // 进入好友页面
        function goToFriends() {
            window.location.href = 'friends.html';
        }
        
        // 格式化筹码显示 - 用 M 代表百万
        function formatChips(chips) {
            const num = parseInt(chips) || 0;
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
        
        // 加载用户信息
        async function loadUserInfo() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userNickname').textContent = user.nickname || user.username || '玩家';
            document.getElementById('userChips').textContent = formatChips(user.chips || 0);
            if (user.avatar) {
                document.getElementById('userAvatar').src = `../avatars/${user.avatar}`;
            }
        }
        
        // 游戏数据
        let gamesData = [];
        let currentGameIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;
        let isDragging = false;
        
        // 加载游戏列表
        async function loadGames() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/games`);
                const data = await response.json();
                
                if (data.success) {
                    // 合并后端数据和测试数据

                            min_chips: 100,

                        },
                        {
                            game_code: 'mahjong',
                            game_name: '四川麻将',
                            description: '血战到底，刺激对战，胡牌不停',

                            max_players: 4
                        },
                        {
                            game_code: 'dice',
                            game_name: '骰子大战',
                            description: '比拼运气与胆识，摇出你的幸运数字',
                            min_chips: 50,
                            max_players: 6
                        },
                        {
                            game_code: 'slot',
                            game_name: '幸运老虎机',
                            description: '777大奖等你来拿，一夜暴富不是梦',
                            min_chips: 10,
                            max_players: 1
                        },

                    ];
                    
                    // 去重合并
                    const existingCodes = backendGames.map(g => g.game_code);
                    const uniqueTestGames = testGames.filter(g => !existingCodes.includes(g.game_code));
                    gamesData = [...backendGames, ...uniqueTestGames];
                    
                    renderCarousel();

                }
            } catch (error) {
                console.error('加载游戏列表失败:', error);
                // 如果后端加载失败，使用测试数据
                gamesData = [
                    {
                        game_code: 'poker',
                        game_name: '德州扑克',
                        description: '经典的德州扑克游戏，考验你的牌技和心理',
                        min_chips: 1000,
                        max_players: 9
                    },
                    {
                        game_code: 'chess',
                        game_name: '国际象棋',
                        description: '经典策略棋类游戏，考验你的智慧和谋略',
                        min_chips: 100,
                        max_players: 2
                    },
                    {
                        game_code: 'mahjong',
                        game_name: '四川麻将',
                        description: '血战到底，刺激对战，胡牌不停',
                        min_chips: 500,
                        max_players: 4
                    },
                    {
                        game_code: 'dice',
                        game_name: '骰子大战',
                        description: '比拼运气与胆识，摇出你的幸运数字',
                        min_chips: 50,
                        max_players: 6
                    },
                    {
                        game_code: 'slot',
                        game_name: '幸运老虎机',
                        description: '777大奖等你来拿，一夜暴富不是梦',
                        min_chips: 10,
                        max_players: 1
                    },

                ];
                renderCarousel();

            }
        }
        
        // 渲染滚轴
        // 获取游戏背景渐变
        // 获取游戏卡牌图片路径
        function getGameCardImage(gameCode) {
            const images = {
                'poker-classic': '../images/cards/poker-classic.jpg',
                'poker-texas': '../images/cards/poker-texas.jpg',
                'poker-omaha': '../images/cards/poker-omaha.jpg',
                'poker-pineapple': '../images/cards/poker-pineapple.jpg',
                'poker-shortdeck': '../images/cards/poker-shortdeck.jpg',
                'default': '../images/cards/poker-classic.jpg'
            };
            return images[gameCode] || images['default'];
        }
        
        function renderCarousel() {
            const track = document.getElementById('carouselTrack');
            const indicators = document.getElementById('carouselIndicators');
            
            track.innerHTML = gamesData.map((game, index) => {
                const cardImage = getGameCardImage(game.game_code);
                return `
                    <div class="carousel-item ${getItemClass(index)}" data-index="${index}" onclick="handleCardClick(${index})">
                        <img class="card-image" src="${cardImage}" alt="${game.game_name}">
                        <div class="card-name-overlay">
                            <span class="card-name-label">GAME</span>
                            <span class="card-name-text">${game.game_name}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            indicators.innerHTML = gamesData.map((_, index) => `
                <div class="carousel-indicator ${index === currentGameIndex ? 'active' : ''}" onclick="selectGame(${index})"></div>
            `).join('');
            
            // 添加触摸事件
            const carousel = document.getElementById('gameCarousel');
            carousel.addEventListener('touchstart', handleTouchStart, { passive: true });
            carousel.addEventListener('touchmove', handleTouchMove, { passive: true });
            carousel.addEventListener('touchend', handleTouchEnd, { passive: true });
            
            // 添加鼠标事件（模拟滑动）
            carousel.addEventListener('mousedown', handleMouseDown);
            carousel.addEventListener('mousemove', handleMouseMove);
            carousel.addEventListener('mouseup', handleMouseUp);
            carousel.addEventListener('mouseleave', handleMouseUp);
        }
        
        // 获取项目类名
        function getItemClass(index) {
            const diff = index - currentGameIndex;
            const len = gamesData.length;
            
            // 处理环形索引
            let normalizedDiff = diff;
            if (diff > len / 2) normalizedDiff = diff - len;
            if (diff < -len / 2) normalizedDiff = diff + len;
            
            if (normalizedDiff === 0) return 'active';
            if (normalizedDiff === 1) return 'next';
            if (normalizedDiff === -1) return 'prev';
            if (normalizedDiff === 2) return 'next-next';
            if (normalizedDiff === -2) return 'prev-prev';

            return 'hidden';
        }
        
        // 获取游戏图标
        function getGameIcon(gameCode) {
            const icons = {
                'poker': '🃏',
                'chess': '♟️',
                'mahjong': '🀄',
                'dice': '🎲',
                'slot': '🎰',

                'roulette': '🎯',
                'baccarat': '💎',
                'default': '🎮'
            };
            return icons[gameCode] || icons['default'];
        }
        
        // 处理卡片点击 - 仅切换，不进入游戏
        function handleCardClick(index) {
            if (index !== currentGameIndex) {
                // 点击其他卡片，切换到该卡片
                selectGame(index);
            }
            // 点击当前卡片不做任何操作，必须通过下方按钮进入游戏
        }
        
        function selectGame(index) {
            currentGameIndex = index;
            renderCarousel();
        }
        
        // 上一个游戏
        function prevGame() {
            currentGameIndex = (currentGameIndex - 1 + gamesData.length) % gamesData.length;
            renderCarousel();

        }
        
        // 下一个游戏
        function nextGame() {
            currentGameIndex = (currentGameIndex + 1) % gamesData.length;
            renderCarousel();

        }
        
        // 更新选中游戏信息
        // 进入选中的游戏
        function enterSelectedGame() {
            const game = gamesData[currentGameIndex];
            if (game) {
                enterGame(game.game_code);
            }
        }
        
        // 速度追踪变量
        let lastTouchX = 0;
        let lastTouchTime = 0;
        let touchVelocity = 0; // 滑动速度（像素/毫秒）
        
        // 鼠标事件变量
        let isMouseDown = false;
        let mouseStartX = 0;
        let lastMouseX = 0;
        let mouseVelocity = 0;
        
        // 鼠标按下 - 模拟触摸开始
        function handleMouseDown(e) {
            e.preventDefault();
            isMouseDown = true;
            mouseStartX = e.screenX;
            lastMouseX = mouseStartX;
            mouseVelocity = 0;
            
            // 复用触摸开始的逻辑
            touchStartX = mouseStartX;
            isDragging = true;
            touchVelocity = 0;
            lastTouchX = touchStartX;
            lastTouchTime = Date.now();
            
            const items = document.querySelectorAll('.carousel-item');
            items.forEach(item => {
                item.style.transition = 'none';
                item.style.willChange = 'transform, opacity';
            });
        }
        
        // 鼠标移动 - 模拟触摸移动
        function handleMouseMove(e) {
            if (!isMouseDown) return;
            e.preventDefault();
            
            const currentX = e.screenX;
            const currentTime = Date.now();
            
            // 计算速度
            const timeDelta = currentTime - lastTouchTime;
            if (timeDelta > 0) {
                touchVelocity = (currentX - lastTouchX) / timeDelta;
            }
            lastTouchX = currentX;
            lastTouchTime = currentTime;
            
            // 复用触摸移动的逻辑
            const diff = currentX - touchStartX;
            const maxOffset = 200;
            const offset = Math.max(-maxOffset, Math.min(maxOffset, diff));
            const progress = offset / maxOffset;
            
            const items = document.querySelectorAll('.carousel-item');
            items.forEach((item, index) => {
                const className = item.className;
                
                if (className.includes('active')) {
                    const targetScale = 0.8;
                    const startScale = 1.15;
                    const scale = startScale - Math.abs(progress) * (startScale - targetScale);
                    const translateX = offset;
                    const rotateY = -progress * 15;
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = 1 - Math.abs(progress) * 0.3;
                    item.style.zIndex = 10;
                } else if (className.includes('prev-prev')) {
                    let translateX, scale, rotateY, opacity, blur;
                    if (progress > 0) {
                        const startX = -380;
                        const targetX = -200;
                        const startScale = 0.5;
                        const targetScale = 0.8;
                        translateX = startX + progress * (targetX - startX);
                        scale = startScale + progress * (targetScale - startScale);
                        rotateY = 55 - progress * 20;
                        const clarityProgress = Math.min(1, progress * 1.5);
                        opacity = 0.25 + clarityProgress * 0.75;
                        blur = Math.max(0, 4 - clarityProgress * 4);
                    } else if (progress < -0.5) {
                        const wrapProgress = (Math.abs(progress) - 0.5) * 2;
                        const startX = -500;
                        const targetX = 380;
                        const startScale = 0.4;
                        const targetScale = 0.5;
                        translateX = startX + wrapProgress * (targetX - startX);
                        scale = startScale + wrapProgress * (targetScale - startScale);
                        rotateY = -55 + wrapProgress * 20;
                        opacity = wrapProgress * 0.25;
                        blur = 6 - wrapProgress * 2;
                    } else {
                        translateX = -380 - Math.abs(progress) * 100;
                        scale = 0.5 - Math.abs(progress) * 0.1;
                        rotateY = 55 + Math.abs(progress) * 10;
                        opacity = 0.25 - Math.abs(progress) * 0.25;
                        blur = 4 + Math.abs(progress) * 2;
                    }
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = opacity;
                    item.style.zIndex = progress < -0.5 ? '0' : '1';
                    item.style.filter = `blur(${blur}px)`;
                } else if (className.includes('next-next')) {
                    let translateX, scale, rotateY, opacity, blur;
                    if (progress < 0) {
                        const startX = 380;
                        const targetX = 200;
                        const startScale = 0.5;
                        const targetScale = 0.8;
                        translateX = startX + Math.abs(progress) * (targetX - startX);
                        scale = startScale + Math.abs(progress) * (targetScale - startScale);
                        rotateY = -55 + Math.abs(progress) * 20;
                        const clarityProgress = Math.min(1, Math.abs(progress) * 1.5);
                        opacity = 0.25 + clarityProgress * 0.75;
                        blur = Math.max(0, 4 - clarityProgress * 4);
                    } else if (progress > 0.5) {
                        const wrapProgress = (progress - 0.5) * 2;
                        const startX = 500;
                        const targetX = -380;
                        const startScale = 0.4;
                        const targetScale = 0.5;
                        translateX = startX - wrapProgress * (startX - targetX);
                        scale = startScale + wrapProgress * (targetScale - startScale);
                        rotateY = 55 - wrapProgress * 20;
                        opacity = wrapProgress * 0.25;
                        blur = 6 - wrapProgress * 2;
                    } else {
                        translateX = 380 + progress * 100;
                        scale = 0.5 - progress * 0.1;
                        rotateY = -55 - progress * 10;
                        opacity = 0.25 - progress * 0.25;
                        blur = 4 + progress * 2;
                    }
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = opacity;
                    item.style.zIndex = progress > 0.5 ? '0' : '1';
                    item.style.filter = `blur(${blur}px)`;
                } else if (className.includes('prev') && !className.includes('prev-prev')) {
                    const baseX = -200;
                    const translateX = baseX + progress * 200;
                    let scale, rotateY, opacity, blur;
                    if (progress > 0) {
                        scale = 0.8 + progress * 0.35;
                        rotateY = 35 - progress * 35;
                        opacity = 1;
                        blur = 0;
                    } else {
                        const touchScale = progress > -0.1 ? 0.85 : 0.8;
                        scale = touchScale + progress * 0.1;
                        rotateY = 35 - progress * 15;
                        opacity = 1 - Math.abs(progress) * 0.5;
                        blur = Math.abs(progress) * 2;
                    }
                    const zIndex = 25;
                    item.style.transform = `translateX(${translateX}px) scale(${scale}) rotateY(${rotateY}deg)`;
                    item.style.opacity = Math.max(0.3, opacity);
                    item.style.zIndex = zIndex;
                    item.style.filter = `blur(${blur}px)`;
                    if (progress > 0.3) {
                        const glowProgress = (progress - 0.3) / 0.7;
                        item.style.boxShadow = `
                            0 0 ${30 + 30 * glowProgress}px rgba(102, 126, 234, ${0.3 + 0.3 * glowProgress}),
                            0 15px 40px rgba(0,0,0,0.5),
                            inset 0 1px 0 rgba(255,255,255,0.1)
                        `;
                        item.style.borderColor = `rgba(102, 126, 234, ${0.4 + 0.6 * glowProgress})`;
                    } else {
                        item.style.boxShadow = '';
                        item.style.borderColor = '';
                    }
                } else if (className.includes('next') && !className.includes('next-next')) {
                    const baseX = 200;
                    const translateX = baseX + progress * 200;
                    let scale, rotateY, opacity, blur;
                    if (progress < 0) {
                        scale = 0.8 + Math.abs(progress) * 0.35;
                        rotateY = -35 - progress * 35;
                        opacity = 1;
                        blur = 0;
                    } else {
                        const touchScale = progress < 0.1 ? 0.85 : 0.8;

                    const announcements = document.getElementById('announcements');
                    // 只显示最新一条公告
                    const latestAnn = data.announcements[0];
                    if (latestAnn) {
                        announcements.innerHTML = `
                            <div class="announcement-item">
                                <strong>${latestAnn.title}</strong>
                                <p>${latestAnn.content}</p>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('加载公告失败:', error);
            }
        }
        
        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/leaderboard?limit=3`);
                const data = await response.json();
                
                if (data.success) {
                    const leaderboard = document.getElementById('leaderboard');
                    leaderboard.innerHTML = data.leaderboard.map((user, index) => `
                        <div class="leaderboard-item">
                            <span class="rank">${index + 1}</span>
                            <span class="name">${user.nickname}</span>
                            <span class="score">${user.chips}</span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
            }
        }
        
        // 进入游戏
        function enterGame(gameCode) {
            if (gameCode === 'poker') {
                window.location.href = '../games/poker/lobby.html';
            } else {
                showModal('该游戏即将上线，敬请期待！', 'info');
            }
        }
        
        // 进入当前选中的游戏
        function enterCurrentGame() {
            if (gamesData[currentGameIndex]) {
                enterGame(gamesData[currentGameIndex].game_code);
            }
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        // 好友邀请相关
        let currentInvite = null;
        
        // 监听好友邀请（需要 Socket.io 连接）
        function initInviteListener() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            console.log('[Invite] 初始化邀请监听, user.id:', user.id, '类型:', typeof user.id);
            if (!user.id) return;
            
            // 连接到 poker 命名空间以接收邀请
            const socket = io(`${window.location.protocol}//${window.location.host}/poker`);
            
            socket.on('connect', () => {
                console.log('[Invite] 已连接到游戏服务器，监听 invite-' + user.id);
            });
            
            socket.on('connect_error', (err) => {
                console.error('[Invite] 连接错误:', err);
            });
            
            // 监听邀请通知
            const eventName = `invite-${user.id}`;
            console.log('[Invite] 监听事件:', eventName);
            socket.on(eventName, (data) => {
                console.log('[Invite] 收到邀请:', data);
                showInviteModal(data);
            });
        }
        
        // 显示邀请弹窗
        function showInviteModal(inviteData) {
            currentInvite = inviteData;
            
            const infoHtml = `
                <div><strong>${inviteData.inviterName}</strong> 邀请你加入游戏</div>
                <div>房间: ${inviteData.roomName}</div>
                <div>盲注: ${inviteData.smallBlind}/${inviteData.bigBlind}</div>
            `;
            
            document.getElementById('inviteInfo').innerHTML = infoHtml;
            document.getElementById('inviteModal').classList.add('show');
            
            // 播放提示音（如果浏览器支持）
            try {
                const audio = new Audio();
                audio.src = 'data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZSA0PVanu87plHQUuh9Dz2YU2Bhxqv+zplkcODVGm5O+4ZSAEMYrO89GFNwYdcfDr4ZdJDAtPp+XysWUeBjiS1/LNfi0GI33R8tOENAcdcO/r4phJDQxPp+TwxGUhBjqT1/PQfS4GI3/R8tSFNwYdcfDr4plHDAtQp+TwxmUgBDeOzvPVhjYGHG3A7+SaSQ0MTKjl8sZmIAQ2jc7z1YU1Bhxwv+zmm0gNC1Gn5O/EZSAFNo/M89CEMwYccPDs4ppIDQtRp+TvvWUfBTiOz/PShjUGG3Dw7OKbSA0LUqjl8b1kHwU3jM/z0oU1Bxtw8OzhmUgNC1Ko5fG+ZSAF'; // 简短的提示音
                audio.volume = 0.3;
                audio.play().catch(() => {});
            } catch (e) {}
        }
        
        // 隐藏邀请弹窗
        function hideInviteModal() {
            document.getElementById('inviteModal').classList.remove('show');
            currentInvite = null;
        }
        
        // 接受邀请
        function acceptInvite() {
            if (!currentInvite) return;
            
            hideInviteModal();
            // 跳转到房间页面
            window.location.href = `../games/poker/room.html?roomId=${currentInvite.roomId}`;
        }
        
        // 拒绝邀请
        function rejectInvite() {
            hideInviteModal();
        }
        
        // 页面加载时初始化邀请监听
        document.addEventListener('DOMContentLoaded', () => {
            initInviteListener();
        });
    </script>
</body>
</html>
