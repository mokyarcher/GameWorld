<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 后台管理</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn-refresh {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.5);
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-card h3 {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* 用户列表 */
        .users-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        
        .section-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-header h2 {
            font-size: 1.3rem;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            padding: 10px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.95rem;
            width: 250px;
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th,
        .users-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .users-table th {
            background: rgba(255,255,255,0.03);
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
        
        .users-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .user-info-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .user-name {
            display: flex;
            flex-direction: column;
        }
        
        .user-name .nickname {
            font-weight: 600;
        }
        
        .user-name .username {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        
        .admin-badge {
            display: inline-block;
            padding: 3px 10px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-radius: 12px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        
        .guest-badge {
            display: inline-block;
            padding: 3px 10px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 12px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        
        .chips-value {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-add {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .btn-sub {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn-set {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        
        .btn-action:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }
        
        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 16px;
            border: 2px solid rgba(102, 126, 234, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .modal-content .user-info-modal {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        
        .modal-content .current-chips {
            color: #ffd700;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: #1a1a2e;
            color: white;
            font-size: 1rem;
        }
        
        .form-group input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .modal-actions .btn {
            flex: 1;
        }
        
        .btn-confirm {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .btn-confirm:hover {
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.5);
        }
        
        .btn-cancel:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }
        
        .toast.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">👑 GameWorld 后台管理</div>
            <div class="header-actions">
                <button onclick="refreshData()" class="btn btn-refresh">🔄 刷新数据</button>
                <button onclick="backToHall()" class="btn btn-back">🏠 返回大厅</button>
            </div>
        </header>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总用户数</h3>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>注册用户数</h3>
                <div class="value" id="registeredUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>游客数</h3>
                <div class="value" id="guestUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>系统总筹码</h3>
                <div class="value" id="totalChips">-</div>
            </div>
        </div>
        
        <!-- 用户列表 -->
        <div class="users-section">
            <div class="section-header">
                <h2>👥 用户管理</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索用户名/昵称..." oninput="filterUsers()">
                </div>
            </div>
            <table class="users-table">
                <thead>
                    <tr>
                        <th>用户信息</th>
                        <th>类型</th>
                        <th>当前筹码</th>
                        <th>注册时间</th>
                        <th>最后登录</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="6" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 筹码操作弹窗 -->
    <div class="modal-overlay" id="chipsModal">
        <div class="modal-content">
            <h3>💰 调整筹码</h3>
            <div class="user-info-modal">
                <div id="modalUserName">用户名</div>
                <div class="current-chips" id="modalCurrentChips">0</div>
            </div>
            <div class="form-group">
                <label>操作类型</label>
                <select id="operationType">
                    <option value="add">➕ 增加筹码</option>
                    <option value="subtract">➖ 减少筹码</option>
                    <option value="set">📝 设置为指定数值</option>
                </select>
            </div>
            <div class="form-group">
                <label>筹码数量</label>
                <input type="number" id="chipsAmount" placeholder="请输入数量" min="0">
            </div>
            <div class="form-group">
                <label>备注（可选）</label>
                <input type="text" id="operationReason" placeholder="操作原因...">
            </div>
            <div class="modal-actions">
                <button onclick="confirmChipsOperation()" class="btn btn-confirm">确认</button>
                <button onclick="closeModal()" class="btn btn-cancel">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');
        let currentUser = null;
        let allUsers = [];
        let selectedUser = null;
        
        // 验证管理员权限
        async function checkAdmin() {
            try {
                const response = await fetch(`${API_BASE}/admin/check`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.isAdmin) {
                    alert('无管理员权限');
                    window.location.href = 'gamehall.html';
                    return false;
                }
                return true;
            } catch (error) {
                console.error('验证失败:', error);
                window.location.href = 'login.html';
                return false;
            }
        }
        
        // 加载用户数据
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    allUsers = data.users;
                    renderUsers(allUsers);
                    updateStats(allUsers);
                } else {
                    showToast(data.error || '加载失败', 'error');
                }
            } catch (error) {
                console.error('加载用户失败:', error);
                showToast('加载用户数据失败', 'error');
            }
        }
        
        // 渲染用户列表
        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>
                        <div class="user-info-cell">
                            <img src="../avatars/${user.avatar}" alt="" class="user-avatar">
                            <div class="user-name">
                                <span class="nickname">
                                    ${user.nickname}
                                    ${user.isAdmin ? '<span class="admin-badge">管理员</span>' : ''}
                                </span>
                                <span class="username">${user.username}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        ${user.isGuest ? '<span class="guest-badge">游客</span>' : '注册用户'}
                    </td>
                    <td class="chips-value">${user.chips.toLocaleString()}</td>
                    <td>${formatDate(user.createdAt)}</td>
                    <td>${formatDate(user.lastLogin)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-action btn-add" onclick="openChipsModal(${user.id}, 'add')" ${user.isAdmin ? 'disabled' : ''}>➕</button>
                            <button class="btn-action btn-sub" onclick="openChipsModal(${user.id}, 'subtract')" ${user.isAdmin ? 'disabled' : ''}>➖</button>
                            <button class="btn-action btn-set" onclick="openChipsModal(${user.id}, 'set')" ${user.isAdmin ? 'disabled' : ''}>📝</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // 更新统计
        function updateStats(users) {
            const total = users.length;
            const guests = users.filter(u => u.isGuest).length;
            const registered = total - guests;
            const totalChips = users.reduce((sum, u) => sum + u.chips, 0);
            
            document.getElementById('totalUsers').textContent = total;
            document.getElementById('registeredUsers').textContent = registered;
            document.getElementById('guestUsers').textContent = guests;
            document.getElementById('totalChips').textContent = totalChips.toLocaleString();
        }
        
        // 搜索过滤
        function filterUsers() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(user => 
                user.username.toLowerCase().includes(keyword) ||
                user.nickname.toLowerCase().includes(keyword)
            );
            renderUsers(filtered);
        }
        
        // 打开筹码操作弹窗
        function openChipsModal(userId, operation) {
            selectedUser = allUsers.find(u => u.id === userId);
            if (!selectedUser) return;
            
            document.getElementById('modalUserName').textContent = selectedUser.nickname;
            document.getElementById('modalCurrentChips').textContent = selectedUser.chips.toLocaleString() + ' 筹码';
            document.getElementById('operationType').value = operation;
            document.getElementById('chipsAmount').value = '';
            document.getElementById('operationReason').value = '';
            
            document.getElementById('chipsModal').classList.add('show');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('chipsModal').classList.remove('show');
            selectedUser = null;
        }
        
        // 确认筹码操作
        async function confirmChipsOperation() {
            if (!selectedUser) return;
            
            const operation = document.getElementById('operationType').value;
            const amount = parseInt(document.getElementById('chipsAmount').value);
            const reason = document.getElementById('operationReason').value;
            
            if (isNaN(amount) || amount < 0) {
                showToast('请输入有效的筹码数量', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/chips`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId: selectedUser.id,
                        amount,
                        operation,
                        reason
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    closeModal();
                    loadUsers(); // 刷新数据
                } else {
                    showToast(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('操作失败:', error);
                showToast('网络错误，请重试', 'error');
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 刷新数据
        function refreshData() {
            loadUsers();
            showToast('数据已刷新', 'success');
        }
        
        // 返回大厅
        function backToHall() {
            window.location.href = 'gamehall.html';
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', async () => {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                loadUsers();
            }
        });
        
        // 点击遮罩关闭弹窗
        document.getElementById('chipsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
