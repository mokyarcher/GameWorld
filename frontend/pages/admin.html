<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareX - 后台管理</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.1);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo::before {
            content: 'ADMIN';
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .logo-text {
            color: #fff;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.4);
            border-color: rgba(220, 20, 60, 0.8);
        }
        
        .btn-refresh {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.2);
            border-color: rgba(220, 20, 60, 0.6);
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: rgba(220, 20, 60, 0.4);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.1);
        }
        
        .stat-card h3 {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #dc143c;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.3);
        }
        
        /* 用户列表 */
        .users-section {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border-radius: 12px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.05);
        }
        
        .section-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(220, 20, 60, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-header h2 {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-header h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #dc143c;
            border-radius: 2px;
        }
        
        .section-header h2 {
            font-size: 1.3rem;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            padding: 10px 15px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 0.95rem;
            width: 250px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.2);
        }
        
        .search-box input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th,
        .users-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .users-table th {
            background: rgba(220, 20, 60, 0.1);
            font-weight: 600;
            color: rgba(220, 20, 60, 0.9);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .users-table tr:hover {
            background: rgba(220, 20, 60, 0.05);
        }
        
        .user-info-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid rgba(220, 20, 60, 0.3);
        }
        
        .user-name {
            display: flex;
            flex-direction: column;
        }
        
        .user-name .nickname {
            font-weight: 600;
        }
        
        .user-name .username {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }
        
        .admin-badge {
            display: inline-block;
            padding: 3px 10px;
            background: linear-gradient(135deg, #dc143c, #8b0000);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
            font-weight: 600;
        }
        
        .guest-badge {
            display: inline-block;
            padding: 3px 10px;
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 8px;
            font-weight: 600;
        }
        
        /* 在线状态 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-badge.online {
            background: rgba(39, 174, 96, 0.15);
            color: #27ae60;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }
        
        .status-badge.online::before {
            background: #27ae60;
            box-shadow: 0 0 8px #27ae60;
        }
        
        .status-badge.offline {
            background: rgba(100, 100, 100, 0.15);
            color: #888;
            border: 1px solid rgba(100, 100, 100, 0.3);
        }
        
        .status-badge.offline::before {
            background: #666;
        }
        
        .chips-value {
            color: #dc143c;
            font-weight: 700;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(220, 20, 60, 0.3);
        }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        
        .btn-action {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-add {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.4);
        }
        
        .btn-add:hover {
            border-color: rgba(220, 20, 60, 0.8);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.3);
        }
        
        .btn-sub {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .btn-sub:hover {
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.4);
        }
        
        .btn-set {
            background: linear-gradient(145deg, rgba(60,60,60,0.9) 0%, rgba(40,40,40,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            color: white;
        }
        
        /* 账号状态 */
        .account-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .account-status.normal {
            background: rgba(39, 174, 96, 0.15);
            color: #27ae60;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }
        
        .account-status.locked {
            background: rgba(220, 20, 60, 0.15);
            color: #dc143c;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        /* 锁定/解锁按钮 */
        .btn-action.btn-lock {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.4);
            color: #dc143c;
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        
        .btn-action.btn-lock:hover {
            border-color: rgba(220, 20, 60, 0.8);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.3);
        }
        
        .btn-action.btn-unlock {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(39, 174, 96, 0.4);
            color: #27ae60;
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        
        .btn-action.btn-unlock:hover {
            border-color: rgba(39, 174, 96, 0.8);
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.3);
        }
        
        /* 积分操作按钮 */
        .btn-action.btn-chips {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            border: 1px solid rgba(220, 20, 60, 0.5);
            color: white;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .btn-action.btn-chips:hover {
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.4);
            border-color: rgba(220, 20, 60, 0.8);
        }
        
        /* 删除账号按钮 */
        .btn-action.btn-delete {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.5);
            color: #dc143c;
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        
        .btn-action.btn-delete:hover {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
            border-color: rgba(220, 20, 60, 0.8);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.4);
        }
        
        .btn-action:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }
        
        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, rgba(25,25,25,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 12px;
            border: 1px solid rgba(220, 20, 60, 0.4);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(220, 20, 60, 0.1);
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .modal-content .user-info-modal {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(220, 20, 60, 0.1);
            border: 1px solid rgba(220, 20, 60, 0.2);
            border-radius: 8px;
        }
        
        .modal-content .current-chips {
            color: #dc143c;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.3);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.2);
        }
        
        .form-group input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .modal-actions .btn {
            flex: 1;
        }
        
        .btn-confirm {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .btn-cancel {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .btn-confirm:hover {
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.4);
            border-color: rgba(220, 20, 60, 0.8);
        }
        
        .btn-cancel:hover {
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.2);
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .toast.error {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.5);
            color: #dc143c;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        
        /* 反馈管理样式 - 列表模式 */
        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .feedback-row {
            display: grid;
            grid-template-columns: 60px 120px 120px 100px 140px 100px;
            align-items: center;
            gap: 10px;
            background: linear-gradient(145deg, rgba(25,25,25,0.9) 0%, rgba(15,15,15,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.15);
            border-radius: 8px;
            padding: 12px 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .feedback-row:hover {
            border-color: rgba(220, 20, 60, 0.4);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.1);
            background: linear-gradient(145deg, rgba(35,25,25,0.9) 0%, rgba(25,15,15,0.95) 100%);
        }
        
        .feedback-col {
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .feedback-col.id {
            color: rgba(255,255,255,0.4);
            font-family: monospace;
        }
        
        .feedback-col.type {
            font-weight: 600;
        }
        
        .feedback-col.user {
            color: rgba(255,255,255,0.8);
        }
        
        .feedback-col.content {
            color: rgba(255,255,255,0.6);
            max-width: 100%;
        }
        
        .feedback-col.time {
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
        }
        
        .feedback-col.status {
            text-align: center;
        }
        
        /* 反馈类型标签 */
        .feedback-type-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(220, 20, 60, 0.15);
            border: 1px solid rgba(220, 20, 60, 0.3);
            color: #dc143c;
        }
        
        .feedback-type-tag.game_poker { background: rgba(155, 89, 182, 0.15); border-color: rgba(155, 89, 182, 0.3); color: #9b59b6; }
        .feedback-type-tag.game_other { background: rgba(52, 152, 219, 0.15); border-color: rgba(52, 152, 219, 0.3); color: #3498db; }
        .feedback-type-tag.feature_map { background: rgba(46, 204, 113, 0.15); border-color: rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .feedback-type-tag.feature_other { background: rgba(241, 196, 15, 0.15); border-color: rgba(241, 196, 15, 0.3); color: #f1c40f; }
        .feedback-type-tag.bug { background: rgba(231, 76, 60, 0.15); border-color: rgba(231, 76, 60, 0.3); color: #e74c3c; }
        .feedback-type-tag.other { background: rgba(149, 165, 166, 0.15); border-color: rgba(149, 165, 166, 0.3); color: #95a5a6; }
        
        /* 反馈状态标签 */
        .feedback-status-tag {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .feedback-status-tag.pending { background: rgba(241, 196, 15, 0.15); color: #f1c40f; border: 1px solid rgba(241, 196, 15, 0.3); }
        .feedback-status-tag.processing { background: rgba(52, 152, 219, 0.15); color: #3498db; border: 1px solid rgba(52, 152, 219, 0.3); }
        .feedback-status-tag.resolved { background: rgba(39, 174, 96, 0.15); color: #27ae60; border: 1px solid rgba(39, 174, 96, 0.3); }
        .feedback-status-tag.rejected { background: rgba(149, 165, 166, 0.15); color: #95a5a6; border: 1px solid rgba(149, 165, 166, 0.3); }
        
        /* 反馈列表表头 */
        .feedback-header-row {
            display: grid;
            grid-template-columns: 60px 120px 120px 100px 140px 100px;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(220, 20, 60, 0.2);
            margin-bottom: 8px;
        }
        
        /* 反馈详情弹窗 */
        .feedback-detail-modal .modal-content {
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .feedback-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(220, 20, 60, 0.2);
        }
        
        .feedback-detail-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .feedback-detail-meta-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .feedback-detail-content {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        
        .feedback-detail-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .feedback-detail-image:hover {
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.2);
        }
        
        .feedback-detail-reply {
            background: rgba(220, 20, 60, 0.1);
            border-left: 3px solid #dc143c;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
        }
        
        .feedback-detail-reply-label {
            font-size: 0.8rem;
            color: #dc143c;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .feedback-detail-reply-text {
            color: rgba(255,255,255,0.85);
            line-height: 1.6;
        }
        
        .feedback-detail-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 1px solid rgba(220, 20, 60, 0.2);
        }
        
        .feedback-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .feedback-btn:hover {
            transform: translateY(-1px);
        }
        
        .feedback-btn-reply {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
        }
        
        .feedback-btn-status {
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.4);
            color: white;
        }
        
        .feedback-btn-delete {
            background: transparent;
            border: 1px solid rgba(220, 20, 60, 0.4);
            color: #dc143c;
        }
        
        .feedback-btn-delete:hover {
            background: rgba(220, 20, 60, 0.1);
        }
        
        .feedback-btn-close {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        
        .feedback-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(220, 20, 60, 0.1);
        }
        
        .feedback-pagination button {
            padding: 8px 16px;
            background: linear-gradient(145deg, rgba(40,40,40,0.9) 0%, rgba(20,20,20,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .feedback-pagination button:hover:not(:disabled) {
            border-color: rgba(220, 20, 60, 0.6);
        }
        
        .feedback-pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .feedback-pagination span {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        /* 响应式调整 */
        @media (max-width: 900px) {
            .feedback-row, .feedback-header-row {
                grid-template-columns: 50px 100px 100px 80px 100px 80px;
                gap: 8px;
                padding: 10px;
            }
            .feedback-col {
                font-size: 0.75rem;
            }
        }
        
        /* 图片预览弹窗 */
        .image-preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            cursor: zoom-out;
        }
        
        .image-preview-modal.show {
            display: flex;
        }
        
        .image-preview-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo"><span class="logo-text">ShareX 后台管理</span></div>
            <div class="header-actions">
                <button onclick="refreshData()" class="btn btn-refresh">刷新数据</button>
                <button onclick="backToHall()" class="btn btn-back">返回大厅</button>
            </div>
        </header>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>总用户数</h3>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>注册用户数</h3>
                <div class="value" id="registeredUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>游客数</h3>
                <div class="value" id="guestUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>系统总积分</h3>
                <div class="value" id="totalChips">-</div>
            </div>
            <div class="stat-card" style="cursor:pointer;" onclick="goToBrainBattleQuestions()">
                <h3>🧠 脑力对决题库</h3>
                <div class="value" style="font-size:1.5rem;">点击管理</div>
            </div>
        </div>
        
        <!-- 加入我们申请管理 -->
        <div class="users-section" style="margin-bottom: 30px;">
            <div class="section-header">
                <h2>🚀 加入我们申请</h2>
                <div class="search-box">
                    <select id="joinFilter" onchange="loadJoinApplications()" style="width: 150px; padding: 10px; margin-right: 10px;">
                        <option value="">全部状态</option>
                        <option value="pending">待审核</option>
                        <option value="approved">已通过</option>
                        <option value="rejected">已拒绝</option>
                    </select>
                    <button onclick="loadJoinApplications()" class="btn btn-refresh" style="padding: 10px 20px;">刷新</button>
                </div>
            </div>
            <div id="joinContainer" style="padding: 20px;">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 反馈管理 -->
        <div class="users-section" style="margin-bottom: 30px;">
            <div class="section-header">
                <h2>💬 意见反馈管理</h2>
                <div class="search-box">
                    <select id="feedbackFilter" onchange="loadFeedback()" style="width: 150px; padding: 10px; margin-right: 10px;">
                        <option value="">全部状态</option>
                        <option value="pending">待处理</option>
                        <option value="processing">处理中</option>
                        <option value="resolved">已解决</option>
                        <option value="rejected">已拒绝</option>
                    </select>
                    <button onclick="loadFeedback()" class="btn btn-refresh" style="padding: 10px 20px;">刷新</button>
                </div>
            </div>
            <div id="feedbackContainer" style="padding: 20px;">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 用户列表 -->
        <div class="users-section">
            <div class="section-header">
                <h2>用户管理</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索用户名/昵称..." oninput="filterUsers()">
                </div>
            </div>
            <table class="users-table">
                <thead>
                    <tr>
                        <th>用户信息</th>
                        <th>类型</th>
                        <th>状态</th>
                        <th>当前积分</th>
                        <th>注册时间</th>
                        <th>最后登录</th>
                        <th>账号状态</th>
                        <th>账号操作</th>
                        <th>积分操作</th>
                        <th>删除账号</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr>
                        <td colspan="10" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- 反馈回复弹窗 -->
    <!-- 反馈详情弹窗 -->
    <div class="modal-overlay feedback-detail-modal" id="feedbackDetailModal">
        <div class="modal-content">
            <h3>💬 反馈详情 <span id="detailId" style="color: rgba(255,255,255,0.5); font-size: 0.8em;"></span></h3>
            <div class="feedback-detail-header">
                <div class="feedback-detail-meta">
                    <div class="feedback-detail-meta-row">
                        <span class="feedback-type-tag" id="detailType">-</span>
                        <span class="feedback-status-tag" id="detailStatus">-</span>
                    </div>
                    <div class="feedback-detail-meta-row">
                        <span style="color: rgba(255,255,255,0.7);">👤 <span id="detailUser">-</span></span>
                        <span style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">🕐 <span id="detailTime">-</span></span>
                    </div>
                </div>
            </div>
            <div class="feedback-detail-content" id="detailContent">-</div>
            <div id="detailImageContainer"></div>
            
            <!-- 回复历史区域 -->
            <div id="detailRepliesSection" style="margin-top: 20px; border-top: 1px solid rgba(220, 20, 60, 0.2); padding-top: 15px;">
                <div style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 12px; font-weight: 600;">📝 处理记录</div>
                <div id="detailRepliesList"></div>
            </div>
            
            <div class="feedback-detail-actions">
                <button class="feedback-btn feedback-btn-reply" onclick="openFeedbackReplyModalFromDetail()">💬 继续回复</button>
                <button class="feedback-btn feedback-btn-status" onclick="quickUpdateFeedbackStatusFromDetail('processing')">🔄 标记处理中</button>
                <button class="feedback-btn feedback-btn-status" onclick="quickUpdateFeedbackStatusFromDetail('resolved')">✅ 标记已解决</button>
                <button class="feedback-btn feedback-btn-delete" onclick="deleteFeedbackFromDetail()">🗑️ 删除</button>
                <button class="feedback-btn feedback-btn-close" onclick="closeFeedbackDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 回复反馈弹窗 -->
    <div class="modal-overlay" id="feedbackReplyModal">
        <div class="modal-content" style="max-width: 500px;">
            <h3>💬 回复反馈</h3>
            <div class="user-info-modal" style="text-align: left;">
                <div style="margin-bottom: 10px;"><strong>用户：</strong><span id="replyUserName">-</span></div>
                <div style="margin-bottom: 10px;"><strong>类型：</strong><span id="replyType">-</span></div>
                <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 6px; margin-bottom: 10px;">
                    <strong>反馈内容：</strong>
                    <div id="replyContent" style="margin-top: 5px; color: rgba(255,255,255,0.8);">-</div>
                </div>
            </div>
            <div class="form-group">
                <label>添加新回复</label>
                <textarea id="replyText" rows="4" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 8px; color: white; resize: vertical;" placeholder="请输入新的回复内容，会追加到历史记录中..."></textarea>
            </div>
            <div class="form-group">
                <label>更新状态</label>
                <select id="replyStatus" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 8px; color: white;">
                    <option value="processing">处理中</option>
                    <option value="resolved">已解决</option>
                    <option value="rejected">已拒绝</option>
                </select>
            </div>
            <div class="modal-actions">
                <button onclick="submitFeedbackReply()" class="btn btn-confirm">提交回复</button>
                <button onclick="closeFeedbackReplyModal()" class="btn btn-cancel">取消</button>
            </div>
        </div>
    </div>

    <!-- 积分操作弹窗 -->
    <div class="modal-overlay" id="chipsModal">
        <div class="modal-content">
            <h3>± 积分调整</h3>
            <div class="user-info-modal">
                <div id="modalUserName">用户名</div>
                <div class="current-chips" id="modalCurrentChips">0</div>
            </div>
            <div class="form-group">
                <label>操作类型</label>
                <select id="operationType">
                    <option value="add">➕ 增加积分</option>
                    <option value="subtract">➖ 减少积分</option>
                    <option value="set">📝 设置为指定数值</option>
                </select>
            </div>
            <div class="form-group">
                <label>积分数量</label>
                <input type="number" id="chipsAmount" placeholder="请输入数量" min="0">
            </div>
            <div class="form-group">
                <label>备注（可选）</label>
                <input type="text" id="operationReason" placeholder="操作原因...">
            </div>
            <div class="modal-actions">
                <button onclick="confirmChipsOperation()" class="btn btn-confirm">确认</button>
                <button onclick="closeModal()" class="btn btn-cancel">取消</button>
            </div>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');
        let currentUser = null;
        let allUsers = [];
        let selectedUser = null;
        
        // 验证管理员权限
        async function checkAdmin() {
            try {
                const response = await fetch(`${API_BASE}/admin/check`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (!data.isAdmin) {
                    alert('无管理员权限');
                    window.location.href = 'gamehall.html';
                    return false;
                }
                return true;
            } catch (error) {
                console.error('验证失败:', error);
                window.location.href = 'login.html';
                return false;
            }
        }
        
        // 加载用户数据
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    allUsers = data.users;
                    renderUsers(allUsers);
                    updateStats(allUsers);
                } else {
                    showToast(data.error || '加载失败', 'error');
                }
            } catch (error) {
                console.error('加载用户失败:', error);
                showToast('加载用户数据失败', 'error');
            }
        }
        
        // 渲染用户列表
        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="empty-state">暂无用户数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>
                        <div class="user-info-cell">
                            <img src="../avatars/${user.avatar}" alt="" class="user-avatar">
                            <div class="user-name">
                                <span class="nickname">
                                    ${user.nickname}
                                    ${user.isAdmin ? '<span class="admin-badge">管理员</span>' : ''}
                                </span>
                                <span class="username">${user.username}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        ${user.isGuest ? '<span class="guest-badge">游客</span>' : '注册用户'}
                    </td>
                    <td>
                        <span class="status-badge ${user.isOnline ? 'online' : 'offline'}">
                            ${user.isOnline ? '在线' : '离线'}
                        </span>
                    </td>
                    <td class="chips-value">${user.chips.toLocaleString()}</td>
                    <td>${formatDate(user.createdAt)}</td>
                    <td>${formatDate(user.lastLogin)}</td>
                    <td>
                        <span class="account-status ${user.isLocked ? 'locked' : 'normal'}">
                            ${user.isLocked ? '冻结' : '正常'}
                        </span>
                    </td>
                    <td>
                        <button class="btn-action ${user.isLocked ? 'btn-unlock' : 'btn-lock'}" 
                            onclick="toggleUserLock(${user.id}, ${user.isLocked})" 
                            ${user.isAdmin ? 'disabled' : ''}>
                            ${user.isLocked ? '🔓 解锁' : '🔒 锁定'}
                        </button>
                    </td>
                    <td>
                        <button class="btn-action btn-chips" onclick="openChipsModal(${user.id})" ${user.isAdmin ? 'disabled' : ''}>
                            ± 积分
                        </button>
                    </td>
                    <td>
                        <button class="btn-action btn-delete" onclick="deleteUser(${user.id})" ${user.isAdmin ? 'disabled' : ''}>
                            🗑️ 删除
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 更新统计
        function updateStats(users) {
            const total = users.length;
            const guests = users.filter(u => u.isGuest).length;
            const registered = total - guests;
            const totalChips = users.reduce((sum, u) => sum + u.chips, 0);
            
            document.getElementById('totalUsers').textContent = total;
            document.getElementById('registeredUsers').textContent = registered;
            document.getElementById('guestUsers').textContent = guests;
            document.getElementById('totalChips').textContent = totalChips.toLocaleString();
        }
        
        // 搜索过滤
        function filterUsers() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allUsers.filter(user => 
                user.username.toLowerCase().includes(keyword) ||
                user.nickname.toLowerCase().includes(keyword)
            );
            renderUsers(filtered);
        }
        
        // 打开积分操作弹窗
        function openChipsModal(userId, operation) {
            selectedUser = allUsers.find(u => u.id === userId);
            if (!selectedUser) return;
            
            document.getElementById('modalUserName').textContent = selectedUser.nickname;
            document.getElementById('modalCurrentChips').textContent = selectedUser.chips.toLocaleString() + ' 积分';
            document.getElementById('operationType').value = operation;
            document.getElementById('chipsAmount').value = '';
            document.getElementById('operationReason').value = '';
            
            document.getElementById('chipsModal').classList.add('show');
        }
        
        // 关闭弹窗
        function closeModal() {
            document.getElementById('chipsModal').classList.remove('show');
            selectedUser = null;
        }
        
        // 确认积分操作
        async function confirmChipsOperation() {
            if (!selectedUser) return;
            
            const operation = document.getElementById('operationType').value;
            const amount = parseInt(document.getElementById('chipsAmount').value);
            const reason = document.getElementById('operationReason').value;
            
            if (isNaN(amount) || amount < 0) {
                showToast('请输入有效的积分数量', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/chips`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId: selectedUser.id,
                        amount,
                        operation,
                        reason
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    closeModal();
                    loadUsers(); // 刷新数据
                } else {
                    showToast(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('操作失败:', error);
                showToast('网络错误，请重试', 'error');
            }
        }
        
        // 切换用户锁定状态
        async function toggleUserLock(userId, isLocked) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            const action = isLocked ? '解锁' : '锁定';
            if (!confirm(`确定要${action}用户 "${user.nickname}" 吗？`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/lock`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId,
                        isLocked: !isLocked
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message, 'success');
                    loadUsers(); // 刷新数据
                } else {
                    showToast(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('操作失败:', error);
                showToast('网络错误，请重试', 'error');
            }
        }
        
        // 删除用户账号
        async function deleteUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            // 二次确认
            if (!confirm(`⚠️ 警告：此操作不可恢复！\n\n确定要永久删除用户 "${user.nickname}" (${user.username}) 吗？\n\n该用户的所有数据（包括积分、好友关系等）都将被删除。`)) {
                return;
            }
            
            // 三次确认，要求输入用户名
            const confirmInput = prompt(`请输入用户名 "${user.username}" 以确认删除：`);
            if (confirmInput !== user.username) {
                showToast('删除操作已取消', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(`用户 "${user.nickname}" 已删除`, 'success');
                    loadUsers(); // 刷新数据
                } else {
                    showToast(data.error || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除失败:', error);
                showToast('网络错误，请重试', 'error');
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 刷新数据
        function refreshData() {
            loadUsers();
            loadFeedback();
            loadJoinApplications();
            showToast('数据已刷新', 'success');
        }
        
        // ==================== 反馈管理功能 ====================
        
        // 反馈类型映射
        const feedbackTypeMap = {
            'game_poker': '🎴 贵州扑克',
            'game_other': '🎮 其他游戏',
            'feature_map': '🗺️ 足迹空间',
            'feature_other': '🔧 其他功能',
            'bug': '🐛 Bug反馈',
            'other': '💡 其他建议'
        };
        
        const feedbackStatusMap = {
            'pending': '待处理',
            'processing': '处理中',
            'resolved': '已解决',
            'rejected': '已拒绝'
        };
        
        let currentFeedbackPage = 1;
        let currentFeedbackId = null;
        
        // 加载反馈列表
        async function loadFeedback(page = 1) {
            currentFeedbackPage = page;
            const container = document.getElementById('feedbackContainer');
            const status = document.getElementById('feedbackFilter').value;
            
            container.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                let url = `${API_BASE}/feedback?page=${page}&limit=10`;
                if (status) url += `&status=${status}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    renderFeedback(data.feedbacks, data.pagination);
                } else {
                    container.innerHTML = `<div class="empty-state">${data.error || '加载失败'}</div>`;
                }
            } catch (error) {
                console.error('加载反馈失败:', error);
                container.innerHTML = '<div class="empty-state">加载失败，请重试</div>';
            }
        }
        
        // 渲染反馈列表（列表模式）
        function renderFeedback(feedbacks, pagination) {
            const container = document.getElementById('feedbackContainer');
            
            if (feedbacks.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无反馈数据</div>';
                return;
            }
            
            const html = `
                <div class="feedback-header-row">
                    <div class="feedback-col">ID</div>
                    <div class="feedback-col">类型</div>
                    <div class="feedback-col">用户</div>
                    <div class="feedback-col">内容预览</div>
                    <div class="feedback-col">时间</div>
                    <div class="feedback-col" style="text-align: center;">状态</div>
                </div>
                <div class="feedback-list">
                    ${feedbacks.map(f => `
                        <div class="feedback-row" onclick="openFeedbackDetail(${f.id})">
                            <div class="feedback-col id">#${f.id}</div>
                            <div class="feedback-col type">
                                <span class="feedback-type-tag ${f.type}">${feedbackTypeMap[f.type] || f.type}</span>
                            </div>
                            <div class="feedback-col user">${f.username || '匿名'}</div>
                            <div class="feedback-col content" title="${escapeHtml(f.content)}">${escapeHtml(f.content.substring(0, 8))}${f.content.length > 8 ? '...' : ''}</div>
                            <div class="feedback-col time">${formatDate(f.created_at)}</div>
                            <div class="feedback-col status">
                                <span class="feedback-status-tag ${f.status}">${feedbackStatusMap[f.status]}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${pagination.totalPages > 1 ? `
                    <div class="feedback-pagination">
                        <button onclick="loadFeedback(${pagination.page - 1})" ${pagination.page <= 1 ? 'disabled' : ''}>上一页</button>
                        <span>第 ${pagination.page} / ${pagination.totalPages} 页 (共 ${pagination.total} 条)</span>
                        <button onclick="loadFeedback(${pagination.page + 1})" ${pagination.page >= pagination.totalPages ? 'disabled' : ''}>下一页</button>
                    </div>
                ` : `<div class="feedback-pagination"><span>共 ${pagination.total} 条反馈</span></div>`}
            `;
            
            container.innerHTML = html;
        }
        
        // 打开反馈详情弹窗
        async function openFeedbackDetail(feedbackId) {
            currentFeedbackId = feedbackId;
            
            try {
                const response = await fetch(`${API_BASE}/feedback/${feedbackId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const f = data.feedback;
                    const modal = document.getElementById('feedbackDetailModal');
                    
                    // 填充详情
                    document.getElementById('detailId').textContent = `#${f.id}`;
                    document.getElementById('detailType').textContent = feedbackTypeMap[f.type] || f.type;
                    document.getElementById('detailType').className = `feedback-type-tag ${f.type}`;
                    document.getElementById('detailUser').textContent = f.username || '匿名用户';
                    document.getElementById('detailTime').textContent = formatDate(f.created_at);
                    document.getElementById('detailStatus').textContent = feedbackStatusMap[f.status];
                    document.getElementById('detailStatus').className = `feedback-status-tag ${f.status}`;
                    document.getElementById('detailContent').textContent = f.content;
                    
                    // 图片
                    const imgContainer = document.getElementById('detailImageContainer');
                    if (f.imageUrl) {
                        imgContainer.innerHTML = `<img src="${f.imageUrl}" class="feedback-detail-image" onclick="previewFeedbackImage('${f.imageUrl}')">`;
                    } else {
                        imgContainer.innerHTML = '';
                    }
                    
                    // 渲染回复历史列表
                    renderRepliesList(f.replies || []);
                    
                    modal.classList.add('show');
                } else {
                    // API 返回错误
                    currentFeedbackId = null;
                    showToast(data.error || '反馈不存在', 'error');
                }
            } catch (error) {
                console.error('加载反馈详情失败:', error);
                currentFeedbackId = null;
                showToast('加载失败', 'error');
            }
        }
        
        // 关闭详情弹窗
        function closeFeedbackDetailModal() {
            document.getElementById('feedbackDetailModal').classList.remove('show');
            currentFeedbackId = null;
        }
        
        // 打开回复弹窗
        async function openFeedbackReplyModal(feedbackId) {
            currentFeedbackId = feedbackId;
            
            try {
                const response = await fetch(`${API_BASE}/feedback/${feedbackId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const f = data.feedback;
                    document.getElementById('replyUserName').textContent = f.username || '匿名用户';
                    document.getElementById('replyType').textContent = feedbackTypeMap[f.type] || f.type;
                    document.getElementById('replyContent').textContent = f.content;
                    // 清空输入框，支持多次回复
                    document.getElementById('replyText').value = '';
                    document.getElementById('replyStatus').value = f.status;
                    document.getElementById('feedbackReplyModal').classList.add('show');
                } else {
                    // API 返回错误
                    currentFeedbackId = null;
                    showToast(data.error || '反馈不存在', 'error');
                }
            } catch (error) {
                console.error('加载反馈详情失败:', error);
                currentFeedbackId = null;
                showToast('加载失败', 'error');
            }
        }
        
        // 关闭回复弹窗
        function closeFeedbackReplyModal() {
            document.getElementById('feedbackReplyModal').classList.remove('show');
            currentFeedbackId = null;
        }
        
        // 提交回复
        async function submitFeedbackReply() {
            if (!currentFeedbackId) return;
            
            const reply = document.getElementById('replyText').value.trim();
            const status = document.getElementById('replyStatus').value;
            
            try {
                const response = await fetch(`${API_BASE}/feedback/${currentFeedbackId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ admin_reply: reply, status })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('回复已提交', 'success');
                    closeFeedbackReplyModal();
                    // 刷新列表和当前详情
                    loadFeedback(currentFeedbackPage);
                    // 如果详情弹窗是打开状态，刷新它
                    const detailModal = document.getElementById('feedbackDetailModal');
                    if (detailModal.classList.contains('show') && currentFeedbackId) {
                        openFeedbackDetail(currentFeedbackId);
                    }
                } else {
                    showToast(data.error || '提交失败', 'error');
                }
            } catch (error) {
                console.error('提交回复失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 快速更新状态
        async function quickUpdateFeedbackStatus(feedbackId, status) {
            try {
                const response = await fetch(`${API_BASE}/feedback/${feedbackId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('状态已更新', 'success');
                    loadFeedback(currentFeedbackPage);
                } else {
                    showToast(data.error || '更新失败', 'error');
                }
            } catch (error) {
                console.error('更新状态失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 删除反馈
        async function deleteFeedback(feedbackId) {
            if (!confirm('确定要删除这条反馈吗？此操作不可恢复。')) return;
            
            try {
                const response = await fetch(`${API_BASE}/feedback/${feedbackId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('反馈已删除', 'success');
                    loadFeedback(currentFeedbackPage);
                } else {
                    showToast(data.error || '删除失败', 'error');
                }
            } catch (error) {
                console.error('删除反馈失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 渲染回复历史列表
        function renderRepliesList(replies) {
            const container = document.getElementById('detailRepliesList');
            
            if (!replies || replies.length === 0) {
                container.innerHTML = '<div style="color: rgba(255,255,255,0.4); font-size: 0.85rem; padding: 10px;">暂无处理记录</div>';
                return;
            }
            
            const html = replies.map((reply, index) => `
                <div class="feedback-reply-item" style="
                    background: rgba(220, 20, 60, 0.08);
                    border-left: 3px solid #dc143c;
                    padding: 12px 15px;
                    margin-bottom: 10px;
                    border-radius: 0 8px 8px 0;
                ">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                        <span style="font-size: 0.8rem; color: #dc143c; font-weight: 600;">
                            📢 回复 #${index + 1} · ${reply.admin_username || '管理员'}
                        </span>
                        <span style="font-size: 0.75rem; color: rgba(255,255,255,0.4);">
                            ${formatDate(reply.created_at)}
                        </span>
                    </div>
                    <div style="color: rgba(255,255,255,0.85); font-size: 0.9rem; line-height: 1.5;">
                        ${escapeHtml(reply.reply_content)}
                    </div>
                    ${reply.status_changed_to ? `
                        <div style="margin-top: 8px; font-size: 0.75rem; color: rgba(255,255,255,0.5);">
                            状态变更为: <span class="feedback-status-tag ${reply.status_changed_to}" style="font-size: 0.7rem; padding: 2px 8px;">${feedbackStatusMap[reply.status_changed_to]}</span>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            
            container.innerHTML = html;
        }
        
        // 从详情弹窗打开回复弹窗
        async function openFeedbackReplyModalFromDetail() {
            if (!currentFeedbackId) return;
            const feedbackId = currentFeedbackId; // 保存 ID
            closeFeedbackDetailModal();
            await openFeedbackReplyModal(feedbackId);
        }
        
        // 从详情弹窗快速更新状态
        async function quickUpdateFeedbackStatusFromDetail(status) {
            if (!currentFeedbackId) return;
            await quickUpdateFeedbackStatus(currentFeedbackId, status);
            closeFeedbackDetailModal();
        }
        
        // 从详情弹窗删除反馈
        async function deleteFeedbackFromDetail() {
            if (!currentFeedbackId) return;
            await deleteFeedback(currentFeedbackId);
            closeFeedbackDetailModal();
        }
        
        // 预览图片
        function previewFeedbackImage(url) {
            window.open(url, '_blank');
        }
        
        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== 加入我们申请管理功能 ====================
        
        let currentJoinPage = 1;
        let currentJoinId = null;
        
        const joinStatusMap = {
            'pending': '待审核',
            'approved': '已通过',
            'rejected': '已拒绝'
        };
        
        // 加载申请列表
        async function loadJoinApplications(page = 1) {
            currentJoinPage = page;
            const container = document.getElementById('joinContainer');
            const status = document.getElementById('joinFilter').value;
            
            container.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                let url = `${API_BASE}/join`;
                if (status) url += `?status=${status}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    // 手动分页
                    const allApps = data.applications || [];
                    const pageSize = 10;
                    const totalPages = Math.ceil(allApps.length / pageSize) || 1;
                    const start = (page - 1) * pageSize;
                    const end = start + pageSize;
                    const paginatedApps = allApps.slice(start, end);
                    
                    renderJoinApplications(paginatedApps, {
                        page: page,
                        totalPages: totalPages,
                        total: allApps.length
                    });
                } else {
                    container.innerHTML = `<div class="empty-state">${data.error || '加载失败'}</div>`;
                }
            } catch (error) {
                console.error('加载申请失败:', error);
                container.innerHTML = '<div class="empty-state">加载失败，请重试</div>';
            }
        }
        
        // 渲染申请列表
        function renderJoinApplications(applications, pagination) {
            const container = document.getElementById('joinContainer');
            
            if (applications.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无申请数据</div>';
                return;
            }
            
            const html = `
                <div class="feedback-header-row" style="grid-template-columns: 60px 120px 120px 100px 140px 100px;">
                    <div class="feedback-col">ID</div>
                    <div class="feedback-col">申请类型</div>
                    <div class="feedback-col">申请人</div>
                    <div class="feedback-col">联系方式</div>
                    <div class="feedback-col">申请时间</div>
                    <div class="feedback-col" style="text-align: center;">状态</div>
                </div>
                <div class="feedback-list">
                    ${applications.map(app => `
                        <div class="feedback-row" style="grid-template-columns: 60px 120px 120px 100px 140px 100px;" onclick="openJoinDetail(${app.id})">
                            <div class="feedback-col id">#${app.id}</div>
                            <div class="feedback-col type">
                                <span class="feedback-type-tag">${escapeHtml(app.project_type)}</span>
                            </div>
                            <div class="feedback-col user">${escapeHtml(app.username || '匿名')}</div>
                            <div class="feedback-col content" title="${escapeHtml(app.project_name || '')}">${escapeHtml((app.project_name || '').substring(0, 10))}${(app.project_name || '').length > 10 ? '...' : ''}</div>
                            <div class="feedback-col time">${formatDate(app.created_at)}</div>
                            <div class="feedback-col status">
                                <span class="feedback-status-tag ${app.status}">${joinStatusMap[app.status] || app.status}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${pagination.totalPages > 1 ? `
                    <div class="feedback-pagination">
                        <button onclick="loadJoinApplications(${pagination.page - 1})" ${pagination.page <= 1 ? 'disabled' : ''}>上一页</button>
                        <span>第 ${pagination.page} / ${pagination.totalPages} 页 (共 ${pagination.total} 条)</span>
                        <button onclick="loadJoinApplications(${pagination.page + 1})" ${pagination.page >= pagination.totalPages ? 'disabled' : ''}>下一页</button>
                    </div>
                ` : `<div class="feedback-pagination"><span>共 ${pagination.total} 条申请</span></div>`}
            `;
            
            container.innerHTML = html;
        }
        
        // 打开申请详情弹窗
        async function openJoinDetail(applicationId) {
            currentJoinId = applicationId;
            
            try {
                // 从已加载的数据中查找申请详情
                const response = await fetch(`${API_BASE}/join`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    const allApps = data.applications || [];
                    const app = allApps.find(a => a.id === applicationId);
                    
                    // 构建详情弹窗HTML
                    const detailHtml = `
                        <div class="modal-overlay show" id="joinDetailModal" onclick="if(event.target === this) closeJoinDetailModal()">
                            <div class="modal-content" style="max-width: 600px; max-height: 90vh; overflow-y: auto;">
                                <h3>🚀 申请详情 <span style="color: rgba(255,255,255,0.5); font-size: 0.8em;">#${app.id}</span></h3>
                                <div class="feedback-detail-header">
                                    <div class="feedback-detail-meta">
                                        <div class="feedback-detail-meta-row">
                                            <span class="feedback-type-tag">${escapeHtml(app.project_type)}</span>
                                            <span class="feedback-status-tag ${app.status}">${joinStatusMap[app.status] || app.status}</span>
                                        </div>
                                        <div class="feedback-detail-meta-row">
                                            <span style="color: rgba(255,255,255,0.7);">👤 ${escapeHtml(app.username || '匿名用户')}</span>
                                            <span style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">🕐 ${formatDate(app.created_at)}</span>
                                        </div>
                                    </div>
                                </div>
                                <div style="background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-bottom: 20px;">
                                    <div style="margin-bottom: 12px;">
                                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 4px;">项目名称</div>
                                        <div style="color: rgba(255,255,255,0.9);">${escapeHtml(app.project_name || '未填写')}</div>
                                    </div>
                                    <div style="margin-bottom: 12px;">
                                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 4px;">核心功能</div>
                                        <div style="color: rgba(255,255,255,0.9); line-height: 1.6; white-space: pre-wrap;">${escapeHtml(app.project_features || '未填写')}</div>
                                    </div>
                                    ${app.project_highlights ? `
                                    <div style="margin-bottom: 12px;">
                                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 4px;">项目特点</div>
                                        <div style="color: rgba(255,255,255,0.9); line-height: 1.6; white-space: pre-wrap;">${escapeHtml(app.project_highlights)}</div>
                                    </div>
                                    ` : ''}
                                    ${app.project_plan ? `
                                    <div style="margin-bottom: 12px;">
                                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 4px;">项目规划</div>
                                        <div style="color: rgba(255,255,255,0.9); line-height: 1.6; white-space: pre-wrap;">${escapeHtml(app.project_plan)}</div>
                                    </div>
                                    ` : ''}
                                    ${app.imageUrl ? `
                                    <div>
                                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 4px;">规划图片</div>
                                        <img src="${app.imageUrl}" style="max-width: 100%; max-height: 200px; border-radius: 8px; cursor: pointer;" onclick="window.open('${app.imageUrl}', '_blank')">
                                    </div>
                                    ` : ''}
                                </div>
                                <div class="feedback-detail-actions">
                                    ${app.status === 'pending' ? `
                                        <button class="feedback-btn feedback-btn-reply" onclick="updateJoinStatus(${app.id}, 'approved')">✅ 通过申请</button>
                                        <button class="feedback-btn feedback-btn-delete" onclick="updateJoinStatus(${app.id}, 'rejected')">❌ 拒绝申请</button>
                                    ` : ''}
                                    <button class="feedback-btn feedback-btn-close" onclick="closeJoinDetailModal()">关闭</button>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    // 添加到页面
                    const existingModal = document.getElementById('joinDetailModal');
                    if (existingModal) existingModal.remove();
                    
                    const modalDiv = document.createElement('div');
                    modalDiv.innerHTML = detailHtml;
                    document.body.appendChild(modalDiv.firstElementChild);
                } else {
                    currentJoinId = null;
                    showToast(data.error || '申请不存在', 'error');
                }
            } catch (error) {
                console.error('加载申请详情失败:', error);
                currentJoinId = null;
                showToast('加载失败', 'error');
            }
        }
        
        // 关闭详情弹窗
        function closeJoinDetailModal() {
            const modal = document.getElementById('joinDetailModal');
            if (modal) modal.remove();
            currentJoinId = null;
        }
        
        // 更新申请状态
        async function updateJoinStatus(applicationId, status) {
            const actionText = status === 'approved' ? '通过' : '拒绝';
            if (!confirm(`确定要${actionText}这条申请吗？`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/join/${applicationId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(`申请已${actionText}`, 'success');
                    closeJoinDetailModal();
                    loadJoinApplications(currentJoinPage);
                } else {
                    showToast(data.error || '操作失败', 'error');
                }
            } catch (error) {
                console.error('更新状态失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 返回大厅
        function backToHall() {
            window.location.href = 'gamehall.html';
        }
        
        // 跳转到脑力对决题库管理
        function goToBrainBattleQuestions() {
            window.location.href = 'admin/brainbattle-questions.html';
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', async () => {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                loadUsers();
                loadFeedback(); // 加载反馈
                loadJoinApplications(); // 加载加入我们申请
                startHeartbeat(); // 启动在线心跳
            }
        });
        
        // 在线心跳 - 每30秒报告一次位置
        function startHeartbeat() {
            const reportLocation = async () => {
                try {
                    await fetch(`${API_BASE}/online/heartbeat`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ location: 'admin' })
                    });
                } catch (error) {
                    // 静默失败
                }
            };
            
            // 立即报告一次
            reportLocation();
            
            // 每30秒报告一次
            setInterval(reportLocation, 30000);
        }
        
        // 点击遮罩关闭弹窗
        document.getElementById('chipsModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        document.getElementById('feedbackReplyModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFeedbackReplyModal();
            }
        });
        
        document.getElementById('feedbackDetailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFeedbackDetailModal();
            }
        });
    </script>
</body>
</html>
