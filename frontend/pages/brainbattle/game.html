<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑力对决 - 对战中</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 背景特效 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(220, 20, 60, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(220, 20, 60, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(220, 20, 60, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        /* 主容器 */
        .game-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部对战信息 */
        .battle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, transparent 100%);
        }

        /* 玩家信息卡 */
        .player-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(10,10,10,0.95));
            border: 2px solid rgba(220, 20, 60, 0.3);
            border-radius: 16px;
            min-width: 200px;
            position: relative;
            overflow: hidden;
        }

        .player-card.active {
            border-color: #dc143c;
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.4);
            animation: activePulse 1s ease-in-out infinite;
        }

        @keyframes activePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(220, 20, 60, 0.4); }
            50% { box-shadow: 0 0 40px rgba(220, 20, 60, 0.6); }
        }

        .player-card.winner {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(220, 20, 60, 0.5);
            object-fit: cover;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .player-rank {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }

        .player-score {
            font-size: 2rem;
            font-weight: 800;
            color: #dc143c;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
        }

        .player-score.winner {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* 中间 VS 区域 */
        .vs-area {
            text-align: center;
        }

        .round-info {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .vs-text {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #dc143c, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(220, 20, 60, 0.5);
            animation: vsPulse 1.5s ease-in-out infinite;
        }

        @keyframes vsPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .timer-bar {
            width: 200px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #dc143c, #ff6b6b);
            border-radius: 3px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            font-weight: 700;
            color: #fff;
        }

        /* 主游戏区 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* 题目类型标签 */
        .question-type {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(220, 20, 60, 0.2);
            border: 1px solid rgba(220, 20, 60, 0.4);
            border-radius: 20px;
            font-size: 0.85rem;
            color: #dc143c;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 题目 */
        .question-box {
            width: 100%;
            padding: 40px;
            background: linear-gradient(145deg, rgba(20,20,20,0.95), rgba(15,15,15,0.98));
            border: 2px solid rgba(220, 20, 60, 0.3);
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .question-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.5;
            color: #fff;
        }

        .question-image {
            max-width: 100%;
            max-height: 200px;
            margin: 20px 0;
            border-radius: 10px;
        }

        /* 选项区 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }

        .option-btn {
            padding: 20px 30px;
            background: linear-gradient(145deg, rgba(30,30,30,0.9), rgba(20,20,20,0.95));
            border: 2px solid rgba(220, 20, 60, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(.disabled) {
            transform: translateY(-3px);
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 0 10px 30px rgba(220, 20, 60, 0.2);
        }

        .option-btn:active:not(.disabled) {
            transform: translateY(-1px);
        }

        .option-btn.correct {
            background: linear-gradient(145deg, rgba(39, 174, 96, 0.9), rgba(46, 204, 113, 0.95));
            border-color: #27ae60;
            box-shadow: 0 0 30px rgba(39, 174, 96, 0.5);
            animation: correctPulse 0.5s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .option-btn.wrong {
            background: linear-gradient(145deg, rgba(231, 76, 60, 0.9), rgba(192, 57, 43, 0.95));
            border-color: #e74c3c;
            animation: wrongShake 0.5s ease;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .option-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .option-btn.selected {
            border-color: #dc143c;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.4);
        }

        /* 连击显示 */
        .streak-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
        }

        .streak-display.show {
            animation: streakPop 1s ease forwards;
        }

        @keyframes streakPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-50px); }
        }

        /* 结果弹窗 */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .result-modal.show {
            display: flex;
        }

        .result-content {
            text-align: center;
            padding: 60px;
            background: linear-gradient(145deg, rgba(20,20,20,0.98), rgba(10,10,10,0.99));
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(220, 20, 60, 0.3);
            animation: resultSlide 0.5s ease;
        }

        @keyframes resultSlide {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .result-title.win {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .result-title.lose {
            color: #888;
        }

        .result-title.draw {
            color: #dc143c;
        }

        .result-score {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }

        .result-rewards {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .reward-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 25px;
            background: rgba(220, 20, 60, 0.1);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 12px;
        }

        .reward-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .reward-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: #dc143c;
        }

        .result-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-primary, .btn-secondary {
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: #fff;
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(220, 20, 60, 0.6);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid rgba(220, 20, 60, 0.5);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(220, 20, 60, 0.2);
            border-color: #dc143c;
        }

        /* 准备倒计时 */
        .countdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .countdown-overlay.show {
            display: flex;
        }

        .countdown-number {
            font-size: 10rem;
            font-weight: 900;
            color: #dc143c;
            text-shadow: 0 0 50px rgba(220, 20, 60, 0.8);
            animation: countPulse 1s ease;
        }

        @keyframes countPulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .battle-header {
                padding: 15px 20px;
            }

            .player-card {
                min-width: auto;
                padding: 10px 15px;
            }

            .player-avatar {
                width: 40px;
                height: 40px;
            }

            .player-name {
                font-size: 0.85rem;
            }

            .player-score {
                font-size: 1.5rem;
            }

            .vs-text {
                font-size: 2rem;
            }

            .question-text {
                font-size: 1.3rem;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .option-btn {
                padding: 15px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="game-container">
        <!-- 顶部对战信息 -->
        <header class="battle-header" style="position: relative;">
            <!-- 退出按钮 -->
            <button onclick="quitGame()" style="position: absolute; top: 10px; right: 10px; padding: 8px 16px; background: linear-gradient(145deg, #666, #444); border: none; border-radius: 6px; color: #fff; font-size: 0.85rem; cursor: pointer; z-index: 100;">
                退出游戏
            </button>
            
            <!-- 玩家1（自己） -->
            <div class="player-card" id="player1Card">
                <img src="../../avatars/default.png" alt="头像" class="player-avatar" id="player1Avatar">
                <div class="player-info">
                    <div class="player-name" id="player1Name">我</div>
                    <div class="player-rank" id="player1Rank">青铜脑瓜</div>
                </div>
                <div class="player-score" id="player1Score">0</div>
            </div>

            <!-- VS 区域 -->
            <div class="vs-area">
                <div class="round-info">第 <span id="currentRound">1</span>/5 回合</div>
                <div class="vs-text">VS</div>
                <div class="timer-bar">
                    <div class="timer-progress" id="timerProgress" style="width: 100%;"></div>
                    <div class="timer-text" id="timerText">10.0s</div>
                </div>
            </div>

            <!-- 玩家2（对手） -->
            <div class="player-card" id="player2Card">
                <img src="../../avatars/default.png" alt="头像" class="player-avatar" id="player2Avatar">
                <div class="player-info">
                    <div class="player-name" id="player2Name">对手</div>
                    <div class="player-rank" id="player2Rank">白银思维</div>
                </div>
                <div class="player-score" id="player2Score">0</div>
            </div>
        </header>

        <!-- 主游戏区 -->
        <main class="game-area">
            <span class="question-type" id="questionType">速算题</span>
            
            <div class="question-box">
                <div class="question-text" id="questionText">24 × 15 = ?</div>
            </div>

            <div class="options-grid" id="optionsGrid">
                <button class="option-btn" data-index="0" onclick="selectAnswer(0)">360</button>
                <button class="option-btn" data-index="1" onclick="selectAnswer(1)">350</button>
                <button class="option-btn" data-index="2" onclick="selectAnswer(2)">340</button>
                <button class="option-btn" data-index="3" onclick="selectAnswer(3)">370</button>
            </div>
        </main>
    </div>

    <!-- 连击显示 -->
    <div class="streak-display" id="streakDisplay">3连击!</div>

    <!-- 准备倒计时 -->
    <div class="countdown-overlay" id="countdownOverlay">
        <div class="countdown-number" id="countdownNumber">3</div>
    </div>

    <!-- 结果弹窗 -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🏆</div>
            <div class="result-title win" id="resultTitle">胜利!</div>
            <div class="result-score" id="resultScore">100 : 80</div>
            <div class="result-rewards">
                <div class="reward-item">
                    <span class="reward-icon">🪙</span>
                    <span class="reward-value" id="rewardCoins">+50</span>
                </div>
                <div class="reward-item">
                    <span class="reward-icon">✨</span>
                    <span class="reward-value" id="rewardXP">+20</span>
                </div>
            </div>
            <div class="rematch-status" id="rematchStatus" style="display:none; margin: 15px 0; font-size: 14px; color: #aaa;"></div>
            <div class="rematch-timer" id="rematchTimer" style="font-size: 24px; font-weight: bold; color: #dc143c; margin: 10px 0;"></div>
            <div class="result-buttons">
                <button class="btn-primary" id="btnRematch" onclick="playAgain()">再来一局</button>
                <button class="btn-secondary" id="btnBack" onclick="backToLobby()">返回大厅</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
