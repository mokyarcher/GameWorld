<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑力对决 - BrainBattle</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(220, 20, 60, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(220, 20, 60, 0.05) 0%, transparent 70%);
            animation: bgRotate 30s linear infinite;
        }

        @keyframes bgRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(220, 20, 60, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(220, 20, 60, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(220, 20, 60, 0.5));
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc143c, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .logo-subtitle {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
        }

        /* 用户状态 */
        .user-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(10,10,10,0.95));
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .stat-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
        }

        .stat-label {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 800;
            color: #dc143c;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.3);
        }

        .rank-badge {
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.2), rgba(139, 0, 0, 0.3));
            border-color: rgba(220, 20, 60, 0.5);
        }

        .rank-badge .stat-value {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* 返回按钮 */
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9), rgba(139, 0, 0, 0.95));
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.4);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        /* 模式选择卡片 */
        .mode-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        .mode-card {
            position: relative;
            background: linear-gradient(145deg, rgba(20,20,20,0.95), rgba(10,10,10,0.98));
            border: 2px solid rgba(220, 20, 60, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
        }

        .mode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(220, 20, 60, 0.1), transparent);
            transition: left 0.6s;
        }

        .mode-card:hover::before {
            left: 100%;
        }

        .mode-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                0 0 30px rgba(220, 20, 60, 0.3);
        }

        .mode-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 15px rgba(220, 20, 60, 0.4));
            transition: all 0.3s;
        }

        .mode-card:hover .mode-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 25px rgba(220, 20, 60, 0.6));
        }

        .mode-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
        }

        .mode-desc {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .mode-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.8), rgba(139, 0, 0, 0.9));
            border: none;
            border-radius: 25px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.3);
        }

        .mode-card:hover .mode-btn {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.5);
            transform: scale(1.05);
        }

        /* 个人数据面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-top: 50px;
            padding: 30px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(10,10,10,0.95));
            border: 1px solid rgba(220, 20, 60, 0.2);
            border-radius: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            position: relative;
        }

        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(220, 20, 60, 0.3), transparent);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #dc143c;
            text-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
            margin-bottom: 5px;
        }

        .stat-label-small {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* 匹配中弹窗 */
        .matching-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .matching-modal.show {
            display: flex;
        }

        .matching-content {
            text-align: center;
            padding: 60px;
            background: linear-gradient(145deg, rgba(20,20,20,0.98), rgba(10,10,10,0.99));
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(220, 20, 60, 0.3);
        }

        .matching-spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            border: 4px solid rgba(220, 20, 60, 0.2);
            border-top-color: #dc143c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .matching-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #dc143c;
        }

        .matching-text {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
        }

        .matching-timer {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .btn-cancel {
            margin-top: 30px;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 25px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: rgba(220, 20, 60, 0.2);
            border-color: #dc143c;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .mode-selection {
                grid-template-columns: 1fr;
                max-width: 400px;
            }

            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }

            .user-stats {
                gap: 10px;
            }

            .stat-badge {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo" onclick="goToGameHall()">
                <span class="logo-icon">🧠</span>
                <div class="logo-text">
                    <span class="logo-title">BRAIN BATTLE</span>
                    <span class="logo-subtitle">脑力对决</span>
                </div>
            </div>

            <div class="user-stats">
                <div class="stat-badge rank-badge">
                    <span class="stat-label">RANK</span>
                    <span class="stat-value" id="userRank">青铜脑瓜</span>
                </div>
                <div class="stat-badge">
                    <span class="stat-label">RATING</span>
                    <span class="stat-value" id="userRating">500</span>
                </div>
                <button class="btn-back" onclick="goToGameHall()">
                    <span>←</span>
                    <span>返回大厅</span>
                </button>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 模式选择 -->
            <div class="mode-selection">
                <div class="mode-card" onclick="startQuickMatch()">
                    <span class="mode-icon">⚡</span>
                    <h3 class="mode-name">快速匹配</h3>
                    <p class="mode-desc">随机匹配在线玩家<br>即时开战</p>
                    <span class="mode-btn">开始匹配</span>
                </div>

                <div class="mode-card" onclick="startFriendMatch()">
                    <span class="mode-icon">👥</span>
                    <h3 class="mode-name">好友对战</h3>
                    <p class="mode-desc">邀请好友一起<br>切磋脑力</p>
                    <span class="mode-btn">邀请好友</span>
                </div>

                <div class="mode-card" onclick="goToRank()">
                    <span class="mode-icon">🏆</span>
                    <h3 class="mode-name">排位赛</h3>
                    <p class="mode-desc">积分排位<br>冲击最强王者</p>
                    <span class="mode-btn">开始排位</span>
                </div>
            </div>

            <!-- 个人数据 -->
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-number" id="statTotalGames">0</div>
                    <div class="stat-label-small">总场次</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statWinRate">0%</div>
                    <div class="stat-label-small">胜率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statWinStreak">0</div>
                    <div class="stat-label-small">连胜</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statMaxRating">500</div>
                    <div class="stat-label-small">最高积分</div>
                </div>
            </div>
        </main>
    </div>

    <!-- 匹配中弹窗 -->
    <div class="matching-modal" id="matchingModal">
        <div class="matching-content">
            <div class="matching-spinner"></div>
            <h2 class="matching-title">正在匹配对手...</h2>
            <p class="matching-text">寻找实力相当的玩家</p>
            <div class="matching-timer" id="matchingTimer">00:00</div>
            <button class="btn-cancel" onclick="cancelMatch()">取消匹配</button>
        </div>
    </div>

    <!-- 好友对战弹窗 -->
    <div class="matching-modal" id="friendMatchModal">
        <div class="matching-content" style="max-width: 450px;">
            <h2 class="matching-title" style="margin-bottom: 20px;">好友对战</h2>
            
            <!-- 创建房间后显示 -->
            <div id="roomCreatedSection" style="display: none;">
                <p class="matching-text">房间号（分享给好友）：</p>
                <div style="font-size: 2.5rem; font-weight: 800; color: #dc143c; letter-spacing: 8px; margin: 20px 0; font-family: monospace;">
                    <span id="roomCode">------</span>
                </div>
                <button class="mode-btn" id="copyRoomCode" style="margin-bottom: 10px;">复制房间号</button>
                <button class="mode-btn" onclick="showInviteModal()" style="background: linear-gradient(145deg, #4CAF50, #2E7D32); margin-bottom: 20px;">邀请好友</button>
                <p class="matching-text" id="friendMatchStatus">等待好友加入...</p>
            </div>
            
            <!-- 创建房间按钮 -->
            <div style="margin-bottom: 30px;">
                <button class="mode-btn" onclick="createRoom()">+创建房间</button>
            </div>
            
            <div style="border-top: 1px solid rgba(220,20,60,0.2); padding-top: 20px;">
                <p class="matching-text">或输入房间号加入游戏：</p>
                <input type="text" id="joinRoomInput" placeholder="输入6位房间号" maxlength="6" 
                    style="width: 200px; padding: 15px; font-size: 1.5rem; text-align: center; letter-spacing: 4px; background: rgba(0,0,0,0.3); border: 2px solid rgba(220,20,60,0.3); border-radius: 10px; color: #fff; margin: 20px 0; text-transform: uppercase;">
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="mode-btn" onclick="joinRoom()" style="margin-top: 30px; padding: 12px 40px;">加入游戏</button>
                    <button class="btn-cancel" onclick="closeFriendModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 邀请好友弹窗 -->
    <div class="matching-modal" id="inviteModal" style="display: none; z-index: 2000;">
        <div class="matching-content" style="max-width: 400px;">
            <div style="display: flex; align-items: center; margin-bottom: 20px; position: relative;">
                <button onclick="closeInviteModal()" 
                    style="padding: 8px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; font-size: 0.85rem; cursor: pointer; transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(220,20,60,0.3)'; this.style.borderColor='rgba(220,20,60,0.5)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.1)'; this.style.borderColor='rgba(255,255,255,0.2)'"
                >返回</button>
                <h2 class="matching-title" style="margin: 0; font-size: 1.5rem; flex: 1; text-align: center;">邀请好友</h2>
            </div>
            <div id="inviteFriendsList" style="max-height: 300px; overflow-y: auto;">
                <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">加载中...</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/lobby.js"></script>
</body>
</html>
