<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脑力对决 - BrainBattle</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(220, 20, 60, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(220, 20, 60, 0.05) 0%, transparent 70%);
            animation: bgRotate 30s linear infinite;
        }

        @keyframes bgRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(220, 20, 60, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 顶部导航 - 全宽 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid rgba(220, 20, 60, 0.3);
            height: 80px;
            background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.8) 100%);
            position: relative;
            z-index: 100;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.15), rgba(139, 0, 0, 0.2));
            border: 1px solid rgba(220, 20, 60, 0.4);
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.3), rgba(139, 0, 0, 0.4));
            border-color: rgba(220, 20, 60, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.3);
        }

        .nav-btn.primary {
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.8), rgba(139, 0, 0, 0.9));
            border-color: rgba(220, 20, 60, 0.6);
        }

        .nav-btn.primary:hover {
            background: linear-gradient(145deg, rgba(220, 20, 60, 1), rgba(139, 0, 0, 1));
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.5);
        }

        .nav-btn .icon {
            font-size: 1.1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(220, 20, 60, 0.5));
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dc143c, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .logo-subtitle {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 4px;
        }

        /* 用户状态 */
        .user-stats {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .stat-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 14px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(10,10,10,0.95));
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            min-width: 70px;
        }

        .stat-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
        }

        .stat-label {
            font-size: 0.55rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 0.95rem;
            font-weight: 700;
            color: #dc143c;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.3);
        }

        .rank-badge {
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.2), rgba(139, 0, 0, 0.3));
            border-color: rgba(220, 20, 60, 0.5);
        }

        .rank-badge .stat-value {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* 返回按钮 - 样式02风格 */
        .btn-back, .btn-nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 16px;
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.9), rgba(139, 0, 0, 0.95));
            border: 2px solid rgba(220, 20, 60, 0.6);
            border-radius: 8px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 0.75rem;
            min-width: 70px;
            height: 42px;
            line-height: 1.2;
        }

        .btn-back:hover, .btn-nav:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 20, 60, 0.4);
            background: linear-gradient(145deg, rgba(220, 20, 60, 1), rgba(139, 0, 0, 1));
        }

        .btn-nav {
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.8), rgba(170, 20, 60, 0.9));
        }

        .btn-nav:hover {
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.95), rgba(170, 20, 60, 1));
            box-shadow: 0 5px 15px rgba(220, 20, 60, 0.5);
        }

        .btn-nav .btn-label-small {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-nav .btn-label-large {
            font-size: 0.85rem;
            font-weight: 700;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        /* 模式选择卡片 */
        .mode-selection {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        .mode-card {
            position: relative;
            background: linear-gradient(145deg, rgba(20,20,20,0.95), rgba(10,10,10,0.98));
            border: 2px solid rgba(220, 20, 60, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            overflow: hidden;
        }

        .mode-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(220, 20, 60, 0.1), transparent);
            transition: left 0.6s;
        }

        .mode-card:hover::before {
            left: 100%;
        }

        .mode-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(220, 20, 60, 0.6);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                0 0 30px rgba(220, 20, 60, 0.3);
        }

        .mode-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 15px rgba(220, 20, 60, 0.4));
            transition: all 0.3s;
        }

        .mode-card:hover .mode-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 25px rgba(220, 20, 60, 0.6));
        }

        .mode-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #fff;
        }

        .mode-desc {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .mode-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.8), rgba(139, 0, 0, 0.9));
            border: none;
            border-radius: 25px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.3);
        }

        .mode-card:hover .mode-btn {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.5);
            transform: scale(1.05);
        }

        /* 个人数据面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-top: 50px;
            padding: 30px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(10,10,10,0.95));
            border: 1px solid rgba(220, 20, 60, 0.2);
            border-radius: 16px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            position: relative;
        }

        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 20%;
            height: 60%;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(220, 20, 60, 0.3), transparent);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #dc143c;
            text-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
            margin-bottom: 5px;
        }

        .stat-label-small {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* 匹配中弹窗 */
        .matching-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .matching-modal.show {
            display: flex;
        }

        .matching-content {
            text-align: center;
            padding: 60px;
            background: linear-gradient(145deg, rgba(20,20,20,0.98), rgba(10,10,10,0.99));
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(220, 20, 60, 0.3);
        }

        .matching-spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            border: 4px solid rgba(220, 20, 60, 0.2);
            border-top-color: #dc143c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .matching-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #dc143c;
        }

        .matching-text {
            color: rgba(255,255,255,0.6);
            margin-bottom: 30px;
        }

        .matching-timer {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .btn-cancel {
            margin-top: 30px;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 25px;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: rgba(220, 20, 60, 0.2);
            border-color: #dc143c;
        }

        /* 积分榜弹窗 */
        .leaderboard-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .leaderboard-modal.show {
            display: flex;
        }

        .leaderboard-content {
            background: linear-gradient(145deg, rgba(20,20,20,0.98) 0%, rgba(10,10,10,0.99) 100%);
            border: 2px solid rgba(220, 20, 60, 0.5);
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(220, 20, 60, 0.3);
        }

        .leaderboard-header {
            padding: 25px 30px;
            border-bottom: 1px solid rgba(220, 20, 60, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leaderboard-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #dc143c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .leaderboard-title::before {
            content: '🏆';
            font-size: 1.8rem;
        }

        .leaderboard-close {
            padding: 8px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .leaderboard-close:hover {
            background: rgba(220, 20, 60, 0.3);
            border-color: rgba(220, 20, 60, 0.5);
        }

        .leaderboard-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .leaderboard-item:hover {
            background: rgba(220, 20, 60, 0.1);
            border-color: rgba(220, 20, 60, 0.3);
            transform: translateX(5px);
        }

        .leaderboard-item.top3 {
            background: linear-gradient(145deg, rgba(220, 20, 60, 0.15), rgba(139, 0, 0, 0.1));
            border-color: rgba(220, 20, 60, 0.4);
        }

        .leaderboard-rank {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50%;
            margin-right: 15px;
        }

        .leaderboard-rank.rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .leaderboard-rank.rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #808080);
            color: #000;
        }

        .leaderboard-rank.rank-3 {
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            color: #fff;
        }

        .leaderboard-rank.other {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }

        .leaderboard-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin-right: 15px;
            border: 2px solid rgba(220, 20, 60, 0.3);
            object-fit: cover;
        }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .leaderboard-rank-name {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .leaderboard-score {
            text-align: right;
        }

        .leaderboard-rating {
            font-size: 1.3rem;
            font-weight: 800;
            color: #dc143c;
        }

        .leaderboard-stats {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }

        .leaderboard-loading {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }

        .leaderboard-empty {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .mode-selection {
                grid-template-columns: 1fr;
                max-width: 400px;
            }

            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }

            .user-stats {
                gap: 10px;
            }

            .stat-badge {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <!-- 顶部导航 - 移出 container 实现全宽 -->
    <header class="header">
        <!-- 左侧区域：ShareX Logo + PLAYER/POINTS -->
        <div style="display: flex; align-items: center; gap: 20px;">
            <!-- ShareX Logo -->
            <div class="logo" onclick="goToGameHall()" style="display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #dc143c; background: rgba(220, 20, 60, 0.1); padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(220, 20, 60, 0.3);">SHARE</span>
                <span style="color: #dc143c; font-size: 16px; font-weight: 800;">X</span>
            </div>
            
            <!-- PLAYER / POINTS -->
            <div class="user-stats" style="gap: 8px;">
                <div class="stat-badge rank-badge">
                    <span class="stat-label">PLAYER</span>
                    <span class="stat-value" id="userRankName">Admin</span>
                </div>
                <div class="stat-badge">
                    <span class="stat-label">POINTS</span>
                    <span class="stat-value" id="userRating">888.9K</span>
                </div>
            </div>
        </div>

        <!-- 中间：脑力对抗 -->
        <div style="position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 1px;">
            <span style="font-size: 20px; font-weight: 800; color: #dc143c; letter-spacing: 6px; text-shadow: 0 0 20px rgba(220, 20, 60, 0.5);">脑力对抗</span>
            <span style="font-size: 10px; font-weight: 600; color: rgba(220, 20, 60, 0.8); letter-spacing: 4px; text-transform: uppercase;">Brain Battle</span>
        </div>

        <!-- 右侧：按钮组 -->
        <div class="user-stats" style="gap: 10px;">
            <button class="btn-back btn-nav" onclick="showLeaderboard()">
                <span class="btn-label-small">RANK</span>
                <span class="btn-label-large">排行榜</span>
            </button>
            <button class="btn-back btn-nav" onclick="goToGameHall()">
                <span class="btn-label-small">BACK</span>
                <span class="btn-label-large">返回大厅</span>
            </button>
            <button class="btn-back btn-nav" onclick="logout()">
                <span class="btn-label-small">EXIT</span>
                <span class="btn-label-large">退出</span>
            </button>
        </div>
    </header>

    <div class="container">
        <!-- 主内容 -->
        <main class="main-content">
            <!-- 模式选择 -->
            <div class="mode-selection">
                <div class="mode-card" onclick="startQuickMatch()">
                    <span class="mode-icon">⚡</span>
                    <h3 class="mode-name">快速匹配</h3>
                    <p class="mode-desc">随机匹配在线玩家<br>即时开战</p>
                    <span class="mode-btn">开始匹配</span>
                </div>

                <div class="mode-card" onclick="startFriendMatch()">
                    <span class="mode-icon">👥</span>
                    <h3 class="mode-name">好友对战</h3>
                    <p class="mode-desc">邀请好友一起<br>切磋脑力</p>
                    <span class="mode-btn">邀请好友</span>
                </div>

                <div class="mode-card" onclick="goToRank()">
                    <span class="mode-icon">🏆</span>
                    <h3 class="mode-name">排位赛</h3>
                    <p class="mode-desc">积分排位<br>冲击最强王者</p>
                    <span class="mode-btn">开始排位</span>
                </div>
            </div>

            <!-- 个人数据 -->
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-number" id="statTotalGames">0</div>
                    <div class="stat-label-small">总场次</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statWinRate">0%</div>
                    <div class="stat-label-small">胜率</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statWinStreak">0</div>
                    <div class="stat-label-small">连胜</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="statMaxRating">500</div>
                    <div class="stat-label-small">最高积分</div>
                </div>
            </div>
        </main>
    </div>

    <!-- 匹配中弹窗 -->
    <div class="matching-modal" id="matchingModal">
        <div class="matching-content">
            <div class="matching-spinner"></div>
            <h2 class="matching-title">正在匹配对手...</h2>
            <p class="matching-text">寻找实力相当的玩家</p>
            <div class="matching-timer" id="matchingTimer">00:00</div>
            <button class="btn-cancel" onclick="cancelMatch()">取消匹配</button>
        </div>
    </div>

    <!-- 好友对战弹窗 -->
    <div class="matching-modal" id="friendMatchModal">
        <div class="matching-content" style="max-width: 450px;">
            <h2 class="matching-title" style="margin-bottom: 20px;">好友对战</h2>
            
            <!-- 创建房间后显示 -->
            <div id="roomCreatedSection" style="display: none;">
                <p class="matching-text">房间号（分享给好友）：</p>
                <div style="font-size: 2.5rem; font-weight: 800; color: #dc143c; letter-spacing: 8px; margin: 20px 0; font-family: monospace;">
                    <span id="roomCode">------</span>
                </div>
                <button class="mode-btn" id="copyRoomCode" style="margin-bottom: 10px;">复制房间号</button>
                <button class="mode-btn" onclick="showInviteModal()" style="background: linear-gradient(145deg, #4CAF50, #2E7D32); margin-bottom: 20px;">邀请好友</button>
                <p class="matching-text" id="friendMatchStatus">等待好友加入...</p>
                <button class="btn-cancel" onclick="cancelRoom()" style="margin-top: 15px; color: #ff6b6b; border-color: rgba(220,20,60,0.6);">退出房间</button>
            </div>
            
            <!-- 创建房间按钮 -->
            <div style="margin-bottom: 30px;">
                <button class="mode-btn" onclick="createRoom()">+创建房间</button>
            </div>
            
            <div style="border-top: 1px solid rgba(220,20,60,0.2); padding-top: 20px;">
                <p class="matching-text">或输入房间号加入游戏：</p>
                <input type="text" id="joinRoomInput" placeholder="输入6位房间号" maxlength="6" 
                    style="width: 200px; padding: 15px; font-size: 1.5rem; text-align: center; letter-spacing: 4px; background: rgba(0,0,0,0.3); border: 2px solid rgba(220,20,60,0.3); border-radius: 10px; color: #fff; margin: 20px 0; text-transform: uppercase;">
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="mode-btn" onclick="joinRoom()" style="margin-top: 30px; padding: 12px 40px;">加入游戏</button>
                    <button class="btn-cancel" onclick="closeFriendModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 邀请好友弹窗 -->
    <div class="matching-modal" id="inviteModal" style="display: none; z-index: 2000;">
        <div class="matching-content" style="max-width: 400px;">
            <div style="display: flex; align-items: center; margin-bottom: 20px; position: relative;">
                <button onclick="closeInviteModal()" 
                    style="padding: 8px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; font-size: 0.85rem; cursor: pointer; transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(220,20,60,0.3)'; this.style.borderColor='rgba(220,20,60,0.5)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.1)'; this.style.borderColor='rgba(255,255,255,0.2)'"
                >返回</button>
                <h2 class="matching-title" style="margin: 0; font-size: 1.5rem; flex: 1; text-align: center;">邀请好友</h2>
            </div>
            <div id="inviteFriendsList" style="max-height: 300px; overflow-y: auto;">
                <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">加载中...</div>
            </div>
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(220,20,60,0.2); text-align: center;">
                <button class="btn-cancel" onclick="closeInviteModal(); cancelRoom();" style="color: #ff6b6b; border-color: rgba(220,20,60,0.6);">退出房间</button>
            </div>
        </div>
    </div>

    <!-- 积分榜弹窗 -->
    <div class="leaderboard-modal" id="leaderboardModal">
        <div class="leaderboard-content">
            <div class="leaderboard-header">
                <div class="leaderboard-title">排位积分榜</div>
                <button class="leaderboard-close" onclick="closeLeaderboard()">关闭</button>
            </div>
            <div class="leaderboard-list" id="leaderboardList">
                <div class="leaderboard-loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/lobby.js"></script>
</body>
</html>
