<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameWorld - 个人资料</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn-back {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        /* 资料卡片 */
        .profile-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .profile-header h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .profile-header p {
            color: rgba(255,255,255,0.6);
        }
        
        /* 当前头像 */
        .current-avatar {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .current-avatar img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(102, 126, 234, 0.5);
            object-fit: cover;
        }
        
        .current-avatar .username {
            margin-top: 15px;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 30px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
        }
        
        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
        }
        
        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .input-hint {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
        }
        
        /* 头像选择 */
        .avatar-section h3 {
            margin-bottom: 20px;
            color: rgba(255,255,255,0.8);
        }
        
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        
        .avatar-option {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            object-fit: cover;
        }
        
        .avatar-option:hover {
            transform: scale(1.1);
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .avatar-option.selected {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        /* 保存按钮 */
        .form-actions {
            margin-top: 40px;
            text-align: center;
        }
        
        .btn-save {
            padding: 15px 50px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.5);
        }
        
        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }
        
        .toast.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">🎮 GameWorld</div>
            <button onclick="backToHall()" class="btn-back">🏠 返回大厅</button>
        </header>
        
        <!-- 资料卡片 -->
        <div class="profile-card">
            <div class="profile-header">
                <h2>👤 个人资料</h2>
                <p>修改您的昵称和头像</p>
            </div>
            
            <!-- 当前头像 -->
            <div class="current-avatar">
                <img id="currentAvatar" src="../avatars/default.png" alt="当前头像">
                <div class="username" id="displayUsername">用户名</div>
            </div>
            
            <!-- 表单 -->
            <form id="profileForm" onsubmit="saveProfile(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" disabled>
                    <div class="input-hint">用户名不可修改</div>
                </div>
                
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="nickname" placeholder="请输入昵称" maxlength="20">
                    <div class="input-hint">2-20个字符，支持中文、字母、数字</div>
                </div>
                
                <div class="form-group avatar-section">
                    <h3>选择头像</h3>
                    <div class="avatar-grid" id="avatarGrid">
                        <!-- 头像选项由 JS 生成 -->
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-save" id="saveBtn">💾 保存修改</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');
        let currentUser = null;
        let selectedAvatar = null;
        
        // 验证登录
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // 加载用户信息
        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_BASE}/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    currentUser = data.user;
                    
                    // 填充表单
                    document.getElementById('username').value = currentUser.username;
                    document.getElementById('nickname').value = currentUser.nickname || '';
                    document.getElementById('displayUsername').textContent = currentUser.username;
                    
                    // 显示当前头像
                    document.getElementById('currentAvatar').src = `../avatars/${currentUser.avatar}`;
                    selectedAvatar = currentUser.avatar;
                    
                    // 生成头像选择网格
                    generateAvatarGrid();
                } else {
                    showToast('获取用户信息失败', 'error');
                }
            } catch (error) {
                console.error('加载用户信息失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 生成头像选择网格
        function generateAvatarGrid() {
            const grid = document.getElementById('avatarGrid');
            const avatars = [];
            
            // 添加默认头像
            avatars.push('default.png');
            
            // 添加 avatar1-20
            for (let i = 1; i <= 20; i++) {
                avatars.push(`avatar${i}.png`);
            }
            
            grid.innerHTML = avatars.map(avatar => `
                <img 
                    src="../avatars/${avatar}" 
                    class="avatar-option ${avatar === selectedAvatar ? 'selected' : ''}"
                    data-avatar="${avatar}"
                    onclick="selectAvatar('${avatar}')"
                    alt="头像"
                >
            `).join('');
        }
        
        // 选择头像
        function selectAvatar(avatar) {
            selectedAvatar = avatar;
            
            // 更新选中状态
            document.querySelectorAll('.avatar-option').forEach(img => {
                img.classList.toggle('selected', img.dataset.avatar === avatar);
            });
            
            // 更新当前头像预览
            document.getElementById('currentAvatar').src = `../avatars/${avatar}`;
        }
        
        // 保存资料
        async function saveProfile(event) {
            event.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            
            // 验证昵称
            if (nickname && (nickname.length < 2 || nickname.length > 20)) {
                showToast('昵称长度需在 2-20 个字符之间', 'error');
                return;
            }
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';
            
            try {
                const response = await fetch(`${API_BASE}/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        nickname: nickname || null,
                        avatar: selectedAvatar
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 更新本地存储的用户信息
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    user.nickname = nickname;
                    user.avatar = selectedAvatar;
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    showToast('资料保存成功！', 'success');
                } else {
                    showToast(data.error || '保存失败', 'error');
                }
            } catch (error) {
                console.error('保存失败:', error);
                showToast('网络错误，请重试', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '💾 保存修改';
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 返回大厅
        function backToHall() {
            window.location.href = 'gamehall.html';
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
        });
    </script>
</body>
</html>
