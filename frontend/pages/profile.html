<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareX - 个人资料</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(20,20,20,0.95) 0%, rgba(10,10,10,0.9) 100%);
            border-radius: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(220,20,60,0.4);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
        }
        
        .logo::before {
            content: 'PROFILE';
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            margin-right: 8px;
            vertical-align: middle;
        }
        
        .btn-back {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 12px;
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.5);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            font-size: 12px;
        }
        
        .btn-back::before {
            content: 'BACK';
            font-size: 7px;
            font-weight: 800;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2px;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.5);
        }
        
        /* 资料卡片 - 紧凑布局 */
        .profile-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border-radius: 16px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            padding: 25px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.8);
        }
        
        /* 顶部区域：头像 + 昵称修改 */
        .top-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(220, 20, 60, 0.2);
        }
        
        .current-avatar {
            flex-shrink: 0;
        }
        
        .current-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            border: 3px solid rgba(220, 20, 60, 0.5);
            object-fit: cover;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }
        
        .nickname-section {
            flex: 1;
        }
        
        .nickname-section label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .nickname-section input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .nickname-section input:focus {
            outline: none;
            border-color: #dc143c;
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.2);
        }
        
        /* 用户名区域 */
        .username-section {
            margin-bottom: 20px;
        }
        
        .username-section label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .username-display {
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
        
        /* 头像选择区 */
        .avatar-section {
            margin-bottom: 20px;
        }
        
        .avatar-section h3 {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            max-height: 240px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            border: 1px solid rgba(220, 20, 60, 0.2);
        }
        
        /* 自定义滚动条 - 黑红风格 */
        .avatar-grid::-webkit-scrollbar {
            width: 10px;
        }
        
        .avatar-grid::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            margin: 2px;
        }
        
        .avatar-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(220, 20, 60, 0.8) 0%, rgba(139, 0, 0, 0.9) 100%);
            border-radius: 5px;
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .avatar-grid::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(220, 20, 60, 1) 0%, rgba(139, 0, 0, 1) 100%);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
        }
        
        /* Firefox 滚动条 */
        .avatar-grid {
            scrollbar-width: thin;
            scrollbar-color: rgba(220, 20, 60, 0.8) rgba(0,0,0,0.5);
        }
        
        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            object-fit: cover;
        }
        
        .avatar-option:hover {
            transform: scale(1.1);
            border-color: rgba(220, 20, 60, 0.5);
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.3);
        }
        
        .avatar-option.selected {
            border-color: #dc143c;
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.5);
        }
        
        /* 保存按钮 */
        .form-actions {
            text-align: center;
            padding-top: 15px;
        }
        
        .btn-save {
            padding: 12px 40px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            color: white;
            border: 1px solid rgba(220, 20, 60, 0.5);
            text-transform: uppercase;
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.5);
        }
        
        .btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 10001;
            transform: translateX(150%);
            transition: transform 0.3s ease;
            font-size: 14px;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.5);
        }
        
        .toast.error {
            background: linear-gradient(145deg, rgba(80,80,80,0.9) 0%, rgba(40,40,40,0.95) 100%);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .avatar-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            
            .current-avatar img {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">ShareX</div>
            <button onclick="backToHall()" class="btn-back">返回大厅</button>
        </header>
        
        <!-- 资料卡片 -->
        <div class="profile-card">
            <!-- 顶部：头像 + 昵称修改 -->
            <div class="top-section">
                <div class="current-avatar">
                    <img id="currentAvatar" src="../avatars/default.png" alt="当前头像">
                </div>
                <div class="nickname-section">
                    <label>昵称修改</label>
                    <input type="text" id="nickname" placeholder="请输入昵称" maxlength="20">
                </div>
            </div>
            
            <!-- 用户名（只读） -->
            <div class="username-section">
                <label>用户名</label>
                <div class="username-display" id="username">加载中...</div>
            </div>
            
            <!-- 头像选择区 -->
            <div class="avatar-section">
                <h3>选择头像</h3>
                <div class="avatar-grid" id="avatarGrid">
                    <!-- 头像选项由 JS 生成 -->
                </div>
            </div>
            
            <!-- 密码修改区域 -->
            <div class="password-section" style="margin-top: 25px; padding-top: 25px; border-top: 1px solid rgba(220, 20, 60, 0.2);">
                <h3 style="font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 15px; letter-spacing: 1px;">🔐 修改密码</h3>
                <div class="password-form" style="display: flex; flex-direction: column; gap: 12px;">
                    <div>
                        <input type="password" id="oldPassword" placeholder="当前密码" style="width: 100%; padding: 12px 15px; border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 8px; background: rgba(0,0,0,0.3); color: white; font-size: 14px;">
                    </div>
                    <div>
                        <input type="password" id="newPassword" placeholder="新密码（至少6位）" style="width: 100%; padding: 12px 15px; border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 8px; background: rgba(0,0,0,0.3); color: white; font-size: 14px;">
                    </div>
                    <div>
                        <input type="password" id="confirmPassword" placeholder="确认新密码" style="width: 100%; padding: 12px 15px; border: 1px solid rgba(220, 20, 60, 0.3); border-radius: 8px; background: rgba(0,0,0,0.3); color: white; font-size: 14px;">
                    </div>
                    <button onclick="changePassword()" class="btn-save" id="passwordBtn" style="margin-top: 5px; padding: 10px 30px; font-size: 13px;">修改密码</button>
                </div>
            </div>
            
            <!-- 保存按钮 -->
            <div class="form-actions" style="margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(220, 20, 60, 0.2);">
                <button onclick="saveProfile()" class="btn-save" id="saveBtn">确认修改资料</button>
            </div>
        </div>
    </div>
    
    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');
        let currentUser = null;
        let selectedAvatar = null;
        
        // 验证登录
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // 加载用户信息
        async function loadUserInfo() {
            try {
                const response = await fetch(`${API_BASE}/user/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    currentUser = data.user;
                    
                    // 填充表单
                    document.getElementById('username').textContent = currentUser.username;
                    document.getElementById('nickname').value = currentUser.nickname || '';
                    
                    // 显示当前头像
                    document.getElementById('currentAvatar').src = `../avatars/${currentUser.avatar}`;
                    selectedAvatar = currentUser.avatar;
                    
                    // 生成头像选择网格
                    generateAvatarGrid();
                } else {
                    showToast('获取用户信息失败', 'error');
                }
            } catch (error) {
                console.error('加载用户信息失败:', error);
                showToast('网络错误', 'error');
            }
        }
        
        // 生成头像选择网格
        function generateAvatarGrid() {
            const grid = document.getElementById('avatarGrid');
            const avatars = [];
            
            // 添加默认头像
            avatars.push('default.png');
            
            // 添加 avatar1-50 (支持更多头像)
            for (let i = 1; i <= 50; i++) {
                avatars.push(`avatar${i}.png`);
            }
            
            grid.innerHTML = avatars.map(avatar => `
                <img 
                    src="../avatars/${avatar}" 
                    class="avatar-option ${avatar === selectedAvatar ? 'selected' : ''}"
                    data-avatar="${avatar}"
                    onclick="selectAvatar('${avatar}')"
                    alt="头像"
                    onerror="this.style.display='none'"
                >
            `).join('');
        }
        
        // 选择头像
        function selectAvatar(avatar) {
            selectedAvatar = avatar;
            
            // 更新选中状态
            document.querySelectorAll('.avatar-option').forEach(img => {
                img.classList.toggle('selected', img.dataset.avatar === avatar);
            });
            
            // 更新当前头像预览
            document.getElementById('currentAvatar').src = `../avatars/${avatar}`;
        }
        
        // 保存资料
        async function saveProfile() {
            const nickname = document.getElementById('nickname').value.trim();
            
            // 验证昵称
            if (nickname && (nickname.length < 2 || nickname.length > 20)) {
                showToast('昵称长度需在 2-20 个字符之间', 'error');
                return;
            }
            
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';
            
            try {
                const response = await fetch(`${API_BASE}/user/profile`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        nickname: nickname || null,
                        avatar: selectedAvatar
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 更新本地存储的用户信息
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    user.nickname = nickname;
                    user.avatar = selectedAvatar;
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    showToast('修改成功！', 'success');
                } else {
                    showToast(data.error || '保存失败', 'error');
                }
            } catch (error) {
                console.error('保存失败:', error);
                showToast('网络错误，请重试', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = '确认修改';
            }
        }
        
        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 修改密码
        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // 验证
            if (!oldPassword || !newPassword || !confirmPassword) {
                showToast('请填写所有密码字段', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showToast('新密码至少需要6位', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showToast('两次输入的新密码不一致', 'error');
                return;
            }
            
            const passwordBtn = document.getElementById('passwordBtn');
            passwordBtn.disabled = true;
            passwordBtn.textContent = '修改中...';
            
            try {
                const response = await fetch(`${API_BASE}/user/password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        oldPassword: oldPassword,
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('密码修改成功！', 'success');
                    // 清空密码输入框
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showToast(data.error || '修改失败', 'error');
                }
            } catch (error) {
                console.error('修改密码失败:', error);
                showToast('网络错误，请重试', 'error');
            } finally {
                passwordBtn.disabled = false;
                passwordBtn.textContent = '修改密码';
            }
        }
        
        // 返回大厅
        function backToHall() {
            window.location.href = 'gamehall.html';
        }
        
        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
        });
    </script>
</body>
</html>
