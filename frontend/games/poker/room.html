<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州扑克 - 房间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a3d2a 0%, #0d2818 100%);
            min-height: 100vh;
            color: white;
        }

        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .room-info {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .room-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .room-header-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .room-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .room-name {
            font-size: 1.3rem;
            color: #ffd700;
        }

        .room-settings {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .btn-leave {
            padding: 10px 25px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-leave:hover {
            background: rgba(231, 76, 60, 1);
        }

        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: calc(100vh - 80px);
            gap: 30px;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
        }

        /* 聊天框样式 */
        .chat-box {
            width: 300px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            color: #ffd700;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: calc(100vh - 250px);
        }

        .chat-message {
            background: rgba(255,255,255,0.05);
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .chat-message .sender {
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-message .text {
            color: rgba(255,255,255,0.9);
        }

        .chat-message.system {
            background: rgba(155, 89, 182, 0.2);
            text-align: center;
        }

        .chat-message.system .text {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
        }

        .chat-input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .chat-send-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border: none;
            border-radius: 6px;
            color: #1a1a1a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .seat {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .seat.empty {
            border: 2px dashed rgba(100, 200, 255, 0.4);
            background: linear-gradient(145deg, rgba(30, 60, 90, 0.4), rgba(20, 40, 60, 0.3));
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .seat.empty::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.1) 0%, transparent 70%);
            animation: pulse-glow 4s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 0.6; transform: scale(1); }
        }
        
        .seat.empty:hover {
            border-color: rgba(100, 200, 255, 0.8);
            background: linear-gradient(145deg, rgba(40, 80, 120, 0.5), rgba(30, 60, 90, 0.4));
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(100, 200, 255, 0.2);
        }

        .seat.myself {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .seat.ready {
            border-color: #27ae60;
        }

        .seat-host {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #1a1a1a;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .seat-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .seat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .seat-avatar.empty-avatar {
            background: linear-gradient(145deg, rgba(100, 180, 255, 0.15), rgba(80, 160, 230, 0.1));
            color: rgba(100, 200, 255, 0.9);
            border: 2px solid rgba(100, 200, 255, 0.4);
            font-size: 1.8rem;
            font-weight: 400;
            box-shadow: 
                0 0 15px rgba(100, 200, 255, 0.2),
                inset 0 0 20px rgba(100, 200, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .seat-avatar.empty-avatar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: avatar-pulse 4s ease-in-out infinite;
        }
        
        @keyframes avatar-pulse {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .seat.empty:hover .seat-avatar.empty-avatar {
            background: linear-gradient(145deg, rgba(100, 200, 255, 0.25), rgba(80, 180, 255, 0.2));
            border-color: rgba(100, 220, 255, 0.7);
            box-shadow: 
                0 0 25px rgba(100, 200, 255, 0.4),
                inset 0 0 30px rgba(100, 200, 255, 0.2);
            transform: scale(1.05);
        }

        .seat-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .seat-chips {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .seat-status {
            font-size: 0.8rem;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
        }

        .seat-status.ready {
            background: #27ae60;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: auto;
            padding-top: 30px;
            margin-bottom: 70px;
        }

        .btn {
            padding: 15px 50px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-ready {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-ready:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }

        .btn-ready.cancel {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
        }

        .btn-start {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #1a1a1a;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-start:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-add-bot {
            padding: 15px 30px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-add-bot:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(155, 89, 182, 0.4);
        }

        .btn-add-bot:disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .seat.bot {
            border-color: #9b59b6;
            background: rgba(155, 89, 182, 0.1);
            position: relative;
        }

        .seat-avatar.bot-avatar {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }

        .kick-bot-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
            z-index: 10;
        }

        .seat.bot:hover .kick-bot-btn {
            opacity: 1;
        }

        .kick-bot-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.5);
        }

        .waiting-tip {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.95), rgba(10,10,10,0.98));
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .modal-text {
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        /* 游戏开始动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { 
                opacity: 0;
                transform: scale(0.5);
            }
            to { 
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 自定义游戏风格弹窗 */
        .game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }
        .game-modal-overlay.show {
            display: flex;
        }
        .game-modal-content {
            background: linear-gradient(145deg, rgba(30,30,30,0.98), rgba(10,10,10,0.99));
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(255, 215, 0, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
        }
        .game-modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .game-modal-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .game-modal-message {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .game-modal-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border: none;
            border-radius: 8px;
            color: #1a1a1a;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .game-modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        .game-modal-btn.success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
        }
        .game-modal-btn.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="room-info">
            <div class="room-header-avatar">
                <img id="roomAvatarImg" src="" alt="头像">
            </div>
            <div class="room-details">
                <div class="room-name" id="roomName">加载中...</div>
                <div class="room-settings" id="roomSettings">--</div>
            </div>
        </div>
        <button class="btn-leave" onclick="leaveRoom()">离开房间</button>
    </div>

    <div class="main-layout">
        <div class="container">
            <div class="seats-grid" id="seatsGrid">
                <!-- 座位将在这里动态生成 -->
            </div>

            <div class="actions" id="actionButtons">
                <!-- 按钮将在这里动态生成 -->
            </div>

            <div class="waiting-tip" id="waitingTip">等待其他玩家加入...</div>
        </div>

        <!-- 聊天框 -->
        <div class="chat-box">
            <div class="chat-header">💬 房间聊天</div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-message system">
                    <div class="text">欢迎来到房间！</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." maxlength="100">
                <button class="chat-send-btn" onclick="sendChatMessage()">发送</button>
            </div>
        </div>
    </div>

    <!-- 邀请好友弹窗 -->
    <div class="modal" id="inviteModal">
        <div class="modal-content" style="max-width: 500px; max-height: 80vh;">
            <div class="modal-header">👥 邀请好友</div>
            <div style="padding: 20px;">
                <div style="margin-bottom: 15px; color: rgba(255,255,255,0.7);">选择好友加入房间：</div>
                <div id="inviteFriendsList" style="max-height: 400px; overflow-y: auto;">
                    <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">加载中...</div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="hideInviteModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- 离开确认弹窗 -->
    <div class="modal" id="leaveModal">
        <div class="modal-content">
            <div class="modal-header">离开房间</div>
            <div class="modal-text">确定要离开房间吗？</div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="hideLeaveModal()">取消</button>
                <button class="btn-confirm" onclick="confirmLeaveRoom()">确定</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../../js/onlineTracker.js"></script>
    <script>
        // 自动检测 Socket.io 地址（支持本地和局域网访问）
        const socket = io(`${window.location.protocol}//${window.location.host}/poker`);
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        // 初始化在线状态追踪
        if (user.id) {
            OnlineTracker.init(user.id, 'poker_room');
        }
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('roomId');

        let currentRoom = null;
        let isReady = false;
        let isHost = false;

        if (!roomId) {
            window.location.href = 'lobby.html';
        }

        // 连接成功后加入房间
        socket.on('connect', () => {
            console.log('已连接到游戏房间');
            socket.emit('join-room', { roomId, userId: user.id });
            
            // 定期同步房间状态，确保数据一致性（每3秒）
            setInterval(() => {
                if (currentRoom) {
                    socket.emit('get-room-state', { roomId });
                }
            }, 3000);
        });

        // 加入房间成功
        socket.on('joined-room', (data) => {
            console.log('加入房间成功:', data);
            currentRoom = data.room;
            console.log('currentRoom:', currentRoom);
            console.log('user.id:', user.id);
            console.log('currentRoom.ownerId:', currentRoom.ownerId);
            isHost = String(currentRoom.ownerId) === String(user.id);
            console.log('isHost:', isHost);
            updateRoomInfo();
            renderSeats();
            renderButtons();
        });

        // 新玩家加入
        socket.on('player-joined', (data) => {
            if (currentRoom) {
                // 检查是否已存在该玩家，避免重复添加
                const existingIndex = currentRoom.players.findIndex(p => String(p.userId) === String(data.player.userId));
                if (existingIndex < 0) {
                    currentRoom.players.push(data.player);
                    renderSeats();
                    renderButtons();
                }
            }
        });

        // 玩家重新连接
        socket.on('player-reconnected', (data) => {
            console.log('玩家重新连接:', data.userId);
            // 重新获取房间状态
            socket.emit('get-room-state', { roomId });
        });

        // 接收房间状态更新
        socket.on('room-state', (data) => {
            console.log('收到房间状态更新:', data);
            if (data.room) {
                // 完全替换当前房间数据，确保数据一致性
                currentRoom = data.room;
                // 重新计算房主状态
                isHost = String(currentRoom.ownerId) === String(user.id);
                renderSeats();
                renderButtons();
            }
        });

        // 玩家离开
        socket.on('player-left', (data) => {
            if (currentRoom) {
                currentRoom.players = currentRoom.players.filter(p => p.userId !== data.userId);
                // 如果房主变了，更新isHost
                if (data.newOwnerId) {
                    currentRoom.ownerId = data.newOwnerId;
                    isHost = String(currentRoom.ownerId) === String(user.id);
                }
                renderSeats();
                renderButtons();
            }
        });

        // 玩家准备状态更新
        socket.on('player-ready-update', (data) => {
            console.log('收到 player-ready-update 事件:', data);
            if (currentRoom) {
                const player = currentRoom.players.find(p => String(p.userId) === String(data.userId));
                if (player) {
                    player.isReady = data.isReady;
                    console.log('玩家准备状态更新:', player.nickname, 'isReady:', player.isReady);
                    renderSeats();
                    renderButtons();
                } else {
                    console.log('未找到玩家:', data.userId);
                }
            }
        });

        // 游戏开始
        // 游戏开始倒计时
        socket.on('game-start-countdown', (data) => {
            console.log('游戏开始倒计时:', data);
            showGameStartingCountdown(data.seconds);
        });
        
        // 显示游戏开始倒计时
        function showGameStartingCountdown(seconds) {
            // 移除已存在的倒计时
            const existingOverlay = document.getElementById('startingCountdownOverlay');
            if (existingOverlay) {
                existingOverlay.remove();
            }
            
            const overlay = document.createElement('div');
            overlay.id = 'startingCountdownOverlay';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.85);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;
            
            const message = document.createElement('div');
            message.textContent = '游戏即将开始';
            message.style.cssText = `
                font-size: 2rem;
                color: #fff;
                margin-bottom: 20px;
            `;
            
            const countdown = document.createElement('div');
            countdown.id = 'startingCountdown';
            countdown.textContent = seconds;
            countdown.style.cssText = `
                font-size: 5rem;
                font-weight: bold;
                color: #ffd700;
                text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            `;
            
            overlay.appendChild(message);
            overlay.appendChild(countdown);
            document.body.appendChild(overlay);
            
            // 倒计时
            let remaining = seconds;
            const interval = setInterval(() => {
                remaining--;
                const countdownEl = document.getElementById('startingCountdown');
                if (countdownEl) {
                    countdownEl.textContent = remaining;
                }
                if (remaining <= 0) {
                    clearInterval(interval);
                }
            }, 1000);
        }
        
        socket.on('game-started', (data) => {
            console.log('游戏开始:', data);
            // 移除倒计时遮罩
            const overlay = document.getElementById('startingCountdownOverlay');
            if (overlay) {
                overlay.remove();
            }
            showGameStartAnimation();
        });

        // 显示游戏开始动画
        function showGameStartAnimation() {
            // 创建游戏开始遮罩层
            const overlay = document.createElement('div');
            overlay.id = 'gameStartOverlay';
            overlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
                animation: fadeIn 0.3s ease;
            `;

            const text = document.createElement('div');
            text.textContent = '游戏开始';
            text.style.cssText = `
                font-size: 4rem;
                font-weight: bold;
                color: #ffd700;
                text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
                animation: scaleIn 0.5s ease;
            `;

            overlay.appendChild(text);
            document.body.appendChild(overlay);

            // 2秒后跳转到游戏页面
            setTimeout(() => {
                window.location.href = `game.html?roomId=${roomId}`;
            }, 2000);
        }

        // 错误处理
        socket.on('error', (data) => {
            showModal(data.message, 'error');
        });

        // 更新房间信息
        function updateRoomInfo() {
            if (!currentRoom) return;
            document.getElementById('roomName').textContent = currentRoom.roomName || '房间';
            document.getElementById('roomSettings').textContent = 
                `盲注 ${currentRoom.smallBlind || 10}/${currentRoom.bigBlind || 20} | 最多 ${currentRoom.maxPlayers || 9} 人`;
            
            // 设置房间头部的头像
            const avatarFilename = user.avatar || 'default.png';
            const roomAvatarImg = document.getElementById('roomAvatarImg');
            if (roomAvatarImg) {
                roomAvatarImg.src = `/avatars/${avatarFilename}`;
            }
        }

        // 渲染座位
        function renderSeats() {
            const seatsGrid = document.getElementById('seatsGrid');
            const players = currentRoom ? currentRoom.players : [];
            const maxPlayers = currentRoom ? currentRoom.maxPlayers : 9;

            let seatsHTML = '';
            for (let i = 0; i < maxPlayers; i++) {
                const player = players.find(p => p.seatNumber === i);
                const isMyself = player && String(player.userId) === String(user.id);
                
                if (player) {
                    const isPlayerHost = player.userId === currentRoom.ownerId;
                    const isPlayerReady = player.isReady;
                    const isBot = player.isBot;
                    
                    seatsHTML += `
                        <div class="seat ${isMyself ? 'myself' : ''} ${isPlayerReady ? 'ready' : ''} ${isBot ? 'bot' : ''}">
                            ${isPlayerHost ? '<div class="seat-host">房主</div>' : ''}
                            ${isBot ? '<div class="seat-host" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);">人机</div>' : ''}
                            ${isHost && isBot ? `<button class="kick-bot-btn" onclick="kickBot('${player.userId}')" title="踢出人机">×</button>` : ''}
                            <div class="seat-avatar ${isBot ? 'bot-avatar' : ''}">
                                ${isBot ? `<img src="/avatars/${player.avatar}" alt="">` : `<img src="/avatars/${player.avatar}" alt="">`}
                            </div>
                            <div class="seat-name">${escapeHtml(player.nickname)}</div>
                            <div class="seat-chips">💰 ${player.chips}</div>
                            <div class="seat-status ${isPlayerReady ? 'ready' : ''}">
                                ${isBot ? '已准备' : (isPlayerReady ? '已准备' : '等待中')}
                            </div>
                        </div>
                    `;
                } else {
                    seatsHTML += `
                        <div class="seat empty" onclick="inviteFriendToSeat(${i})" style="cursor: pointer;" title="点击邀请好友">
                            <div class="seat-avatar empty-avatar">👥</div>
                            <div class="seat-status" style="color: rgba(100, 200, 255, 0.8); font-size: 0.85rem; font-weight: 500;">邀请好友</div>
                        </div>
                    `;
                }
            }
            seatsGrid.innerHTML = seatsHTML;
        }

        // 渲染操作按钮
        function renderButtons() {
            const container = document.getElementById('actionButtons');
            const players = currentRoom ? currentRoom.players : [];
            const myPlayer = players.find(p => String(p.userId) === String(user.id));
            isReady = myPlayer ? myPlayer.isReady : false;

            console.log('renderButtons - isHost:', isHost, 'players.length:', players.length);
            console.log('currentRoom.ownerId:', currentRoom?.ownerId, 'user.id:', user.id);

            if (isHost) {
                // 房主显示开始游戏按钮 - 房主不需要准备，只需要其他所有玩家准备
                const otherPlayers = players.filter(p => String(p.userId) !== String(currentRoom.ownerId));
                const allOthersReady = players.length >= 2 && otherPlayers.length > 0 && otherPlayers.every(p => p.isReady === true);
                const canAddBot = players.length < currentRoom.maxPlayers;
                
                console.log('房主按钮 - 总玩家:', players.length, '非房主:', otherPlayers.length, '都可开始:', allOthersReady);
                console.log('所有玩家:', players.map(p => ({n: p.nickname, id: p.userId, ready: p.isReady, isOwner: String(p.userId) === String(currentRoom.ownerId)})));
                
                container.innerHTML = `
                    <button class="btn-add-bot" 
                            onclick="addBot()" 
                            ${!canAddBot ? 'disabled' : ''}>
                        🤖 添加人机
                    </button>
                    <button class="btn btn-start" 
                            onclick="startGame()" 
                            ${!allOthersReady ? 'disabled' : ''}>
                        ${!allOthersReady ? '等待玩家准备' : '开始游戏'}
                    </button>
                `;
                document.getElementById('waitingTip').textContent = 
                    allOthersReady ? '可以开始游戏了！' : '等待玩家准备...';
            } else {
                // 普通玩家显示准备按钮
                container.innerHTML = `
                    <button class="btn btn-ready ${isReady ? 'cancel' : ''}" onclick="toggleReady()">
                        ${isReady ? '取消准备' : '准备'}
                    </button>
                `;
                document.getElementById('waitingTip').textContent = 
                    isReady ? '等待房主开始游戏...' : '点击准备按钮开始游戏';
            }
        }

        // 切换准备状态
        function toggleReady() {
            const myPlayer = currentRoom.players.find(p => String(p.userId) === String(user.id));
            if (!myPlayer) return;
            
            // 切换准备状态
            const newReadyState = !isReady;
            
            // 发送准备状态更新到服务器
            socket.emit('player-ready', { roomId, userId: user.id, isReady: newReadyState });
            
            // 本地状态更新会在收到服务器广播后处理
            console.log('发送准备状态:', newReadyState);
        }

        // 开始游戏（房主）
        function startGame() {
            socket.emit('start-game', { roomId });
        }

        // 添加人机
        function addBot() {
            socket.emit('add-bot', { roomId });
        }

        // 待踢出的人机ID
        let pendingKickBotId = null;

        // 踢出人机
        function kickBot(botUserId) {
            pendingKickBotId = botUserId;
            showConfirmModal('确定要踢出这个人机吗？', () => {
                if (pendingKickBotId) {
                    socket.emit('kick-bot', { roomId, botUserId: pendingKickBotId });
                    pendingKickBotId = null;
                }
            });
        }

        // 发送聊天消息
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            socket.emit('room-chat', {
                roomId: roomId,
                userId: user.id,
                nickname: user.nickname || user.username,
                message: message
            });
            
            input.value = '';
        }

        // 监听回车键发送消息
        document.addEventListener('DOMContentLoaded', () => {
            const chatInput = document.getElementById('chatInput');
            if (chatInput) {
                chatInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        sendChatMessage();
                    }
                });
            }
        });

        // 接收聊天消息
        socket.on('chat-message', (data) => {
            addChatMessage(data.nickname, data.message, data.isSystem);
        });

        // 添加聊天消息到界面
        function addChatMessage(sender, text, isSystem = false) {
            const container = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isSystem ? 'system' : ''}`;
            
            if (isSystem) {
                messageDiv.innerHTML = `<div class="text">${escapeHtml(text)}</div>`;
            } else {
                messageDiv.innerHTML = `
                    <div class="sender">${escapeHtml(sender)}</div>
                    <div class="text">${escapeHtml(text)}</div>
                `;
            }
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // 显示确认弹窗（确认/取消）
        function showConfirmModal(message, onConfirm) {
            const modal = document.getElementById('gameModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const singleBtn = document.getElementById('modalSingleBtn');
            const dualBtn = document.getElementById('modalDualBtn');
            const noBtn = document.getElementById('modalNoBtn');
            const confirmBtn = document.getElementById('modalConfirmBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');
            
            // 显示双按钮，隐藏单按钮和无按钮
            singleBtn.style.display = 'none';
            dualBtn.style.display = 'flex';
            noBtn.style.display = 'none';
            
            msg.textContent = message;
            icon.textContent = '⚠️';
            title.textContent = '确认';
            
            // 设置确认按钮样式
            confirmBtn.className = 'game-modal-btn error';
            confirmBtn.textContent = '确定';
            
            // 设置取消按钮样式
            cancelBtn.className = 'game-modal-btn';
            cancelBtn.textContent = '取消';
            
            modal.classList.add('show');
            
            // 存储确认回调
            window.modalConfirmCallback = onConfirm;
        }

        // 确认弹窗 - 确定
        function confirmModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalConfirmCallback) {
                window.modalConfirmCallback();
                window.modalConfirmCallback = null;
            }
        }

        // 人机加入成功
        socket.on('bot-joined', (data) => {
            console.log('人机加入:', data);
            if (currentRoom) {
                // 检查是否已存在该人机
                const existingIndex = currentRoom.players.findIndex(p => String(p.userId) === String(data.player.userId));
                if (existingIndex < 0) {
                    currentRoom.players.push(data.player);
                    renderSeats();
                    renderButtons();
                }
            }
        });

        // 添加人机成功
        socket.on('add-bot-success', (data) => {
            console.log('添加人机成功:', data);
        });

        // 人机被踢出
        socket.on('bot-kicked', (data) => {
            console.log('人机被踢出:', data);
            if (currentRoom) {
                currentRoom.players = currentRoom.players.filter(p => p.userId !== data.botUserId);
                // 重新分配座位号
                currentRoom.players.forEach((p, index) => {
                    p.seatNumber = index;
                });
                renderSeats();
                renderButtons();
            }
        });

        // 踢出人机成功
        socket.on('kick-bot-success', (data) => {
            console.log('踢出人机成功:', data);
        });

        // 显示离开弹窗
        function leaveRoom() {
            document.getElementById('leaveModal').classList.add('show');
        }

        // 隐藏离开弹窗
        function hideLeaveModal() {
            document.getElementById('leaveModal').classList.remove('show');
        }

        // 确认离开房间
        function confirmLeaveRoom() {
            socket.emit('leave-room', { roomId, userId: user.id });
            window.location.href = 'lobby.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 邀请好友相关变量
        let selectedSeatIndex = null;
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');

        // 点击空座位邀请好友
        function inviteFriendToSeat(seatIndex) {
            // 只有房主可以邀请
            if (!isHost) {
                showGameModal('只有房主可以邀请好友', 'info');
                return;
            }
            
            selectedSeatIndex = seatIndex;
            loadFriendsForInvite();
            document.getElementById('inviteModal').classList.add('show');
        }

        // 隐藏邀请弹窗
        function hideInviteModal() {
            document.getElementById('inviteModal').classList.remove('show');
            selectedSeatIndex = null;
        }

        // 加载好友列表
        async function loadFriendsForInvite() {
            const container = document.getElementById('inviteFriendsList');
            container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">加载中...</div>';
            
            try {
                // 获取好友列表
                const friendsRes = await fetch(`${API_BASE}/friends/list`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const friendsData = await friendsRes.json();
                
                if (!friendsData.success || friendsData.friends.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">暂无好友<br>先去添加一些好友吧！</div>';
                    return;
                }
                
                // 获取好友在线状态
                const friendIds = friendsData.friends.map(f => String(f.id));
                const statusRes = await fetch(`${API_BASE}/online/status/batch`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userIds: friendIds })
                });
                const statusData = await statusRes.json();
                
                // 合并状态
                friendsData.friends.forEach(friend => {
                    const status = statusData.statuses?.[friend.id];
                    if (status) {
                        friend.isOnline = status.isOnline;
                        friend.location = status.location;
                        friend.locationName = status.locationName;
                    }
                });
                
                // 过滤可邀请的好友（在线且不在游戏中）
                const currentPlayerIds = currentRoom?.players?.map(p => String(p.userId)) || [];
                const availableFriends = friendsData.friends.filter(f => {
                    // 不在当前房间
                    if (currentPlayerIds.includes(String(f.id))) return false;
                    // 在线
                    if (!f.isOnline) return false;
                    // 不在其他游戏房间中
                    if (f.location && (f.location.includes('poker_room') || f.location.includes('poker_game'))) return false;
                    return true;
                });
                
                if (availableFriends.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">暂无可邀请的好友<br>好友可能离线或在其他游戏中</div>';
                    return;
                }
                
                // 渲染好友列表
                container.innerHTML = availableFriends.map(friend => {
                    const safeNickname = escapeHtml(friend.nickname).replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return `
                    <div class="friend-invite-item" 
                         data-friend-id="${friend.id}"
                         data-friend-name="${safeNickname}"
                         style="display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: all 0.3s;">
                        <img src="/avatars/${friend.avatar}" style="width: 45px; height: 45px; border-radius: 50%; margin-right: 15px; border: 2px solid #27ae60;">
                        <div style="flex: 1;">
                            <div style="font-weight: 600; margin-bottom: 3px;">${escapeHtml(friend.nickname)}</div>
                            <div style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">
                                <span style="color: #27ae60;">●</span> ${friend.locationName || '在线'}
                            </div>
                        </div>
                        <button class="invite-btn" style="padding: 8px 20px; background: linear-gradient(135deg, #27ae60, #2ecc71); border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer;">
                            邀请
                        </button>
                    </div>
                `}).join('');
                
                // 绑定点击事件
                container.querySelectorAll('.friend-invite-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        if (e.target.classList.contains('invite-btn') || e.target.closest('.invite-btn')) {
                            const friendId = parseInt(this.dataset.friendId);
                            const friendName = this.dataset.friendName;
                            sendInviteToFriend(friendId, friendName);
                        }
                    });
                    item.addEventListener('mouseenter', function() {
                        this.style.background = 'rgba(255,255,255,0.1)';
                    });
                    item.addEventListener('mouseleave', function() {
                        this.style.background = 'rgba(255,255,255,0.05)';
                    });
                });
                
            } catch (error) {
                console.error('加载好友失败:', error);
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #e74c3c;">加载失败，请重试</div>';
            }
        }

        // 发送邀请给好友
        function sendInviteToFriend(friendId, friendName) {
            console.log('[Invite] 点击邀请好友:', friendId, friendName);
            
            if (selectedSeatIndex === null) {
                console.error('[Invite] 未选择座位');
                return;
            }
            
            if (!socket || !socket.connected) {
                console.error('[Invite] Socket 未连接');
                showGameModal('网络连接异常，请刷新页面重试', 'error');
                return;
            }
            
            if (!roomId) {
                console.error('[Invite] roomId 未定义');
                return;
            }
            
            const inviterName = user.nickname || user.username;
            console.log('[Invite] 发送邀请数据:', {
                roomId: roomId,
                friendId: friendId,
                seatIndex: selectedSeatIndex,
                inviterName: inviterName
            });
            
            // 通过 Socket 发送邀请
            socket.emit('invite-friend', {
                roomId: roomId,
                friendId: friendId,
                seatIndex: selectedSeatIndex,
                inviterName: inviterName
            });
            
            showGameModal(`已邀请 ${friendName} 加入房间`, 'success');
            hideInviteModal();
        }

        // 监听邀请响应
        socket.on('invite-result', (data) => {
            if (data.success) {
                showGameModal(data.message, 'success');
            } else {
                showGameModal(data.message || '邀请失败', 'error');
            }
        });

        // 初始渲染
        renderSeats();
    </script>
    <!-- 自定义弹窗 -->
    <div class="game-modal-overlay" id="gameModal">
        <div class="game-modal-content">
            <div class="game-modal-icon" id="modalIcon">ℹ️</div>
            <div class="game-modal-title" id="modalTitle">提示</div>
            <div class="game-modal-message" id="modalMessage">消息内容</div>
            <div id="modalSingleBtn">
                <button class="game-modal-btn" id="modalBtn" onclick="closeModal()">确定</button>
            </div>
            <div id="modalDualBtn" style="display: none; gap: 15px; justify-content: center;">
                <button class="game-modal-btn" id="modalConfirmBtn" onclick="confirmModal()">确定</button>
                <button class="game-modal-btn" id="modalCancelBtn" onclick="closeModal()">取消</button>
            </div>
            <div id="modalNoBtn" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 显示自定义弹窗
        function showModal(message, type = 'info', callback, showButton = true) {
            const modal = document.getElementById('gameModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const btn = document.getElementById('modalBtn');
            const singleBtn = document.getElementById('modalSingleBtn');
            const dualBtn = document.getElementById('modalDualBtn');
            const noBtn = document.getElementById('modalNoBtn');
            
            // 根据 showButton 参数显示/隐藏按钮
            if (showButton) {
                singleBtn.style.display = 'block';
                dualBtn.style.display = 'none';
                noBtn.style.display = 'none';
            } else {
                singleBtn.style.display = 'none';
                dualBtn.style.display = 'none';
                noBtn.style.display = 'block';
            }
            
            msg.textContent = message;
            
            // 重置按钮样式
            btn.className = 'game-modal-btn';
            
            switch(type) {
                case 'success':
                    icon.textContent = '✅';
                    title.textContent = '成功';
                    btn.classList.add('success');
                    break;
                case 'error':
                    icon.textContent = '❌';
                    title.textContent = '错误';
                    btn.classList.add('error');
                    break;
                default:
                    icon.textContent = 'ℹ️';
                    title.textContent = '提示';
            }
            
            modal.classList.add('show');
            
            // 点击确定后的回调
            window.modalCallback = callback;
        }
        
        function closeModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }
        
        // 点击遮罩关闭
        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
