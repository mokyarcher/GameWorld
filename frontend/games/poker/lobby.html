<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵州扑克 - 游戏大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: white;
        }

        .header {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 1px solid rgba(220,20,60,0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-self: center;
        }
        
        .logo-tag {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }
        
        .logo-text {
            color: #fff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-self: start;
        }
        
        /* 用户徽章样式 */
        .user-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .user-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }
        
        .user-badge .badge-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2px;
        }
        
        .user-badge .badge-value {
            font-size: 16px;
            font-weight: 800;
            color: #dc143c;
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.5);
        }

        /* 顶部右侧按钮组 - 徽章风格 */
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-self: end;
        }

        /* 徽章风格按钮 - 红色渐变背景 */
        .badge-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(145deg, rgba(170, 20, 60, 0.9) 0%, rgba(139, 0, 0, 0.95) 100%);
            border: 2px solid rgba(170, 20, 60, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.4);
            color: #fff;
        }

        .badge-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            opacity: 0.8;
        }

        .badge-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(220, 20, 60, 0.6);
            border-color: rgba(220, 20, 60, 0.8);
        }

        .badge-btn:active {
            transform: translateY(-1px);
        }

        .badge-btn .btn-label {
            font-size: 8px;
            font-weight: 800;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2px;
            display: block;
        }

        .badge-btn .btn-text {
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            display: block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-primary {
            padding: 15px 30px;
            background: linear-gradient(135deg, #d04060 0%, #8b0000 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(220, 20, 60, 0.5);
        }

        .btn-secondary {
            padding: 15px 30px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(220, 20, 60, 0.1);
            border-color: rgba(220, 20, 60, 0.6);
        }

        .btn-rank {
            padding: 15px 30px;
            background: linear-gradient(135deg, #e05070 0%, #8b0000 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }

        .btn-rank:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(220, 20, 60, 0.5);
        }

        .btn-reconnect {
            padding: 15px 30px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
        }

        .btn-reconnect:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.5);
        }

        .room-list {
            background: linear-gradient(145deg, rgba(20,20,20,0.6) 0%, rgba(10,10,10,0.8) 100%);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(220, 20, 60, 0.15);
            position: relative;
        }
        
        .room-list::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }

        .room-list-header {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 180px;
            gap: 10px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            border-bottom: 1px solid rgba(220, 20, 60, 0.2);
        }

        .room-item {
            padding: 20px;
            display: grid;
            grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 180px;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid rgba(220, 20, 60, 0.1);
            transition: all 0.3s;
        }

        .room-item:hover {
            background: rgba(220, 20, 60, 0.05);
            border-left: 3px solid rgba(220, 20, 60, 0.5);
        }

        .room-name {
            font-weight: 600;
        }

        .room-host {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .btn-join {
            padding: 8px 20px;
            background: linear-gradient(135deg, #d04060 0%, #8b0000 100%);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 20, 60, 0.4);
        }

        .btn-join:disabled {
            background: rgba(255,255,255,0.1);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-delete-room {
            padding: 8px 15px;
            background: rgba(139, 0, 0, 0.8);
            border: 1px solid rgba(220, 20, 60, 0.5);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            margin-left: 8px;
        }

        .btn-delete-room:hover {
            background: rgba(139, 0, 0, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 20, 60, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }

        /* 创建房间弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(20,20,20,0.98) 0%, rgba(10,10,10,0.99) 100%);
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            border: 2px solid rgba(220, 20, 60, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(220, 20, 60, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }

        .modal-header {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .modal-header::before {
            content: 'CREATE';
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #dc143c;
            box-shadow: 0 0 10px rgba(220, 20, 60, 0.2);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .room-item.playing {
            background: rgba(220, 20, 60, 0.1);
            border-left: 4px solid #dc143c;
        }

        /* 排行榜弹窗样式 */
        .leaderboard-modal-content {
            background: linear-gradient(145deg, rgba(20,20,20,0.98) 0%, rgba(10,10,10,0.99) 100%);
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            max-width: 95%;
            border: 2px solid rgba(220, 20, 60, 0.3);
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .leaderboard-modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }

        .leaderboard-header {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .leaderboard-header::before {
            content: 'RANK';
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            margin-right: 10px;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            transition: all 0.3s;
            gap: 15px;
        }

        .leaderboard-item:hover {
            background: rgba(255,255,255,0.06);
        }

        .rank-number {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            width: 40px;
        }

        .rank-1 { color: #dc143c; text-shadow: 0 0 10px rgba(220, 20, 60, 0.5); }
        .rank-2 { color: #fff; }
        .rank-3 { color: rgba(255,255,255,0.7); }
        .rank-other { color: rgba(255,255,255,0.4); }

        .leaderboard-username {
            flex: 1;
            font-weight: 600;
        }

        .leaderboard-chips {
            color: #dc143c;
            font-weight: bold;
        }

        /* 个人信息弹窗样式 */
        .profile-modal-content {
            background: linear-gradient(145deg, rgba(20,20,20,0.98) 0%, rgba(10,10,10,0.99) 100%);
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            max-width: 95%;
            border: 2px solid rgba(220, 20, 60, 0.3);
            position: relative;
        }
        
        .profile-modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }

        .profile-header {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .profile-header::before {
            content: 'PROFILE';
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            margin-right: 10px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: linear-gradient(135deg, #dc143c, #8b0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
            overflow: hidden;
            border: 2px solid rgba(220, 20, 60, 0.5);
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info {
            margin-bottom: 20px;
        }

        .profile-info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-close:hover {
            background: rgba(255,255,255,0.2);
        }

        /* 自定义游戏风格弹窗 */
        .game-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }
        .game-modal-overlay.show {
            display: flex;
        }
        .game-modal-content {
            background: linear-gradient(145deg, rgba(20,20,20,0.98) 0%, rgba(10,10,10,0.99) 100%);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
            border: 2px solid rgba(220, 20, 60, 0.5);
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 30px rgba(220, 20, 60, 0.2);
            max-width: 90%;
            width: 400px;
            animation: scaleIn 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .game-modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #dc143c, transparent);
            opacity: 0.6;
        }
        .game-modal-icon {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #dc143c;
            background: rgba(220, 20, 60, 0.1);
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            margin-bottom: 15px;
            display: inline-block;
        }
        .game-modal-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .game-modal-message {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .game-modal-btn {
            padding: 12px 35px;
            background: linear-gradient(135deg, #d04060 0% ,#8b0000 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
        }
        .game-modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 25px rgba(220, 20, 60, 0.5);
        }
        .game-modal-btn.success {
            background: linear-gradient(135deg, #dc143c, #8b0000);
            color: white;
            box-shadow: 0 5px 20px rgba(220, 20, 60, 0.4);
        }
        .game-modal-btn.error {
            background: linear-gradient(135deg, #8b0000, #4a0000);
            color: white;
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.4);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 平板适配 (768px - 1024px) */
        @media (max-width: 1024px) and (min-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .room-list-header {
                padding: 15px;
                grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 180px;
                font-size: 0.9rem;
            }
            
            .room-item {
                padding: 15px;
                grid-template-columns: 2fr 0.8fr 0.8fr 0.6fr 0.6fr 180px;
            }
            
            .room-name {
                font-size: 0.95rem;
            }
            
            .room-host {
                font-size: 0.85rem;
            }
            
            .btn-join, .btn-delete-room {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .actions {
                gap: 12px;
                margin-bottom: 20px;
            }
            
            .btn-primary, .btn-secondary, .btn-rank, .btn-reconnect {
                padding: 12px 24px;
                font-size: 0.95rem;
            }
            
            .header {
                padding: 15px;
            }
            
            .logo {
                font-size: 1.3rem;
            }
            
            .user-info {
                gap: 15px;
            }
            
            .user-avatar {
                width: 45px;
                height: 45px;
            }
        }

        /* 小平板和大手机 (600px - 767px) */
        @media (max-width: 767px) and (min-width: 600px) {
            .room-list-header {
                grid-template-columns: 1.5fr 0.7fr 0.7fr 0.5fr 0.5fr 150px;
                font-size: 0.85rem;
                padding: 12px;
            }
            
            .room-item {
                grid-template-columns: 1.5fr 0.7fr 0.7fr 0.5fr 0.5fr 150px;
                padding: 12px;
            }
            
            .btn-join, .btn-delete-room {
                padding: 5px 10px;
                font-size: 0.8rem;
            }
        }
        
        /* 横屏提示 - 手机竖屏时显示 */
        .orientation-hint {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            z-index: 99999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        .orientation-hint .phone-icon {
            font-size: 80px;
            animation: rotatePhone 2s ease-in-out infinite;
            margin-bottom: 30px;
        }
        
        .orientation-hint .hint-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #dc143c;
            margin-bottom: 15px;
        }
        
        .orientation-hint .hint-text {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }
        
        @keyframes rotatePhone {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
        
        /* 手机竖屏时显示横屏提示 */
        @media screen and (max-width: 768px) and (orientation: portrait) {
            .orientation-hint {
                display: flex;
            }
            body > *:not(.orientation-hint) {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- 横屏提示 -->
    <div class="orientation-hint" id="orientationHint">
        <div class="phone-icon">📱</div>
        <div class="hint-title">请切换至横屏模式</div>
        <div class="hint-text">
            本游戏需要在横屏模式下进行<br>
            请将手机旋转90度
        </div>
    </div>
    <!-- 自定义弹窗 -->
    <div class="game-modal-overlay" id="gameModal">
        <div class="game-modal-content">
            <div class="game-modal-icon" id="modalIcon">提示</div>
            <div class="game-modal-title" id="modalTitle">提示</div>
            <div class="game-modal-message" id="modalMessage">消息内容</div>
            <button class="game-modal-btn" id="modalBtn" onclick="closeModal()">确定</button>
        </div>
    </div>
    
    <!-- 邀请弹窗 -->
    <div class="game-modal-overlay" id="inviteModal">
        <div class="game-modal-content">
            <div class="game-modal-icon">邀请</div>
            <div class="game-modal-title">游戏邀请</div>
            <div class="game-modal-message" id="inviteInfo"></div>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <button class="game-modal-btn" style="background: linear-gradient(135deg, #27ae60, #2ecc71);" onclick="acceptInvite()">接受</button>
                <button class="game-modal-btn" style="background: linear-gradient(135deg, #e74c3c, #c0392b);" onclick="rejectInvite()">拒绝</button>
            </div>
        </div>
    </div>
    
    <!-- 删除房间确认弹窗 -->
    <div class="game-modal-overlay" id="deleteRoomModal">
        <div class="game-modal-content">
            <div class="game-modal-icon">删除</div>
            <div class="game-modal-title">删除房间</div>
            <div class="game-modal-message">确定要删除这个房间吗？<br>房间内的所有玩家将被移出。</div>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <button class="game-modal-btn" style="background: linear-gradient(135deg, #e74c3c, #c0392b);" onclick="confirmDeleteRoom()">删除</button>
                <button class="game-modal-btn" onclick="hideDeleteRoomModal()">取消</button>
            </div>
        </div>
    </div>
    
    <div class="header">
        <!-- 左边：PLAYER/CHIPS -->
        <div class="user-info">
            <div class="user-badge">
                <span class="badge-label">PLAYER</span>
                <span id="username" class="badge-value">加载中...</span>
            </div>
            <div class="user-badge">
                <span class="badge-label">CHIPS</span>
                <span id="chips" class="badge-value">0</span>
            </div>
        </div>
        
        <!-- 中间：POKER贵州扑克 -->
        <div class="logo">
            <span class="logo-tag">POKER</span>
            <span class="logo-text">贵州扑克</span>
        </div>
        
        <!-- 右边：按钮 -->
        <div class="header-actions">
            <button class="badge-btn" onclick="backToGameHall()">
                <span class="btn-label">BACK</span>
                <span class="btn-text">返回大厅</span>
            </button>
            <button class="badge-btn" onclick="showProfileModal()">
                <span class="btn-label">PROFILE</span>
                <span class="btn-text">个人信息</span>
            </button>
            <button class="badge-btn" onclick="logout()">
                <span class="btn-label">EXIT</span>
                <span class="btn-text">退出</span>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="actions">
            <button class="btn-primary" onclick="showCreateModal()">创建房间</button>
            <button class="btn-secondary" onclick="refreshRooms()">刷新列表</button>
            <button class="btn-rank" onclick="showLeaderboardModal()">排行榜</button>
            <button class="btn-reconnect" id="reconnectBtn" onclick="reconnectToGame()" style="display: none;">重连游戏</button>
        </div>

        <div class="room-list">
            <div class="room-list-header">
                <div>房间名称</div>
                <div>房主</div>
                <div>盲注</div>
                <div>人数</div>
                <div>状态</div>
                <div>操作</div>
            </div>
            <div id="roomList">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 创建房间弹窗 -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">创建房间</div>
            <form id="createRoomForm">
                <div class="form-group">
                    <label>房间名称</label>
                    <input type="text" id="roomName" placeholder="输入房间名称" required>
                </div>
                <div class="form-group">
                    <label>最大人数</label>
                    <select id="maxPlayers">
                        <option value="2">2人</option>
                        <option value="3">3人</option>
                        <option value="4">4人</option>
                        <option value="5">5人</option>
                        <option value="6" selected>6人</option>
                        <option value="7">7人</option>
                        <option value="8">8人</option>
                        <option value="9">9人</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>盲注设置</label>
                    <select id="blindSetting">
                        <option value="10,20" selected>小盲 10 / 大盲 20</option>
                        <option value="20,40">小盲 20 / 大盲 40</option>
                        <option value="50,100">小盲 50 / 大盲 100</option>
                        <option value="100,200">小盲 100 / 大盲 200</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary">确认</button>
                    <button type="button" class="btn-cancel" onclick="hideCreateModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 排行榜弹窗 -->
    <div class="modal" id="leaderboardModal">
        <div class="leaderboard-modal-content">
            <div class="leaderboard-header">
                <span>积分排行榜</span>
                <button class="btn-close" onclick="hideLeaderboardModal()">关闭</button>
            </div>
            <div class="leaderboard-list" id="leaderboardList">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 个人信息弹窗 -->
    <div class="modal" id="profileModal">
        <div class="profile-modal-content">
            <div class="profile-header">
                <span>个人信息</span>
                <button class="btn-close" onclick="hideProfileModal()">关闭</button>
            </div>
            <div class="profile-avatar" id="profileAvatar"><img src="" alt="头像" id="profileAvatarImg"></div>
            <div class="profile-info">
                <div class="profile-info-item">
                    <span>用户名</span>
                    <span id="profileUsername">-</span>
                </div>
                <div class="profile-info-item">
                    <span>昵称</span>
                    <span id="profileNickname">-</span>
                </div>
                <div class="profile-info-item">
                    <span>当前积分</span>
                    <span id="profileChips" style="color: #dc143c; font-weight: bold;">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="../../js/onlineTracker.js"></script>
    <script>
        // 自动检测 API 地址（支持本地和局域网访问）
        const API_BASE = `${window.location.protocol}//${window.location.host}/api`;
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) {
            window.location.href = '../../pages/login.html';
        } else {
            document.getElementById('username').textContent = user.nickname || user.username;
            document.getElementById('chips').textContent = formatChips(user.chips || 0);
            
            // 设置头像
            const avatarFilename = user.avatar || 'default.png';
            const headerAvatarImg = document.getElementById('headerAvatarImg');
            if (headerAvatarImg) {
                headerAvatarImg.src = `/avatars/${avatarFilename}`;
            }
            
            // 初始化在线状态追踪
            OnlineTracker.init(user.id, 'poker_lobby');
        }

        // 存储活跃游戏信息
        let activeGameInfo = null;
        
        // 邀请相关变量（全局作用域，供 onclick 调用）
        let currentInvite = null;
        let inviteSocket = null;

        // Socket.io 连接
        const socket = io(`${window.location.protocol}//${window.location.host}/poker`);
        
        socket.on('connect', () => {
            console.log('已连接到贵州扑克服务器');
            socket.emit('get-rooms');
            
            // 延迟检查进行中的游戏，确保 socket 连接稳定
            setTimeout(() => {
                checkActiveGame();
            }, 500);
        });
        
        // 检查是否有进行中的游戏
        function checkActiveGame() {
            console.log('checkActiveGame 被调用, user.id:', user.id, '类型:', typeof user.id);
            if (user.id) {
                socket.emit('check-active-game', { userId: user.id });
            }
        }
        
        socket.on('active-game-found', (data) => {
            console.log('找到进行中的游戏:', data);
            activeGameInfo = data;
            // 显示重连按钮
            const reconnectBtn = document.getElementById('reconnectBtn');
            reconnectBtn.style.display = 'inline-block';
            reconnectBtn.textContent = data.isDisconnected ? '重新连接 (已掉线)' : '返回游戏';
        });
        
        socket.on('active-game-not-found', () => {
            console.log('没有进行中的游戏');
            activeGameInfo = null;
            document.getElementById('reconnectBtn').style.display = 'none';
        });
        
        // 重连到游戏
        function reconnectToGame() {
            if (!activeGameInfo) return;
            
            // 直接跳转到游戏页面
            window.location.href = `game.html?roomId=${activeGameInfo.roomId}`;
        }

        socket.on('rooms-list', (rooms) => {
            console.log('收到房间列表:', rooms);
            renderRooms(rooms);
        });

        socket.on('rooms-updated', () => {
            console.log('房间列表已更新，重新获取');
            socket.emit('get-rooms');
        });

        socket.on('room-created', (data) => {
            window.location.href = `room.html?roomId=${data.roomId}`;
        });

        socket.on('joined-room', (data) => {
            window.location.href = `room.html?roomId=${data.roomId}`;
        });

        socket.on('error', (data) => {
            showModal(data.message, 'error');
        });
        
        // 监听好友邀请
        inviteSocket = socket;
        const inviteEventName = `invite-${user.id}`;
        console.log('[Invite] 监听邀请事件:', inviteEventName);
        socket.on(inviteEventName, (data) => {
            console.log('[Invite] 收到邀请:', data);
            showInviteModal(data);
        });

        // 格式化积分显示
        function formatChips(chips) {
            const num = parseInt(chips) || 0;
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }

        // 显示自定义弹窗
        function showModal(message, type = 'info', callback) {
            const modal = document.getElementById('gameModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const msg = document.getElementById('modalMessage');
            const btn = document.getElementById('modalBtn');
            
            msg.textContent = message;
            
            // 重置按钮样式
            btn.className = 'game-modal-btn';
            
            switch(type) {
                case 'success':
                    icon.textContent = 'SUCCESS';
                    icon.style.color = '#dc143c';
                    title.textContent = '成功';
                    btn.classList.add('success');
                    break;
                case 'error':
                    icon.textContent = 'ERROR';
                    icon.style.color = '#8b0000';
                    title.textContent = '错误';
                    btn.classList.add('error');
                    break;
                default:
                    icon.textContent = 'INFO';
                    icon.style.color = '#dc143c';
                    title.textContent = '提示';
            }
            
            modal.classList.add('show');
            
            // 点击确定后的回调
            window.modalCallback = callback;
        }
        
        function closeModal() {
            const modal = document.getElementById('gameModal');
            modal.classList.remove('show');
            if (window.modalCallback) {
                window.modalCallback();
                window.modalCallback = null;
            }
        }
        
        // 点击遮罩关闭
        document.getElementById('gameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 渲染房间列表
        function renderRooms(rooms) {
            const container = document.getElementById('roomList');
            
            if (rooms.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无房间，创建一个吧！</div>';
                return;
            }

            container.innerHTML = rooms.map(room => {
                const isPlaying = room.status === 'playing';
                const isOwner = String(room.ownerId) === String(user.id);
                return `
                    <div class="room-item ${isPlaying ? 'playing' : ''}">
                        <div>
                            <div class="room-name">${escapeHtml(room.name)}</div>
                        </div>
                        <div class="room-host">${escapeHtml(room.owner)}</div>
                        <div>${room.smallBlind}/${room.bigBlind}</div>
                        <div>${room.playerCount}/${room.maxPlayers}</div>
                        <div>${isPlaying ? '<span style="color: #e74c3c;">游戏中</span>' : '等待中'}</div>
                        <div>
                            <button class="btn-join" 
                                onclick="joinRoom('${room.id}')"
                                ${room.playerCount >= room.maxPlayers || isPlaying ? 'disabled' : ''}>
                                ${room.playerCount >= room.maxPlayers ? '已满' : isPlaying ? '游戏中' : '加入'}
                            </button>
                            ${isOwner ? `<button class="btn-delete-room" onclick="deleteRoom('${room.id}')">删除</button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 创建房间
        document.getElementById('createRoomForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('roomName').value;
            const maxPlayers = parseInt(document.getElementById('maxPlayers').value);
            const blindSetting = document.getElementById('blindSetting').value.split(',');

            socket.emit('create-room', {
                userId: user.id,
                roomName: name,
                maxPlayers,
                smallBlind: parseInt(blindSetting[0]),
                bigBlind: parseInt(blindSetting[1])
            });
        });

        // 加入房间
        function joinRoom(roomId) {
            socket.emit('join-room', {
                roomId: roomId,
                userId: user.id
            });
        }

        // 删除房间相关变量
        let roomToDelete = null;
        
        // 删除房间
        function deleteRoom(roomId) {
            roomToDelete = roomId;
            document.getElementById('deleteRoomModal').classList.add('show');
        }
        
        // 确认删除房间
        function confirmDeleteRoom() {
            if (roomToDelete) {
                socket.emit('delete-room', {
                    roomId: roomToDelete,
                    userId: user.id
                });
                roomToDelete = null;
            }
            hideDeleteRoomModal();
        }
        
        // 隐藏删除房间弹窗
        function hideDeleteRoomModal() {
            document.getElementById('deleteRoomModal').classList.remove('show');
            roomToDelete = null;
        }

        // 删除房间结果
        socket.on('room-deleted', (data) => {
            showModal(data.message, 'success');
            // 清除本地存储的进行中游戏信息
            activeGameInfo = null;
            document.getElementById('reconnectBtn').style.display = 'none';
            // 刷新房间列表
            socket.emit('get-rooms');
        });

        socket.on('delete-room-error', (data) => {
            showModal(data.message, 'error');
        });

        // 显示/隐藏弹窗
        function showCreateModal() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const defaultRoomName = (user.nickname || user.username || '玩家') + '的房间';
            document.getElementById('roomName').value = defaultRoomName;
            document.getElementById('createModal').classList.add('show');
        }

        function hideCreateModal() {
            document.getElementById('createModal').classList.remove('show');
        }

        function refreshRooms() {
            socket.emit('get-rooms');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../../pages/login.html';
        }

        function backToGameHall() {
            window.location.href = '../../pages/gamehall.html';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示排行榜弹窗
        async function showLeaderboardModal() {
            document.getElementById('leaderboardModal').classList.add('show');
            await loadLeaderboard();
        }

        function hideLeaderboardModal() {
            document.getElementById('leaderboardModal').classList.remove('show');
        }

        // 加载排行榜
        async function loadLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/gamehall/leaderboard?limit=10`);
                const data = await response.json();

                if (data.success) {
                    renderLeaderboard(data.leaderboard);
                }
            } catch (error) {
                console.error('加载排行榜失败:', error);
            }
        }

        // 渲染排行榜
        function renderLeaderboard(leaderboard) {
            const container = document.getElementById('leaderboardList');
            
            if (leaderboard.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }

            container.innerHTML = leaderboard.map((item, index) => {
                const rank = index + 1;
                const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                const isCurrentUser = item.id === user.id;
                
                return `
                    <div class="leaderboard-item">
                        <div class="rank-number ${rankClass}">${rankIcon}</div>
                        <div class="leaderboard-username">${escapeHtml(item.nickname || item.username)} ${isCurrentUser ? '(你)' : ''}</div>
                        <div class="leaderboard-chips">${formatChips(item.chips || 0)}</div>
                    </div>
                `;
            }).join('');
        }

        // 显示个人信息弹窗
        function showProfileModal() {
            document.getElementById('profileUsername').textContent = user.username || '-';
            document.getElementById('profileNickname').textContent = user.nickname || user.username || '-';
            document.getElementById('profileChips').textContent = formatChips(user.chips || 0);
            
            // 加载头像
            const avatarImg = document.getElementById('profileAvatarImg');
            if (user.avatar) {
                avatarImg.src = `../../avatars/${user.avatar}`;
                avatarImg.style.display = 'block';
            } else {
                avatarImg.style.display = 'none';
                document.getElementById('profileAvatar').textContent = user.nickname ? user.nickname[0].toUpperCase() : '用户';
            }
            
            document.getElementById('profileModal').classList.add('show');
        }

        function hideProfileModal() {
            document.getElementById('profileModal').classList.remove('show');
        }

        // 初始加载
        // 每5秒自动刷新
        setInterval(() => {
            socket.emit('get-rooms');
        }, 5000);
        
        // 邀请相关函数（定义在全局作用域供 onclick 调用）
        function showInviteModal(inviteData) {
            currentInvite = inviteData;
            
            const infoHtml = `
                <div style="margin-bottom: 10px;"><strong>${inviteData.inviterName}</strong> 邀请你加入游戏</div>
                <div style="color: #aaa; font-size: 0.9rem;">房间: ${inviteData.roomName}</div>
                <div style="color: #aaa; font-size: 0.9rem;">盲注: ${inviteData.smallBlind}/${inviteData.bigBlind}</div>
            `;
            
            document.getElementById('inviteInfo').innerHTML = infoHtml;
            document.getElementById('inviteModal').classList.add('show');
        }
        
        function hideInviteModal() {
            document.getElementById('inviteModal').classList.remove('show');
            currentInvite = null;
        }
        
        function acceptInvite() {
            console.log('[Invite] 接受邀请, currentInvite:', currentInvite);
            if (!currentInvite) {
                console.error('[Invite] 没有可接受的邀请');
                return;
            }
            const roomId = currentInvite.roomId;
            hideInviteModal();
            window.location.href = `room.html?roomId=${roomId}`;
        }
        
        function rejectInvite() {
            hideInviteModal();
        }
    </script>
</body>
</html>
