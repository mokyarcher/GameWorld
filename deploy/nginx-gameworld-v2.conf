server {
    listen 80;
    listen [::]:80;
    server_name sharex.my www.sharex.my;

    # 前端静态文件 - 默认指向登录页
    location / {
        root /opt/gameworld/frontend;
        index pages/login.html;
        try_files $uri $uri/ =404;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.io WebSocket 支持
    location /socket.io/ {
        proxy_pass http://localhost:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 上传文件访问
    location /uploads/ {
        alias /opt/gameworld/uploads/;
    }

    access_log /var/log/nginx/gameworld.access.log;
    error_log /var/log/nginx/gameworld.error.log;
}
